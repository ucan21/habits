<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>헨리의 습관</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--s1:#12121a;--s2:#1a1a26;--s3:#222232;--s4:#2a2a3e;
  --text:#f0f0f8;--text2:#b0b0c8;--text3:#606080;
  --teal:#28c490;--teal-d:#0a4030;--blue:#4a8fff;--gold:#ffc020;
  --rose:#ff5060;--orange:#ff8830;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;}
.shell{display:flex;flex-direction:column;width:100%;max-width:480px;margin:0 auto;height:100dvh;height:100vh;overflow:hidden;}
.hdr{flex-shrink:0;padding:calc(var(--safe-t)+8px) 16px 8px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.back{background:var(--s2);border:1px solid var(--border2);color:var(--text2);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;text-decoration:none;flex-shrink:0;touch-action:manipulation;}
.back:active{transform:scale(.92);}
.hdr-c{flex:1;text-align:center;}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--teal);line-height:1;}
.hdr-sub{font-size:9px;letter-spacing:2px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;margin-top:2px;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.scroll::-webkit-scrollbar{width:2px;}
.scroll::-webkit-scrollbar-thumb{background:var(--s3);}
.body{padding:13px 13px 90px;}
.sec{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:8px;display:flex;align-items:center;gap:8px;font-weight:500;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}
/* DATE NAV */
.dnav{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.darr{background:var(--s2);border:1px solid var(--border2);color:var(--text2);width:40px;height:40px;border-radius:11px;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation;}
.darr:active{transform:scale(.92);}
.darr.dim{opacity:.3;pointer-events:none;}
.dctr{flex:1;text-align:center;background:var(--s2);border:1px solid var(--border);border-radius:11px;padding:7px 4px;cursor:pointer;}
.dstr{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;}
.ddow{font-size:11px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;}
.today-tag{font-size:9px;color:var(--blue);font-weight:700;}
/* SCORE */
.score-card{background:var(--s1);border:1px solid var(--border);border-radius:17px;padding:13px 15px;margin-bottom:12px;display:flex;align-items:center;gap:13px;}
.rw{position:relative;width:82px;height:82px;flex-shrink:0;}
.rw svg{transform:rotate(-90deg);width:82px;height:82px;}
.rbg{fill:none;stroke:var(--s3);stroke-width:7;}
.rpg{fill:none;stroke-width:7;stroke-linecap:round;stroke-dasharray:213;stroke-dashoffset:213;transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1),stroke .3s;}
.rin{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.rnum{font-family:'Bebas Neue',sans-serif;font-size:30px;line-height:1;}
.rpt{font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;}
.sinfo{flex:1;}
.sinfo h3{font-size:14px;font-weight:700;margin-bottom:3px;}
.sinfo p{font-size:12px;color:var(--text2);line-height:1.5;}
.gbadge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.8px;margin-top:7px;font-family:'DM Mono',monospace;}
/* HABITS */
.hl{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.hi{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:11px 11px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:all .14s;user-select:none;-webkit-user-select:none;touch-action:manipulation;}
.hi:active{transform:scale(.98);}
.hi.ck{background:var(--teal-d);border-color:rgba(40,196,144,.35);}
.hi.dragging{opacity:.4;background:var(--s3)!important;}
.hi.drag-over{border-color:var(--blue)!important;box-shadow:0 0 0 2px rgba(74,143,255,.3);}
.hdrag{color:var(--text3);font-size:15px;opacity:.3;flex-shrink:0;touch-action:none;padding:2px 3px;line-height:1;cursor:grab;}
.hi:hover .hdrag{opacity:.6;}
.hchk{width:26px;height:26px;border-radius:8px;border:2px solid var(--s4);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;font-size:13px;color:transparent;background:var(--s3);}
.hi.ck .hchk{background:var(--teal);border-color:var(--teal);color:#0a0a0f;box-shadow:0 0 12px rgba(40,196,144,.4);}
.hlbl{flex:1;font-size:14px;font-weight:500;line-height:1.3;color:var(--text);}
.hi.ck .hlbl{color:var(--teal);}
.hpts{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);flex-shrink:0;}
.hi.ck .hpts{color:var(--teal);}
.hdel{background:none;border:none;color:var(--text3);font-size:17px;cursor:pointer;padding:2px 4px;border-radius:5px;opacity:.2;touch-action:manipulation;}
.hdel:active{opacity:1!important;color:var(--rose);}
.addrow{display:flex;gap:7px;margin-bottom:0;}
.addinp{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:12px 13px;color:var(--text);font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;}
.addinp:focus{border-color:var(--teal);}
.addinp::placeholder{color:var(--text3);}
.addbtn{background:var(--teal);border:none;color:#0a0a0f;padding:12px 15px;border-radius:12px;cursor:pointer;font-size:23px;font-weight:700;line-height:1;touch-action:manipulation;transition:all .14s;}
.addbtn:active{transform:scale(.91);}
/* TOAST */
.toast{position:fixed;bottom:calc(var(--safe-b)+16px);left:50%;transform:translateX(-50%) translateY(50px);opacity:0;background:var(--text);color:var(--bg);padding:9px 18px;border-radius:22px;font-size:13px;font-weight:700;transition:all .28s;z-index:300;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
#coinCanvas{position:fixed;inset:0;pointer-events:none;z-index:500;width:100%;height:100%;}

/* ── BOTTOM HOME NAV ── */
.bnav{
  flex-shrink:0;
  background:rgba(10,10,15,0.97);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.16);
  display:flex;
  padding-bottom:var(--safe-b);
}
.nb{
  flex:1;background:none;border:none;color:#606080;
  padding:9px 2px 7px;
  cursor:pointer;font-size:9.5px;
  font-family:'Noto Sans KR',sans-serif;font-weight:500;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:color .18s;touch-action:manipulation;
}
.nb .ni{font-size:21px;transition:transform .18s;}
.nb:active .ni{transform:scale(1.2);}
.nb.nb-home{color:#4a8fff;}
.nb.nb-home .ni{filter:drop-shadow(0 0 5px #4a8fff);}

</style>
</head>
<body>
<canvas id="coinCanvas"></canvas>
<div class="shell">
  <div class="hdr">
    <a class="back" href="index.html">←</a>
    <div class="hdr-c">
      <div class="hdr-title">헨리의 습관</div>
      <div class="hdr-sub">Daily Habit Tracker</div>
    </div>
    <div style="width:36px;"></div>
  </div>
  <div class="scroll">
    <div class="body">
      <div class="dnav">
        <button class="darr" id="btn-prev" onclick="chDate(-1)">‹</button>
        <div class="dctr" onclick="goToday()">
          <div class="dstr" id="dstr">—</div>
          <div class="ddow" id="ddow">—</div>
          <div class="today-tag" id="today-tag"></div>
        </div>
        <button class="darr" id="btn-next" onclick="chDate(1)">›</button>
      </div>
      <div class="score-card">
        <div class="rw">
          <svg viewBox="0 0 82 82"><circle class="rbg" cx="41" cy="41" r="34"/><circle class="rpg" id="ring" cx="41" cy="41" r="34"/></svg>
          <div class="rin"><div class="rnum" id="snum">0</div><div class="rpt">점</div></div>
        </div>
        <div class="sinfo">
          <h3>오늘의 점수</h3>
          <p id="smsg">체크를 시작해보세요 💪</p>
          <span class="gbadge" id="gbdg">—</span>
        </div>
      </div>
      <div class="sec">습관 체크리스트 <span style="font-size:9px;color:var(--text3);letter-spacing:0;text-transform:none;font-family:'Noto Sans KR',sans-serif;font-weight:400;">⠿ 드래그로 순서 변경</span></div>
      <div class="hl" id="hlist"></div>
      <div class="addrow">
        <input class="addinp" id="hadd" placeholder="새 습관 추가..." maxlength="30" onkeydown="if(event.key==='Enter'){addHabit();this.blur();}">
        <button class="addbtn" onclick="addHabit()">+</button>
      </div>
    </div>
    <!-- BOTTOM NAV -->
  <nav class="bnav">
    <button class="nb" style="color:var(--blue);" onclick="window.location.href='index.html'">
      <span class="ni">🏠</span>홈
    </button>
    <button class="nb on" onclick="window.location.href='habits.html'">
      <span class="ni">✅</span>습관
    </button>
    <button class="nb" onclick="window.location.href='gratitude.html'">
      <span class="ni">🙏</span>감사
    </button>
    <button class="nb" onclick="window.location.href='brain.html'">
      <span class="ni">🧠</span>Brain
    </button>
    <button class="nb" onclick="window.location.href='gtask.html'">
      <span class="ni">☑️</span>Tasks
    </button>
    <button class="nb" onclick="window.location.href='gcal.html'">
      <span class="ni">📅</span>캘린더
    </button>
  </nav>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
const KEY='henry_v9';
const DEF=[
  {id:'h1',label:'아침 8시 전에 기상'},
  {id:'h2',label:'이불정리 & 바닥청소'},
  {id:'h3',label:'헬스클럽 : 유산소 & 근력운동'},
  {id:'h4',label:'샤워 및 청결 유지'},
  {id:'h5',label:'탄천(동네) 산책'},
  {id:'h6',label:'연구소(네이버 라운지) 출근'},
  {id:'h7',label:'독서'},
  {id:'h8',label:'필사'},
  {id:'h9',label:'오후 11시 이전 취침'},
  {id:'h10',label:'감사 일기 5가지 작성'},
];
function ld(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}return{habits:[...DEF],records:{},grat:{},tasks:[],todos:[],braindump:'',info:{}};}
function sv(){try{localStorage.setItem(KEY,JSON.stringify(D));}catch(e){}}
let D=ld();
function p2(n){return String(n).padStart(2,'0');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function todayStr(){const n=new Date();return n.getFullYear()+'-'+p2(n.getMonth()+1)+'-'+p2(n.getDate());}
function addDays(s,n){const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);dt.setDate(dt.getDate()+n);return dt.getFullYear()+'-'+p2(dt.getMonth()+1)+'-'+p2(dt.getDate());}
function fmtDisp(s){const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);const dw=['일','월','화','수','목','금','토'];return{str:y+'.'+p2(m)+'.'+p2(d),dow:dw[dt.getDay()]+'요일'};}
let curD=todayStr();
function chDate(d){const nxt=addDays(curD,d);if(nxt>addDays(todayStr(),1))return;curD=nxt;render();}
function goToday(){curD=todayStr();render();}
function getWeight(id){
  /* 고정 가중치 */
  if(id==='h3'||id==='h6'||id==='h9') return 20;
  /* 나머지 7개 — 40%를 균등 분배 */
  return 40/7;
}
function score(dk){
  const rec=D.records[dk]||{};
  const g=D.grat[dk]||[];
  if(!D.habits.length)return 0;
  let sc=0;
  D.habits.forEach(h=>{
    const w=getWeight(h.id);
    if(h.id==='h10') sc+=w*Math.min(g.filter(x=>x&&x.trim()).length/5,1);
    else if(rec[h.id]) sc+=w;
  });
  return Math.round(sc);
}
const CT='#28c490',CB='#4a8fff',CO='#ff8830';
function grade(s){if(s>=100)return{l:'PERFECT ✨',bg:'rgba(255,192,32,.15)',c:'#ffc020',bd:'rgba(255,192,32,.35)'};if(s>=89)return{l:'EXCELLENT',bg:'rgba(40,196,144,.12)',c:CT,bd:'rgba(40,196,144,.3)'};if(s>=70)return{l:'GREAT',bg:'rgba(74,143,255,.12)',c:CB,bd:'rgba(74,143,255,.3)'};if(s>=50)return{l:'GOOD',bg:'rgba(144,96,255,.12)',c:'#9060ff',bd:'rgba(144,96,255,.3)'};if(s>=1)return{l:'KEEP GOING',bg:'rgba(255,136,48,.12)',c:CO,bd:'rgba(255,136,48,.3)'};return{l:'시작해봐요',bg:'rgba(255,255,255,.06)',c:'#606080',bd:'rgba(255,255,255,.1)'};}
function gmsg(s){if(!s)return'체크를 시작해보세요 💪';if(s<30)return'오늘도 한 걸음씩! 🌱';if(s<60)return'좋은 페이스예요 👍';if(s<90)return'거의 다 왔어요 🌟';if(s<100)return'완벽에 가까워요! 🔥';return'완벽한 하루! 🎉';}
/* Coin sound */
let AC=null;

function playBell(){
  try{
    if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended')AC.resume();
    const ac=AC;
    const notes=[523.25,659.26,783.99,1046.50];
    notes.forEach((freq,i)=>{
      const delay=i*0.18;
      const osc=ac.createOscillator(),gain=ac.createGain();
      osc.connect(gain);gain.connect(ac.destination);
      osc.type='sine';
      osc.frequency.setValueAtTime(freq,ac.currentTime+delay);
      gain.gain.setValueAtTime(0,ac.currentTime+delay);
      gain.gain.linearRampToValueAtTime(0.38,ac.currentTime+delay+0.01);
      gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+delay+1.6);
      osc.start(ac.currentTime+delay);osc.stop(ac.currentTime+delay+1.7);
      // 배음
      const osc2=ac.createOscillator(),gain2=ac.createGain();
      osc2.connect(gain2);gain2.connect(ac.destination);
      osc2.type='sine';osc2.frequency.value=freq*2;
      gain2.gain.setValueAtTime(0,ac.currentTime+delay);
      gain2.gain.linearRampToValueAtTime(0.1,ac.currentTime+delay+0.01);
      gain2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+delay+0.9);
      osc2.start(ac.currentTime+delay);osc2.stop(ac.currentTime+delay+1.0);
    });
  }catch(e){}
}
function playCoin(){try{if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();const ac=AC;for(let i=0;i<12;i++){const dl=i*0.048+Math.random()*0.038,fr=700+Math.random()*900;const osc=ac.createOscillator(),gn=ac.createGain(),fl=ac.createBiquadFilter();fl.type='bandpass';fl.frequency.value=fr*1.4;fl.Q.value=9;osc.connect(fl);fl.connect(gn);gn.connect(ac.destination);osc.type='sine';osc.frequency.setValueAtTime(fr,ac.currentTime+dl);osc.frequency.exponentialRampToValueAtTime(fr*.5,ac.currentTime+dl+.22);gn.gain.setValueAtTime(0,ac.currentTime+dl);gn.gain.linearRampToValueAtTime(.24,ac.currentTime+dl+.006);gn.gain.exponentialRampToValueAtTime(.001,ac.currentTime+dl+.28);osc.start(ac.currentTime+dl);osc.stop(ac.currentTime+dl+.3);const sr=ac.sampleRate,buf=ac.createBuffer(1,Math.floor(sr*.04),sr),dd=buf.getChannelData(0);for(let j=0;j<dd.length;j++)dd[j]=(Math.random()*2-1)*Math.pow(1-j/dd.length,2.5);const src=ac.createBufferSource();src.buffer=buf;const ng=ac.createGain();ng.gain.value=.14;src.connect(ng);ng.connect(ac.destination);src.start(ac.currentTime+dl);}}catch(e){}}
/* Coin burst */
const cv=document.getElementById('coinCanvas'),cx=cv.getContext('2d');let coins=[];
function rsz(){cv.width=window.innerWidth;cv.height=window.innerHeight;}rsz();window.addEventListener('resize',rsz);
function burst(x,y,n=52){playCoin();for(let i=0;i<n;i++){const ang=Math.random()*Math.PI*2,spd=3+Math.random()*12;coins.push({x,y,vx:Math.cos(ang)*spd*(0.5+Math.random()*.9),vy:Math.sin(ang)*spd*(0.5+Math.random()*.9)-6,r:6+Math.random()*10,life:1,decay:.012+Math.random()*.01,color:['#FFD700','#FFC200','#FFE44d','#FFAA00','#FF8C00','#FFD060'][Math.floor(Math.random()*6)],rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*.28,gravity:.25+Math.random()*.16});}if(!animR)animC();}
let animR=false;
function animC(){animR=true;cx.clearRect(0,0,cv.width,cv.height);coins=coins.filter(c=>c.life>0.02);coins.forEach(c=>{c.x+=c.vx;c.vy+=c.gravity;c.y+=c.vy;c.vx*=.986;c.life-=c.decay;c.rot+=c.rotV;cx.save();cx.globalAlpha=Math.min(c.life,1);cx.translate(c.x,c.y);cx.rotate(c.rot);cx.beginPath();cx.ellipse(0,0,c.r,c.r*.58,0,0,Math.PI*2);cx.fillStyle=c.color;cx.fill();cx.strokeStyle='rgba(0,0,0,.22)';cx.lineWidth=1;cx.stroke();cx.beginPath();cx.ellipse(-c.r*.18,-c.r*.1,c.r*.22,c.r*.12,-.4,0,Math.PI*2);cx.fillStyle='rgba(255,255,255,.55)';cx.fill();cx.fillStyle='rgba(0,0,0,.35)';cx.font=`bold ${c.r*.85}px serif`;cx.textAlign='center';cx.textBaseline='middle';cx.fillText('₩',0,0);cx.restore();});if(coins.length>0)requestAnimationFrame(animC);else{animR=false;cx.clearRect(0,0,cv.width,cv.height);}}
let toastT=null;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1700);}
function render(){
  const f=fmtDisp(curD),tod=todayStr(),tom=addDays(tod,1),yes=addDays(tod,-1);
  document.getElementById('dstr').textContent=f.str;document.getElementById('ddow').textContent=f.dow;
  document.getElementById('today-tag').textContent=curD===tod?'오늘':curD===tom?'내일':curD===yes?'어제':'';
  document.getElementById('btn-next').classList.toggle('dim',curD>=tom);
  const sc=score(curD),g=grade(sc),rec=D.records[curD]||{};
  const circ=213,ring=document.getElementById('ring');
  ring.style.strokeDashoffset=circ-(sc/100)*circ;
  ring.style.stroke=sc>=70?CT:sc>=40?CB:CO;
  document.getElementById('snum').textContent=sc;document.getElementById('smsg').textContent=gmsg(sc);
  const gb=document.getElementById('gbdg');gb.textContent=g.l;gb.style.cssText=`background:${g.bg};color:${g.c};border:1px solid ${g.bd};`;
  /* pt는 각 습관마다 개별 가중치로 표시 */
  const hl=document.getElementById('hlist');hl.innerHTML='';
  const visH=D.habits.filter(h=>h.id!=='h10');
  visH.forEach((h,vi)=>{
    const ck=!!rec[h.id];const el=document.createElement('div');
    el.className='hi'+(ck?' ck':'');el.dataset.vi=vi;
    const w=Math.round(getWeight(h.id)*10)/10;
    el.innerHTML=`<div class="hdrag">⠿</div><div class="hchk">${ck?'✓':''}</div><div class="hlbl">${esc(h.label)}</div><div class="hpts">${w}%</div><button class="hdel" onclick="delHabit('${h.id}',event)">×</button>`;
    el.addEventListener('click',e=>{
      if(e.target.classList.contains('hdel')||e.target.classList.contains('hdrag'))return;
      const wasCk=D.records[curD]&&D.records[curD][h.id];
      const scoreBefore=score(curD);
      if(!D.records[curD])D.records[curD]={};
      D.records[curD][h.id]=!D.records[curD][h.id];
      sv();
      const scoreAfter=score(curD);
      render();
      if(!wasCk){
        const r=el.getBoundingClientRect();
        burst(r.left+r.width*.5,r.top+r.height*.5,55);
        // 20점 구간 돌파 시 종소리
        // 20, 40, 60, 80, 100 구간
        const milestones=[20,40,60,80,100];
        milestones.forEach(ms=>{
          if(scoreBefore<ms && scoreAfter>=ms){
            setTimeout(()=>playBell(),300);
            // 토스트 메시지
            const msgs={20:'🔔 20점 달성!',40:'🔔 40점 달성!',60:'🔔 60점 달성!',80:'🔔 80점 달성!',100:'🎉 100점 완벽 달성!'};
            toast(msgs[ms]||`🔔 ${ms}점 달성!`);
          }
        });
      }
    });
    setupDrag(el,vi,visH);hl.appendChild(el);
  });
}
function setupDrag(el,vi,visH){
  const handle=el.querySelector('.hdrag');
  handle.addEventListener('touchstart',e=>{e.stopPropagation();el.classList.add('dragging');},{passive:true});
  handle.addEventListener('touchmove',e=>{if(!el.classList.contains('dragging'))return;e.preventDefault();const ty=e.touches[0].clientY;[...document.getElementById('hlist').querySelectorAll('.hi')].forEach(s=>{if(s===el)return;const r=s.getBoundingClientRect();s.classList.toggle('drag-over',ty<r.top+r.height/2);});},{passive:false});
  handle.addEventListener('touchend',e=>{el.classList.remove('dragging');const siblings=[...document.getElementById('hlist').querySelectorAll('.hi')];const ovi=siblings.findIndex(s=>s.classList.contains('drag-over'));siblings.forEach(s=>s.classList.remove('drag-over'));if(ovi!==-1&&ovi!==vi)doReorder(visH,vi,ovi);});
  handle.addEventListener('mousedown',e=>{e.stopPropagation();el.classList.add('dragging');const mv=ev=>{[...document.getElementById('hlist').querySelectorAll('.hi')].forEach(s=>{if(s===el)return;const r=s.getBoundingClientRect();s.classList.toggle('drag-over',ev.clientY<r.top+r.height/2);});};const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);el.classList.remove('dragging');const siblings=[...document.getElementById('hlist').querySelectorAll('.hi')];const ovi=siblings.findIndex(s=>s.classList.contains('drag-over'));siblings.forEach(s=>s.classList.remove('drag-over'));if(ovi!==-1&&ovi!==vi)doReorder(visH,vi,ovi);};document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);});
}
function doReorder(visH,from,to){const moved=visH[from],target=visH[to],mi=D.habits.indexOf(moved);D.habits.splice(mi,1);D.habits.splice(D.habits.indexOf(target),0,moved);sv();render();}
function delHabit(id,e){e.stopPropagation();if(!confirm('이 습관을 삭제할까요?'))return;D.habits=D.habits.filter(h=>h.id!==id);Object.keys(D.records).forEach(d=>delete D.records[d][id]);sv();render();}
function addHabit(){const inp=document.getElementById('hadd');const v=inp.value.trim();if(!v)return;D.habits.push({id:'h'+Date.now(),label:v});inp.value='';sv();render();toast('✅ 습관 추가됨');}
render();
</script>
<script>
/* ══ SWIPE NAVIGATION ══ */
(function(){
  const path=location.pathname.split('/').pop()||'index.html';
  const PAGES=['index.html','habits.html','gratitude.html','brain.html','gcal.html'];
  const NAMES=['🏠 홈','✅ 습관','🙏 감사','🧠 Brain','📅 캘린더'];
  const curIdx=PAGES.indexOf(path);
  let sx=0,sy=0,st=0;
  const MIN_DIST=55,MAX_VERT=90,MAX_TIME=500;

  /* 스와이프 힌트 */
  const hint=document.createElement('div');
  hint.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.72);color:#fff;padding:11px 22px;border-radius:26px;font-family:\'Noto Sans KR\',sans-serif;font-size:14px;font-weight:700;pointer-events:none;opacity:0;transition:opacity .18s;z-index:9999;white-space:nowrap;';
  document.body.appendChild(hint);
  let ht;
  function showHint(msg){hint.textContent=msg;hint.style.opacity='1';clearTimeout(ht);ht=setTimeout(()=>hint.style.opacity='0',700);}

  /* 페이지 이동 */
  function go(dir){
    if(curIdx<0)return;
    const ni=curIdx-dir; /* 왼쪽=+1인덱스, 오른쪽=-1인덱스 */
    if(ni<0||ni>=PAGES.length)return;
    const shell=document.querySelector('.shell');
    if(shell){
      shell.style.transition='transform .2s ease,opacity .2s ease';
      shell.style.transform='translateX('+(dir>0?'-':'')+'80px)';
      shell.style.opacity='0';
    }
    setTimeout(()=>{window.location.href=PAGES[ni];},180);
  }

  document.addEventListener('touchstart',e=>{
    const sa=document.querySelector('.scroll,.scroll-area');
    if(sa&&sa.scrollTop>4&&sa.contains(e.target))return;
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();
  },{passive:true});

  document.addEventListener('touchend',e=>{
    if(!sx)return;
    const dx=e.changedTouches[0].clientX-sx;
    const dy=Math.abs(e.changedTouches[0].clientY-sy);
    const dt=Date.now()-st;sx=0;
    if(dt>MAX_TIME||Math.abs(dx)<MIN_DIST||dy>MAX_VERT)return;
    if(dx<0){
      /* 왼쪽 → 다음 */
      const ni=curIdx+1;
      if(ni>=PAGES.length){showHint('📅 마지막 페이지');return;}
      showHint(NAMES[ni]+' →');setTimeout(()=>go(-1),160);
    } else {
      /* 오른쪽 → 이전 */
      const ni=curIdx-1;
      if(ni<0){showHint('← 첫 페이지');return;}
      showHint('← '+NAMES[ni]);setTimeout(()=>go(1),160);
    }
  },{passive:true});

  /* 진입 애니메이션 */
  const shell=document.querySelector('.shell');
  if(shell){
    shell.style.opacity='0';shell.style.transform='translateY(5px)';shell.style.transition='none';
    requestAnimationFrame(()=>{
      shell.style.transition='transform .2s ease,opacity .2s ease';
      shell.style.transform='translateY(0)';shell.style.opacity='1';
    });
  }
})();
</script>
</body>
