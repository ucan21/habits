<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Google Tasks — Henry</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--s1:#12121a;--s2:#1a1a26;--s3:#222232;--s4:#2a2a3e;
  --text:#f0f0f8;--text2:#b0b0c8;--text3:#606080;
  --blue:#4a8fff;--teal:#28c490;--rose:#ff5060;--gold:#ffc020;
  --gt:#4285F4;--gt-lt:rgba(66,133,244,0.15);--gt-bd:rgba(66,133,244,0.4);
  --border:rgba(255,255,255,0.08);--wborder:rgba(255,255,255,0.75);
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;}
.shell{display:flex;flex-direction:column;width:100%;max-width:480px;margin:0 auto;height:100dvh;height:100vh;overflow:hidden;}

/* HEADER */
.hdr{flex-shrink:0;padding:calc(var(--safe-t)+8px) 16px 8px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.back{background:var(--s2);border:none;outline:none;color:#fff;width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;text-decoration:none;flex-shrink:0;-webkit-appearance:none;appearance:none;cursor:pointer;touch-action:manipulation;font-family:inherit;line-height:1;}
.back:active{transform:scale(.92);}
.hdr-c{flex:1;text-align:center;}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:#fff;line-height:1;}
.hdr-sub{font-size:8px;letter-spacing:2px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;margin-top:2px;}
.sync-btn{background:var(--s2);border:1px solid var(--wborder);color:#fff;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;touch-action:manipulation;flex-shrink:0;}
.sync-btn:active{transform:scale(.92);}
.sync-btn.syncing{animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.scroll::-webkit-scrollbar{width:2px;}
.scroll::-webkit-scrollbar-thumb{background:var(--s3);}
.body{padding:14px 14px 20px;}

/* SECTION */
.sec{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#fff;font-family:'DM Mono',monospace;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-weight:700;opacity:.9;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}

/* LOGIN CARD */
.login-card{background:linear-gradient(135deg,#12121a,#0d1a36);border:1.5px solid var(--wborder);border-radius:18px;padding:28px 20px;margin-bottom:14px;text-align:center;}
.login-icon{font-size:52px;margin-bottom:14px;}
.login-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:8px;}
.login-desc{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:20px;}
.google-btn{
  display:flex;align-items:center;justify-content:center;gap:12px;
  width:100%;padding:15px;
  background:#fff;border:none;border-radius:13px;
  cursor:pointer;touch-action:manipulation;transition:all .15s;
  font-size:15px;font-weight:700;color:#3c4043;
  font-family:'Noto Sans KR',sans-serif;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
}
.google-btn:active{transform:scale(.97);background:#f5f5f5;}
.google-logo{width:22px;height:22px;flex-shrink:0;}

/* STATS */
.stats-row{display:flex;gap:8px;margin-bottom:14px;}
.stat-pill{flex:1;background:var(--s1);border:1.5px solid var(--wborder);border-radius:13px;padding:12px 8px;text-align:center;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--gt);line-height:1;}
.stat-lbl{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:3px;}

/* LIST SELECTOR */
.list-selector{background:var(--s1);border:1.5px solid var(--wborder);border-radius:13px;padding:11px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.list-selector label{font-size:12px;color:#fff;font-weight:700;flex-shrink:0;}
.list-select{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:8px 11px;color:#fff;font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;}

/* ADD BOX */
.add-box{background:linear-gradient(135deg,#12121a,#0d1a36);border:1.5px solid var(--wborder);border-radius:16px;padding:14px;margin-bottom:14px;}
.add-box-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:10px;}
.add-row{display:flex;gap:7px;margin-bottom:6px;}
.add-inp{flex:1;background:var(--s2);border:1px solid var(--wborder);border-radius:11px;padding:13px 14px;color:#fff;font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;font-weight:500;}
.add-inp:focus{border-color:var(--gt);}
.add-inp::placeholder{color:var(--text3);}
.add-due{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:11px;padding:11px 12px;color:#fff;font-size:13px;font-family:'DM Mono',monospace;outline:none;}
.add-btn{background:var(--gt);border:none;color:#fff;padding:13px 16px;border-radius:11px;cursor:pointer;font-size:22px;font-weight:700;line-height:1;touch-action:manipulation;transition:all .14s;box-shadow:0 0 14px rgba(66,133,244,.35);}
.add-btn:active{transform:scale(.91);}

/* FILTER */
.filter-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.filter-row::-webkit-scrollbar{display:none;}
.fbtn{background:var(--s1);border:1px solid var(--wborder);border-radius:20px;padding:7px 16px;font-size:12px;color:#fff;cursor:pointer;white-space:nowrap;touch-action:manipulation;flex-shrink:0;transition:all .15s;font-weight:500;}
.fbtn.on{background:var(--gt);border-color:var(--gt);color:#fff;}
.fbtn:active{transform:scale(.95);}

/* TASK LIST */
.task-list{display:flex;flex-direction:column;gap:8px;}
.ti{background:var(--s1);border:1.5px solid var(--wborder);border-radius:14px;padding:13px 14px;display:flex;align-items:flex-start;gap:11px;transition:all .15s;}
.ti.done{opacity:.4;}
.ti.done .t-title{text-decoration:line-through;color:var(--text3);}
.ti.editing{background:var(--s2);border-color:var(--gt);}
.ti.synced{border-color:rgba(66,133,244,.5);}
.t-chk{width:26px;height:26px;border-radius:8px;border:2px solid rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .18s;font-size:13px;color:transparent;background:var(--s3);touch-action:manipulation;margin-top:1px;}
.ti.done .t-chk{background:var(--teal);border-color:var(--teal);color:#0a0a0f;box-shadow:0 0 10px rgba(40,196,144,.3);}
.t-body{flex:1;min-width:0;}
.t-title{font-size:15px;font-weight:600;color:#fff;line-height:1.35;}
.t-meta{font-size:11px;color:var(--text3);margin-top:4px;font-family:'DM Mono',monospace;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.t-synced-tag{background:rgba(66,133,244,.2);border:1px solid rgba(66,133,244,.4);border-radius:8px;padding:1px 7px;font-size:10px;color:#4a8fff;}
.t-due-tag{background:rgba(255,136,48,.15);border:1px solid rgba(255,136,48,.3);border-radius:8px;padding:1px 7px;font-size:10px;color:#ff8830;}
.t-actions{display:flex;gap:4px;flex-shrink:0;}
.t-btn{background:none;border:none;color:var(--text3);font-size:15px;cursor:pointer;padding:3px 5px;border-radius:6px;opacity:.3;touch-action:manipulation;transition:all .18s;}
.t-btn:active{opacity:1;transform:scale(.9);}
.t-edit-inp{width:100%;background:transparent;border:none;color:#fff;font-size:15px;font-weight:600;font-family:'Noto Sans KR',sans-serif;outline:none;line-height:1.35;}
.t-save-btn{background:var(--gt);border:none;color:#fff;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;touch-action:manipulation;margin-top:6px;font-family:'Noto Sans KR',sans-serif;}
.empty{text-align:center;padding:32px 0;color:var(--text3);}
.empty .ei{font-size:38px;margin-bottom:10px;}
.empty p{font-size:14px;line-height:1.65;}

/* CLEAR BTN */
.clr-btn{width:100%;margin-top:10px;background:var(--s1);border:1.5px solid var(--wborder);border-radius:12px;color:var(--text3);padding:12px;font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:500;transition:all .2s;}
.clr-btn:active{background:var(--s2);}

/* ACCOUNT INFO */
.account-bar{background:var(--s1);border:1.5px solid var(--wborder);border-radius:13px;padding:11px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.account-avatar{width:32px;height:32px;border-radius:50%;background:var(--gt);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;}
.account-info{flex:1;}
.account-name{font-size:13px;font-weight:700;color:#fff;}
.account-email{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
.logout-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text3);font-size:12px;padding:5px 10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;touch-action:manipulation;}
.logout-btn:active{color:var(--rose);}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--safe-b)+66px);left:50%;transform:translateX(-50%) translateY(50px);opacity:0;background:#fff;color:#0a0a0f;padding:9px 18px;border-radius:22px;font-size:13px;font-weight:700;transition:all .28s;z-index:300;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* BOTTOM NAV */
.bnav{flex-shrink:0;background:rgba(10,10,15,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.16);display:flex;padding-bottom:var(--safe-b);}
.nb{flex:1;background:none;border:none;color:var(--text3);padding:9px 2px 7px;cursor:pointer;font-size:9.5px;font-family:'Noto Sans KR',sans-serif;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .18s;touch-action:manipulation;}
.nb .ni{font-size:21px;transition:transform .18s;}
.nb:active .ni{transform:scale(1.2);}
.nb.on{color:var(--gt);}
.nb.on .ni{filter:drop-shadow(0 0 5px var(--gt));}
</style>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async></script>

<script>
/* ══ CONFIG ══
   Google Cloud Console에서 OAuth 2.0 클라이언트 ID 발급 필요
   https://console.cloud.google.com/
   승인된 JavaScript 출처: https://[아이디].github.io
*/
const CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID'; // ← 여기에 클라이언트 ID 입력
const SCOPES = 'https://www.googleapis.com/auth/tasks';
const API_BASE = 'https://tasks.googleapis.com/tasks/v1';

const KEY = 'henry_gtask_v3';
let tokenClient = null;
let accessToken = null;
let tasks = [];
let taskLists = [];
let curListId = '@default';
let curFilter = 'all';

function ld(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}return{token:null,user:null,tasks:[],listId:'@default'};}
function sv(d){try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){}}

let toastT=null;
function toast(msg,dur=1800){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),dur);}
function p2(n){return String(n).padStart(2,'0');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function nowStr(){const n=new Date();return`${n.getFullYear()}.${p2(n.getMonth()+1)}.${p2(n.getDate())} ${p2(n.getHours())}:${p2(n.getMinutes())}`;}

/* ══ INIT ══ */
window.onload = function(){
  const saved = ld();
  if(saved.token && saved.user){
    accessToken = saved.token;
    curListId = saved.listId || '@default';
    showMain(saved.user);
    fetchLists().then(()=>fetchTasks());
  }

  // Google Identity Services 초기화
  if(typeof google !== 'undefined') initGIS();
  else document.querySelector('script[src*="gsi"]').addEventListener('load', initGIS);
};

function initGIS(){
  if(CLIENT_ID === 'YOUR_GOOGLE_CLIENT_ID'){
    // 클라이언트 ID 미설정 — 데모 모드
    return;
  }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if(resp.error) { toast('❌ 로그인 실패: '+resp.error); return; }
      accessToken = resp.access_token;
      fetchUserInfo().then(user=>{
        sv({token:accessToken, user, tasks:[], listId:curListId});
        showMain(user);
        fetchLists().then(()=>fetchTasks());
      });
    }
  });
}

/* ══ LOGIN / LOGOUT ══ */
function googleLogin(){
  if(CLIENT_ID === 'YOUR_GOOGLE_CLIENT_ID'){
    // 클라이언트 ID 미설정 → 안내
    showSetupGuide();
    return;
  }
  if(tokenClient) tokenClient.requestAccessToken({prompt:'consent'});
  else toast('❌ Google 로그인 초기화 중... 잠시 후 다시 시도하세요');
}

function logout(){
  if(accessToken && typeof google !== 'undefined'){
    google.accounts.oauth2.revoke(accessToken, ()=>{});
  }
  accessToken = null;
  localStorage.removeItem(KEY);
  document.getElementById('view-login').style.display='block';
  document.getElementById('view-main').style.display='none';
  toast('👋 로그아웃됨');
}

function showMain(user){
  document.getElementById('view-login').style.display='none';
  document.getElementById('view-main').style.display='block';
  if(user){
    const initial=(user.name||user.email||'U')[0].toUpperCase();
    document.getElementById('acct-avatar').textContent=initial;
    document.getElementById('acct-name').textContent=user.name||'—';
    document.getElementById('acct-email').textContent=user.email||'—';
  }
}

/* ══ API CALLS ══ */
async function apiCall(url, method='GET', body=null){
  const opts = {
    method,
    headers: {'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'}
  };
  if(body) opts.body = JSON.stringify(body);
  const res = await fetch(API_BASE+url, opts);
  if(res.status===401){ toast('🔑 세션 만료 — 다시 로그인하세요'); logout(); throw new Error('401'); }
  if(!res.ok) throw new Error('API error '+res.status);
  if(res.status===204) return null;
  return res.json();
}

async function fetchUserInfo(){
  const res = await fetch('https://www.googleapis.com/oauth2/v2/userinfo',{
    headers:{'Authorization':'Bearer '+accessToken}
  });
  return res.json();
}

async function fetchLists(){
  try{
    const data = await apiCall('/users/@me/lists');
    taskLists = data.items || [];
    const sel = document.getElementById('list-select');
    sel.innerHTML = taskLists.map(l=>`<option value="${l.id}"${l.id===curListId?' selected':''}>${esc(l.title)}</option>`).join('');
    if(taskLists.length && curListId==='@default') curListId=taskLists[0].id;
  }catch(e){ console.warn('fetchLists:',e); }
}

async function fetchTasks(){
  if(!accessToken) return;
  const syncBtn=document.getElementById('sync-btn');
  syncBtn.classList.add('syncing');
  try{
    const data = await apiCall(`/lists/${curListId}/tasks?showCompleted=true&maxResults=100`);
    tasks = (data.items||[]).sort((a,b)=>{
      if(a.status==='completed' && b.status!=='completed') return 1;
      if(a.status!=='completed' && b.status==='completed') return -1;
      return (a.position||'').localeCompare(b.position||'');
    });
    renderList();
    toast('🔄 동기화 완료');
  }catch(e){ if(e.message!=='401') toast('❌ 불러오기 실패'); }
  finally{ syncBtn.classList.remove('syncing'); }
}

async function addTask(){
  const inp=document.getElementById('task-inp');
  const due=document.getElementById('task-due');
  const v=inp.value.trim();if(!v)return;

  if(!accessToken){ toast('❌ 먼저 로그인하세요'); return; }

  const body={title:v,status:'needsAction'};
  if(due.value) body.due=new Date(due.value).toISOString();

  try{
    const newTask = await apiCall(`/lists/${curListId}/tasks`,'POST',body);
    tasks.unshift(newTask);
    inp.value='';due.value='';
    renderList();
    toast('✅ Google Tasks에 추가됨');
  }catch(e){ toast('❌ 추가 실패'); }
}

async function toggleTask(id){
  const task=tasks.find(t=>t.id===id);if(!task)return;
  const newStatus=task.status==='completed'?'needsAction':'completed';
  const body={...task, status:newStatus};
  if(newStatus==='completed') body.completed=new Date().toISOString();
  else { delete body.completed; }
  try{
    const updated=await apiCall(`/lists/${curListId}/tasks/${id}`,'PUT',body);
    const idx=tasks.findIndex(t=>t.id===id);
    if(idx>=0) tasks[idx]=updated;
    renderList();
    if(newStatus==='completed') toast('✅ 완료!');
    else toast('↩️ 다시 진행 중');
  }catch(e){ toast('❌ 업데이트 실패'); }
}

async function deleteTask(id){
  if(!confirm('이 Task를 삭제할까요?'))return;
  try{
    await apiCall(`/lists/${curListId}/tasks/${id}`,'DELETE');
    tasks=tasks.filter(t=>t.id!==id);
    renderList();toast('🗑️ 삭제됨');
  }catch(e){ toast('❌ 삭제 실패'); }
}

async function updateTaskTitle(id, newTitle){
  const task=tasks.find(t=>t.id===id);if(!task||!newTitle.trim())return;
  const body={...task, title:newTitle.trim()};
  try{
    const updated=await apiCall(`/lists/${curListId}/tasks/${id}`,'PUT',body);
    const idx=tasks.findIndex(t=>t.id===id);
    if(idx>=0) tasks[idx]=updated;
    renderList();toast('✅ 수정됨');
  }catch(e){ toast('❌ 수정 실패'); }
}

async function clearDone(){
  const doneTasks=tasks.filter(t=>t.status==='completed');
  if(!doneTasks.length){ toast('완료된 Task가 없습니다'); return; }
  if(!confirm(`완료된 Task ${doneTasks.length}개를 삭제할까요?`))return;
  try{
    await apiCall(`/lists/${curListId}/tasks/clear`,'POST');
    tasks=tasks.filter(t=>t.status!=='completed');
    renderList();toast(`🗑️ ${doneTasks.length}개 삭제됨`);
  }catch(e){ toast('❌ 삭제 실패'); }
}

/* ══ RENDER ══ */
function setFilter(f){
  curFilter=f;
  ['all','active','done'].forEach(x=>{
    document.getElementById('f-'+x).classList.toggle('on',x===f);
  });
  renderList();
}

function onListChange(){
  curListId=document.getElementById('list-select').value;
  const saved=ld();saved.listId=curListId;sv(saved);
  fetchTasks();
}

function syncWithGoogle(){ fetchTasks(); }

function renderList(){
  const total=tasks.length;
  const done=tasks.filter(t=>t.status==='completed').length;
  document.getElementById('cnt-total').textContent=total;
  document.getElementById('cnt-active').textContent=total-done;
  document.getElementById('cnt-done').textContent=done;

  const list=document.getElementById('task-list');
  list.innerHTML='';

  let filtered=[...tasks];
  if(curFilter==='active') filtered=filtered.filter(t=>t.status!=='completed');
  else if(curFilter==='done') filtered=filtered.filter(t=>t.status==='completed');

  if(!filtered.length){
    list.innerHTML=`<div class="empty"><div class="ei">☑️</div><p>${curFilter==='done'?'완료된 Task가 없습니다':'할 일을 추가해보세요'}</p></div>`;
    return;
  }

  filtered.forEach(task=>{
    const isDone=task.status==='completed';
    const el=document.createElement('div');
    el.className='ti'+(isDone?' done':'');

    let metaHtml='';
    if(task.due){
      const d=new Date(task.due);
      const ds=`${d.getFullYear()}.${p2(d.getMonth()+1)}.${p2(d.getDate())}`;
      metaHtml+=`<span class="t-due-tag">📅 ${ds}</span>`;
    }
    if(task.updated){
      const u=new Date(task.updated);
      metaHtml+=`<span>${p2(u.getMonth()+1)}/${p2(u.getDate())} 업데이트</span>`;
    }

    el.innerHTML=`
      <div class="t-chk" onclick="toggleTask('${task.id}')">${isDone?'✓':''}</div>
      <div class="t-body">
        <div class="t-title">${esc(task.title||'(제목 없음)')}</div>
        ${metaHtml?`<div class="t-meta">${metaHtml}</div>`:''}
      </div>
      <div class="t-actions">
        <button class="t-btn" onclick="startEdit(this,'${task.id}')" title="수정">✏️</button>
        <button class="t-btn" onclick="deleteTask('${task.id}')" title="삭제" style="color:var(--rose);">×</button>
      </div>`;
    list.appendChild(el);
  });
}

function startEdit(btn, id){
  const item=btn.closest('.ti');
  const titleEl=item.querySelector('.t-title');
  const curTitle=tasks.find(t=>t.id===id)?.title||'';
  item.classList.add('editing');
  const inp=document.createElement('input');
  inp.className='t-edit-inp';inp.value=curTitle;inp.maxLength=100;
  titleEl.replaceWith(inp);inp.focus();inp.select();
  const saveBtn=document.createElement('button');
  saveBtn.className='t-save-btn';saveBtn.textContent='저장';
  item.querySelector('.t-body').appendChild(saveBtn);
  btn.textContent='✅';
  const finish=()=>{ updateTaskTitle(id,inp.value); };
  btn.onclick=finish;saveBtn.onclick=finish;
  inp.onkeydown=e=>{if(e.key==='Enter')finish();if(e.key==='Escape')renderList();};
}
