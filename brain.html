<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Brain Dump — Henry</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--s1:#12121a;--s2:#1a1a26;--s3:#222232;--s4:#2a2a3e;
  --text:#f0f0f8;--text2:#b0b0c8;--text3:#606080;
  --green:#30c060;--green-d:#0a2818;--rose:#ff5060;--blue:#4a8fff;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;}
.shell{display:flex;flex-direction:column;width:100%;max-width:480px;margin:0 auto;height:100dvh;height:100vh;overflow:hidden;}

/* HEADER */
.hdr{flex-shrink:0;padding:calc(var(--safe-t)+8px) 16px 8px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.back{background:var(--s2);border:1px solid var(--border2);color:var(--text2);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;text-decoration:none;flex-shrink:0;touch-action:manipulation;transition:all .15s;}
.back:active{transform:scale(.92);}
.hdr-c{flex:1;text-align:center;}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--green);line-height:1;}
.hdr-sub{font-size:9px;letter-spacing:2px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;margin-top:2px;}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.scroll::-webkit-scrollbar{width:2px;}
.scroll::-webkit-scrollbar-thumb{background:var(--s3);}
.body{padding:14px 14px 90px;}

/* SECTION LABEL */
.sec{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-weight:500;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}

/* DATE NAV */
.dnav{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.darr{background:var(--s2);border:1px solid var(--border2);color:var(--text2);width:40px;height:40px;border-radius:11px;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation;}
.darr:active{transform:scale(.92);}
.darr.dim{opacity:.3;pointer-events:none;}
.dctr{flex:1;text-align:center;background:var(--s2);border:1px solid var(--border);border-radius:11px;padding:7px 4px;cursor:pointer;}
.dstr{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;}
.ddow{font-size:11px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;}
.today-tag{font-size:9px;color:var(--blue);font-weight:700;}

/* STATS */
.streak-row{display:flex;gap:8px;margin-bottom:14px;}
.streak-card{flex:1;background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;}
.streak-num{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--green);line-height:1;}
.streak-lbl{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px;}

/* BRAIN BOX */
.brain-box{background:linear-gradient(135deg,#12121a,#0a1e10);border:1px solid rgba(48,192,96,.25);border-radius:16px;padding:16px;margin-bottom:14px;}
.brain-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.brain-title{font-size:16px;font-weight:700;color:var(--green);}
.brain-cnt{background:var(--green-d);border:1px solid rgba(48,192,96,.35);border-radius:20px;padding:3px 12px;font-family:'DM Mono',monospace;font-size:12px;color:var(--green);font-weight:700;}

/* MEMO ROWS */
.memo-items{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.memo-row{display:flex;align-items:flex-start;gap:9px;}
.mnum{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--green);opacity:.35;line-height:1;padding-top:9px;min-width:18px;}
.minp{flex:1;background:var(--s2);border:1px solid rgba(48,192,96,.15);border-radius:11px;padding:11px 13px;color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;resize:none;min-height:80px;line-height:1.7;overflow-y:hidden;word-break:break-all;box-sizing:border-box;}
.minp:focus{border-color:rgba(48,192,96,.5);background:var(--s3);}
.minp::placeholder{color:var(--text3);font-size:12px;}
.minp.fil{border-color:rgba(48,192,96,.3);}
.mrow-del{background:none;border:none;color:rgba(255,255,255,.25);font-size:18px;cursor:pointer;padding:4px 4px 0;touch-action:manipulation;flex-shrink:0;margin-top:8px;transition:all .18s;}
.mrow-del:active{color:var(--rose);transform:scale(.9);}

.brain-add-btn{width:100%;margin-top:10px;background:rgba(48,192,96,.1);border:1.5px dashed rgba(48,192,96,.35);color:rgba(48,192,96,.8);padding:11px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;touch-action:manipulation;transition:all .18s;}
.brain-add-btn:active{background:rgba(48,192,96,.2);}
.save-btn{width:100%;background:var(--green);border:none;color:#0a0a0f;padding:15px;border-radius:13px;cursor:pointer;font-size:16px;font-weight:900;font-family:'Noto Sans KR',sans-serif;touch-action:manipulation;transition:all .2s;box-shadow:0 0 20px rgba(48,192,96,.3);margin-top:12px;}
.save-btn:active{transform:scale(.98);background:#26a050;}

/* ARCHIVE */
.arc-card{background:var(--s1);border:1px solid rgba(48,192,96,.15);border-radius:14px;padding:13px;margin-bottom:9px;}
.arc-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--green);font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.arc-item{display:flex;gap:7px;padding:4px 0;border-bottom:1px solid var(--border);}
.arc-item:last-child{border:none;}
.arc-n{color:var(--green);opacity:.45;font-size:11px;font-family:'Bebas Neue',sans-serif;min-width:14px;}
.arc-text{font-size:13px;color:var(--text2);line-height:1.5;}
.empty-v{text-align:center;padding:30px 0;color:var(--text3);font-size:13px;}
.empty-v .ei{font-size:36px;margin-bottom:8px;}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--safe-b)+16px);left:50%;transform:translateX(-50%) translateY(50px);opacity:0;background:var(--text);color:var(--bg);padding:9px 18px;border-radius:22px;font-size:13px;font-weight:700;transition:all .28s;z-index:300;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* BOTTOM NAV */
.bnav{flex-shrink:0;background:rgba(10,10,15,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.16);display:flex;padding-bottom:var(--safe-b);}
.nb{flex:1;background:none;border:none;color:#606080;padding:9px 2px 7px;cursor:pointer;font-size:9.5px;font-family:'Noto Sans KR',sans-serif;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .18s;touch-action:manipulation;}
.nb .ni{font-size:21px;transition:transform .18s;}
.nb:active .ni{transform:scale(1.2);}
.nb.on{color:var(--green);}
.nb.on .ni{filter:drop-shadow(0 0 5px var(--green));}
</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <a class="back" href="index.html">←</a>
    <div class="hdr-c">
      <div class="hdr-title">🧠 Brain Dump</div>
      <div class="hdr-sub">머릿속을 비워내는 자유 기록</div>
    </div>
    <div style="width:36px;"></div>
  </div>

  <div class="scroll">
    <div class="body">

      <div class="dnav">
        <button class="darr" id="btn-prev" onclick="chDate(-1)">‹</button>
        <div class="dctr" onclick="goToday()">
          <div class="dstr" id="dstr">—</div>
          <div class="ddow" id="ddow">—</div>
          <div class="today-tag" id="today-tag"></div>
        </div>
        <button class="darr" id="btn-next" onclick="chDate(1)">›</button>
      </div>

      <div class="streak-row">
        <div class="streak-card"><div class="streak-num" id="streak-num">0</div><div class="streak-lbl">연속 일수 🔥</div></div>
        <div class="streak-card"><div class="streak-num" id="total-days">0</div><div class="streak-lbl">총 기록일</div></div>
        <div class="streak-card"><div class="streak-num" id="today-cnt">0</div><div class="streak-lbl">오늘 메모</div></div>
      </div>

      <div class="brain-box">
        <div class="brain-hdr">
          <div class="brain-title">오늘의 메모 🧠</div>
          <div class="brain-cnt" id="bcnt">0 / 0</div>
        </div>
        <div class="memo-items" id="memo-items"></div>
        <button class="brain-add-btn" onclick="addMemoItem()">+ 메모 추가</button>
        <button class="save-btn" onclick="saveBrain()">💾 메모 저장하기</button>
      </div>

      <div class="sec">이전 기록</div>
      <div id="archive"></div>

    </div>

    <nav class="bnav">
      <button class="nb" style="color:var(--blue);" onclick="window.location.href='index.html'">
        <span class="ni">🏠</span>홈
      </button>
      <button class="nb" onclick="window.location.href='habits.html'">
        <span class="ni">✅</span>습관
      </button>
      <button class="nb" onclick="window.location.href='gratitude.html'">
        <span class="ni">🙏</span>감사
      </button>
      <button class="nb on" onclick="window.location.href='brain.html'">
        <span class="ni">🧠</span>Brain
      </button>
      <button class="nb" onclick="window.location.href='gtask.html'">
        <span class="ni">☑️</span>Tasks
      </button>
      <button class="nb" onclick="window.location.href='gcal.html'">
        <span class="ni">📅</span>캘린더
      </button>
      <button class="nb" onclick="window.location.href='backup.html'"><span class="ni">☁️</span>백업
      </button>
    </nav>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const KEY = 'henry_v9';
function ld(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}return{habits:[],records:{},grat:{},braindump:{},tasks:[],todos:[],info:{}};}
function sv(){try{localStorage.setItem(KEY,JSON.stringify(D));}catch(e){}}
let D=ld();

// 구버전 braindump(문자열) 마이그레이션
if(typeof D.braindump === 'string'){
  const old = D.braindump;
  D.braindump = {};
  const today = (()=>{const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');})();
  if(old.trim()) D.braindump[today] = [old.trim()];
  sv();
}
if(!D.braindump || typeof D.braindump !== 'object') { D.braindump = {}; }

function p2(n){return String(n).padStart(2,'0');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function todayStr(){const n=new Date();return n.getFullYear()+'-'+p2(n.getMonth()+1)+'-'+p2(n.getDate());}
function addDays(s,n){const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);dt.setDate(dt.getDate()+n);return dt.getFullYear()+'-'+p2(dt.getMonth()+1)+'-'+p2(dt.getDate());}
function fmtDisp(s){const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);const dw=['일','월','화','수','목','금','토'];return{str:y+'.'+p2(m)+'.'+p2(d),dow:dw[dt.getDay()]+'요일'};}
let curD=todayStr();
function chDate(d){const nxt=addDays(curD,d);if(nxt>addDays(todayStr(),1))return;curD=nxt;render();}
function goToday(){curD=todayStr();render();}

let toastT=null;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1700);}

function calcStreak(){
  let streak=0;const today=new Date();
  for(let i=0;i<365;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const k=d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());
    const g=(D.braindump||{})[k]||[];
    if(g.some(x=>x&&x.trim()))streak++;else break;
  }
  return streak;
}

function updateCnt(){
  const inputs=[...document.querySelectorAll('.minp')];
  const filled=inputs.filter(x=>x.value.trim()).length;
  const total=inputs.length;
  document.getElementById('bcnt').textContent=filled+' / '+total;
  document.getElementById('today-cnt').textContent=filled;
}

function reIndex(){
  document.querySelectorAll('.memo-row').forEach((row,i)=>{
    const n=row.querySelector('.mnum');if(n)n.textContent=i+1;
    const ta=row.querySelector('.minp');if(ta)ta.placeholder='메모 '+(i+1)+'번째...';
  });
  updateCnt();
}

function makeRow(idx,val){
  const row=document.createElement('div');row.className='memo-row';
  const num=document.createElement('div');num.className='mnum';num.textContent=idx+1;
  const ta=document.createElement('textarea');
  ta.className='minp'+(val&&val.trim()?' fil':'');
  ta.placeholder='메모 '+(idx+1)+'번째...';
  ta.value=val||'';
  ta.addEventListener('input',function(){
    this.style.height='0px';
    this.style.height=Math.max(this.scrollHeight+2,80)+'px';
    updateCnt();
    if(this.value.trim())this.classList.add('fil');else this.classList.remove('fil');
  });
  const del=document.createElement('button');del.className='mrow-del';del.textContent='×';del.title='삭제';
  del.onclick=()=>{
    const rows=document.querySelectorAll('.memo-row');
    if(rows.length<=1){toast('최소 1개는 있어야 해요');return;}
    row.remove();reIndex();
  };
  row.appendChild(num);row.appendChild(ta);row.appendChild(del);
  return row;
}

function addMemoItem(){
  const cont=document.getElementById('memo-items');
  const i=cont.querySelectorAll('.memo-row').length;
  const row=makeRow(i,'');
  cont.appendChild(row);reIndex();
  row.querySelector('.minp').focus();
  row.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function render(){
  const f=fmtDisp(curD),tod=todayStr(),tom=addDays(tod,1),yes=addDays(tod,-1);
  document.getElementById('dstr').textContent=f.str;
  document.getElementById('ddow').textContent=f.dow;
  document.getElementById('today-tag').textContent=curD===tod?'오늘':curD===tom?'내일':curD===yes?'어제':'';
  document.getElementById('btn-next').classList.toggle('dim',curD>=tom);
  document.getElementById('streak-num').textContent=calcStreak();
  const allDates=Object.keys(D.braindump||{}).filter(d=>(D.braindump[d]||[]).some(x=>x&&x.trim()));
  document.getElementById('total-days').textContent=allDates.length;

  const saved=(D.braindump||{})[curD]||[];
  const items=saved.length>=3?[...saved]:[...saved,...Array(3-saved.length).fill('')];
  const cont=document.getElementById('memo-items');cont.innerHTML='';
  items.forEach((val,i)=>{
    const row=makeRow(i,val);cont.appendChild(row);
    if(val&&val.trim()){const ta=row.querySelector('.minp');ta.style.height='0px';ta.style.height=Math.max(ta.scrollHeight+2,80)+'px';}
  });
  updateCnt();

  const arc=document.getElementById('archive');arc.innerHTML='';
  const dates=Object.keys(D.braindump||{})
    .filter(d=>(D.braindump[d]||[]).some(x=>x&&x.trim())&&d!==curD)
    .sort((a,b)=>b.localeCompare(a));
  if(!dates.length){arc.innerHTML='<div class="empty-v"><div class="ei">🧠</div>아직 다른 날의 기록이 없어요</div>';return;}
  dates.slice(0,20).forEach(d=>{
    const f2=fmtDisp(d);
    const entries=(D.braindump[d]||[]).filter(x=>x&&x.trim());
    const card=document.createElement('div');card.className='arc-card';
    card.innerHTML='<div class="arc-date">📅 '+f2.str+' ('+f2.dow+')'
      +'<span style="background:rgba(48,192,96,.15);color:var(--green);border:1px solid rgba(48,192,96,.3);border-radius:12px;padding:1px 8px;font-size:10px;font-family:\'DM Mono\',monospace;">'+entries.length+'개 작성</span>'
      +'</div><div>'+entries.map((e,i)=>'<div class="arc-item"><span class="arc-n">'+(i+1)+'</span><span class="arc-text">'+esc(e)+'</span></div>').join('')+'</div>';
    arc.appendChild(card);
  });
}

function saveBrain(){
  const vals=[...document.querySelectorAll('.minp')].map(x=>x.value.trim());
  if(!D.braindump)D.braindump={};
  D.braindump[curD]=vals;
  sv();render();
  toast('🧠 메모 저장됨');
}

render();
</script>
<script>
/* ══ SWIPE NAVIGATION ══ */
(function(){
  const path=location.pathname.split('/').pop()||'index.html';
  const PAGES=['index.html','habits.html','gratitude.html','brain.html','gcal.html'];
  const NAMES=['🏠 홈','✅ 습관','🙏 감사','🧠 Brain','📅 캘린더'];
  const curIdx=PAGES.indexOf(path);
  let sx=0,sy=0,st=0;
  const MIN_DIST=55,MAX_VERT=90,MAX_TIME=500;
  const hint=document.createElement('div');
  hint.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.72);color:#fff;padding:11px 22px;border-radius:26px;font-family:\'Noto Sans KR\',sans-serif;font-size:14px;font-weight:700;pointer-events:none;opacity:0;transition:opacity .18s;z-index:9999;white-space:nowrap;';
  document.body.appendChild(hint);
  let ht;
  function showHint(msg){hint.textContent=msg;hint.style.opacity='1';clearTimeout(ht);ht=setTimeout(()=>hint.style.opacity='0',700);}
  function go(dir){
    if(curIdx<0)return;
    const ni=curIdx-dir;if(ni<0||ni>=PAGES.length)return;
    const shell=document.querySelector('.shell');
    if(shell){shell.style.transition='transform .2s ease,opacity .2s ease';shell.style.transform='translateX('+(dir>0?'-':'')+'80px)';shell.style.opacity='0';}
    setTimeout(()=>{window.location.href=PAGES[ni];},180);
  }
  document.addEventListener('touchstart',e=>{
    const sa=document.querySelector('.scroll,.scroll-area');
    if(sa&&sa.scrollTop>4&&sa.contains(e.target))return;
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(!sx)return;
    const dx=e.changedTouches[0].clientX-sx;
    const dy=Math.abs(e.changedTouches[0].clientY-sy);
    const dt=Date.now()-st;sx=0;
    if(dt>MAX_TIME||Math.abs(dx)<MIN_DIST||dy>MAX_VERT)return;
    if(dx<0){const ni=curIdx+1;if(ni>=PAGES.length){showHint('📅 마지막 페이지');return;}showHint(NAMES[ni]+' →');setTimeout(()=>go(-1),160);}
    else{const ni=curIdx-1;if(ni<0){showHint('← 첫 페이지');return;}showHint('← '+NAMES[ni]);setTimeout(()=>go(1),160);}
  },{passive:true});
  const shell=document.querySelector('.shell');
  if(shell){
    shell.style.opacity='0';shell.style.transform='translateY(5px)';shell.style.transition='none';
    requestAnimationFrame(()=>{shell.style.transition='transform .2s ease,opacity .2s ease';shell.style.transform='translateY(0)';shell.style.opacity='1';});
  }
})();
</script>
</body>
</html>
