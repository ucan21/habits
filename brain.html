<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Brain Dump — Henry</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--s1:#12121a;--s2:#1a1a26;--s3:#222232;
  --text:#f0f0f8;--text2:#b0b0c8;--text3:#606080;
  --green:#30c060;--green-d:#0a2818;--rose:#ff5060;--blue:#4a8fff;--gold:#ffc020;
  --border:rgba(255,255,255,0.08);--wborder:rgba(255,255,255,0.5);
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;}
.shell{display:flex;flex-direction:column;width:100%;max-width:480px;margin:0 auto;height:100dvh;height:100vh;overflow:hidden;}
.hdr{flex-shrink:0;padding:calc(var(--safe-t)+8px) 16px 8px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.back{background:var(--s2);border:none;outline:none;color:#fff;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;text-decoration:none;flex-shrink:0;-webkit-appearance:none;appearance:none;cursor:pointer;touch-action:manipulation;font-family:inherit;line-height:1;}
.back:active{transform:scale(.92);}
.hdr-c{flex:1;text-align:center;}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--green);line-height:1;}
.hdr-sub{font-size:9px;letter-spacing:2px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;margin-top:2px;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.scroll::-webkit-scrollbar{width:2px;}
.scroll::-webkit-scrollbar-thumb{background:var(--s3);}
.body{padding:14px 14px 90px;}

/* 통계 */
.stats-row{display:flex;gap:8px;margin-bottom:14px;}
.stat-pill{flex:1;background:var(--s1);border:1.5px solid var(--wborder);border-radius:12px;padding:11px 8px;text-align:center;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--green);line-height:1;}
.stat-lbl{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px;}

/* 필터 */
.filter-row{display:flex;gap:6px;margin-bottom:12px;}
.fbtn{background:var(--s1);border:1.5px solid var(--wborder);border-radius:20px;padding:6px 16px;font-size:12px;color:var(--text2);cursor:pointer;white-space:nowrap;touch-action:manipulation;font-weight:500;transition:all .15s;}
.fbtn.on{background:var(--green);border-color:var(--green);color:#0a0a0f;}

/* 항목 카드 */
.items-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.item-card{background:var(--s1);border:1.5px solid var(--wborder);border-radius:14px;padding:13px 13px 10px;}
.item-ta{
  width:100%;background:transparent;border:none;
  color:var(--text);font-size:15px;font-weight:500;
  font-family:'Noto Sans KR',sans-serif;
  outline:none;resize:none;min-height:44px;
  line-height:1.65;word-break:break-all;
  -webkit-appearance:none;display:block;
}
.item-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:7px;border-top:1px solid var(--border);}
.item-date{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;}
.item-del{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;opacity:.22;touch-action:manipulation;padding:0 4px;}
.item-del:active{opacity:1;color:var(--rose);}

/* 새 항목 입력 박스 */
.add-box{background:linear-gradient(135deg,var(--s1),var(--green-d));border:1.5px solid rgba(48,192,96,.35);border-radius:16px;padding:14px;}
.add-box-label{font-size:12px;font-weight:700;color:var(--green);margin-bottom:10px;letter-spacing:.5px;}
.add-ta{
  width:100%;background:var(--s2);
  border:1.5px solid var(--wborder);border-radius:11px;
  padding:13px 14px;color:var(--text);
  font-size:15px;font-family:'Noto Sans KR',sans-serif;
  outline:none;resize:none;min-height:100px;
  line-height:1.7;word-break:break-all;
  -webkit-appearance:none;display:block;
  transition:border-color .2s;
}
.add-ta:focus{border-color:var(--green);}
.add-ta::placeholder{color:var(--text3);font-size:14px;}
.save-btn{
  width:100%;margin-top:10px;
  background:var(--green);border:none;
  color:#0a0a0f;padding:15px;border-radius:12px;
  cursor:pointer;font-size:15px;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;
  touch-action:manipulation;letter-spacing:.5px;
}
.save-btn:active{transform:scale(.98);filter:brightness(.9);}

.empty{text-align:center;padding:28px 0;color:var(--text3);}
.empty .ei{font-size:34px;margin-bottom:8px;}
.empty p{font-size:13px;line-height:1.6;}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--safe-b)+66px);left:50%;transform:translateX(-50%) translateY(50px);opacity:0;background:#fff;color:#0a0a0f;padding:9px 18px;border-radius:22px;font-size:13px;font-weight:700;transition:all .28s;z-index:300;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* NAV */
.bnav{flex-shrink:0;background:rgba(10,10,15,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.12);display:flex;padding-bottom:var(--safe-b);}
.nb{flex:1;background:none;border:none;color:var(--text3);padding:9px 2px 7px;cursor:pointer;font-size:9.5px;font-family:'Noto Sans KR',sans-serif;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .18s;touch-action:manipulation;}
.nb .ni{font-size:21px;}
.nb.on{color:var(--green);}
</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <a class="back" href="index.html">←</a>
    <div class="hdr-c">
      <div class="hdr-title">🧠 Brain Dump</div>
      <div class="hdr-sub">머릿속을 비워내는 자유 기록</div>
    </div>
    <div style="width:36px;"></div>
  </div>

  <div class="scroll">
    <div class="body">

      <!-- 통계 -->
      <div class="stats-row">
        <div class="stat-pill"><div class="stat-num" id="cnt-total">0</div><div class="stat-lbl">전체</div></div>
        <div class="stat-pill"><div class="stat-num" id="cnt-today">0</div><div class="stat-lbl">오늘</div></div>
      </div>

      <!-- 필터 -->
      <div class="filter-row">
        <button class="fbtn on" onclick="setFilter('all',this)">전체</button>
        <button class="fbtn" onclick="setFilter('today',this)">오늘</button>
      </div>

      <!-- 기존 항목 목록 -->
      <div class="items-list" id="items-list"></div>

      <!-- 새 항목 추가 -->
      <div class="add-box">
        <div class="add-box-label">+ 새로운 생각 기록</div>
        <textarea class="add-ta" id="new-inp"
          placeholder="지금 머릿속에 있는 것을 자유롭게 적어보세요...&#10;&#10;아이디어, 고민, 할 일, 떠오른 생각 무엇이든"></textarea>
        <button class="save-btn" onclick="addItem()">💾 저장</button>
      </div>

    </div>
  </div>

  <nav class="bnav">
    <button class="nb" onclick="location.href='index.html'"><span class="ni">🏠</span>홈</button>
    <button class="nb" onclick="location.href='habits.html'"><span class="ni">✅</span>습관</button>
    <button class="nb" onclick="location.href='gratitude.html'"><span class="ni">🙏</span>감사</button>
    <button class="nb on"><span class="ni">🧠</span>Brain</button>
    <button class="nb" onclick="location.href='gcal.html'"><span class="ni">📅</span>캘린더</button>
    <button class="nb" onclick="location.href='backup.html'"><span class="ni">☁️</span>백업</button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
const KEY='henry_brain_v1';
function ld(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}return{items:[]};}
function sv(){try{localStorage.setItem(KEY,JSON.stringify(BD));}catch(e){}}
let BD=ld();
let curFilter='all';

function p2(n){return String(n).padStart(2,'0');}
function todayStr(){const n=new Date();return n.getFullYear()+'-'+p2(n.getMonth()+1)+'-'+p2(n.getDate());}
function nowStr(){const n=new Date();return`${n.getFullYear()}.${p2(n.getMonth()+1)}.${p2(n.getDate())} ${p2(n.getHours())}:${p2(n.getMinutes())}`;}
let toastT;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1700);}

function setFilter(f,btn){
  curFilter=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function fit(ta){
  ta.style.height='0px';
  ta.style.height=Math.max(ta.scrollHeight+2,44)+'px';
}

function render(){
  const today=todayStr();
  let items=[...BD.items].sort((a,b)=>b.id-a.id);
  if(curFilter==='today') items=items.filter(i=>i.date===today);

  document.getElementById('cnt-total').textContent=BD.items.length;
  document.getElementById('cnt-today').textContent=BD.items.filter(i=>i.date===today).length;

  const list=document.getElementById('items-list');
  list.innerHTML='';

  if(!items.length){
    list.innerHTML=`<div class="empty"><div class="ei">🧠</div><p>${curFilter==='today'?'오늘 기록이 없습니다':'아래에서 첫 생각을 기록해보세요'}</p></div>`;
    return;
  }

  items.forEach(item=>{
    const card=document.createElement('div');
    card.className='item-card';

    // 직접 편집 가능한 textarea
    const ta=document.createElement('textarea');
    ta.className='item-ta';
    ta.value=item.text;
    ta.spellcheck=false;

    ta.addEventListener('input',function(){ fit(this); });

    // 포커스 잃으면 자동 저장
    ta.addEventListener('blur',function(){
      const v=this.value.trim();
      if(!v){
        if(confirm('내용이 없습니다. 이 항목을 삭제할까요?')){
          BD.items=BD.items.filter(i=>i.id!==item.id);
          sv();render();toast('🗑️ 삭제됨');
        } else {
          this.value=item.text;fit(this);
        }
        return;
      }
      if(v!==item.text){
        item.text=v;sv();toast('✅ 수정됨');
      }
    });

    const footer=document.createElement('div');
    footer.className='item-footer';

    const dateSpan=document.createElement('span');
    dateSpan.className='item-date';
    dateSpan.textContent=item.createdAt||item.date;

    const delBtn=document.createElement('button');
    delBtn.className='item-del';
    delBtn.textContent='×';
    delBtn.title='삭제';
    delBtn.onclick=()=>{
      if(!confirm('삭제할까요?'))return;
      BD.items=BD.items.filter(i=>i.id!==item.id);
      sv();render();toast('🗑️ 삭제됨');
    };

    footer.appendChild(dateSpan);
    footer.appendChild(delBtn);
    card.appendChild(ta);
    card.appendChild(footer);
    list.appendChild(card);

    // DOM 삽입 후 높이 맞춤
    fit(ta);
  });
}

function addItem(){
  const inp=document.getElementById('new-inp');
  const v=inp.value.trim();
  if(!v){toast('내용을 입력하세요');return;}
  BD.items.push({id:Date.now(),text:v,date:todayStr(),createdAt:nowStr()});
  inp.value='';
  inp.style.height='100px';
  sv();render();
  toast('✅ 저장됨');
  document.querySelector('.scroll').scrollTo({top:0,behavior:'smooth'});
}

// 새 입력창 자동 높이
document.getElementById('new-inp').addEventListener('input',function(){
  this.style.height='0px';
  this.style.height=Math.max(this.scrollHeight+2,100)+'px';
});

render();
</script>
</body>
</html>
