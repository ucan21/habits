<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Franklin Planner — Henry</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--s1:#12121a;--s2:#1a1a26;--s3:#222232;--s4:#2a2a3e;
  --text:#f0f0f8;--text2:#b0b0c8;--text3:#606080;
  --blue:#4a8fff;--teal:#28c490;--gold:#ffc020;--gold-d:#3a2800;
  --violet:#9060ff;--rose:#ff5060;--orange:#ff8830;--green:#30c060;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;}
.shell{display:flex;flex-direction:column;width:100%;max-width:480px;margin:0 auto;height:100dvh;height:100vh;overflow:hidden;}

/* HEADER */
.hdr{flex-shrink:0;padding:calc(var(--safe-t)+8px) 14px 0;background:var(--bg);border-bottom:1px solid var(--border);}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.back{background:var(--s2);border:1px solid var(--border2);color:var(--text2);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;text-decoration:none;flex-shrink:0;touch-action:manipulation;}
.back:active{transform:scale(.92);}
.hdr-c{flex:1;text-align:center;}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--gold);line-height:1;}
.hdr-sub{font-size:9px;letter-spacing:2px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;margin-top:1px;}

/* TABS — scrollable */
.tabs{display:flex;gap:0;overflow-x:auto;padding:0 2px;-webkit-overflow-scrolling:touch;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;background:none;border:none;color:rgba(255,255,255,0.55);padding:11px 18px 10px;cursor:pointer;font-size:15px;font-family:'Noto Sans KR',sans-serif;font-weight:700;border-bottom:2px solid transparent;transition:all .2s;touch-action:manipulation;white-space:nowrap;}
.tab.on{color:#ffffff;border-bottom-color:#ffffff;text-shadow:0 0 12px rgba(255,255,255,0.4);}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.scroll::-webkit-scrollbar{width:2px;}
.scroll::-webkit-scrollbar-thumb{background:var(--s3);}
.body{padding:14px 14px 90px;}

/* VIEWS */
.pview{display:none;}
.pview.on{display:block;animation:fi .15s ease;}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}

/* COMMON */
.sec{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#ffffff;font-family:'DM Mono',monospace;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-weight:700;opacity:.9;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}
.card{background:var(--s1);border:1px solid var(--border);border-radius:15px;padding:14px;margin-bottom:12px;}
.row{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.lbl{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.5px;}
.inp{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:11px;padding:11px 13px;color:#ffffff;font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;font-weight:500;}
.inp:focus{border-color:var(--gold);}
.inp::placeholder{color:var(--text3);font-size:12px;}
.ta{resize:none;min-height:72px;line-height:1.6;}
.savebtn{width:100%;padding:13px;border:none;border-radius:12px;cursor:pointer;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;touch-action:manipulation;transition:all .2s;}
.savebtn:active{transform:scale(.98);}
.gold-btn{background:var(--gold);color:#0a0a0f;box-shadow:0 0 16px rgba(255,192,32,.25);}
.blue-btn{background:rgba(74,143,255,.15);border:1px solid rgba(74,143,255,.3);color:var(--blue);}
.violet-btn{background:rgba(144,96,255,.15);border:1px solid rgba(144,96,255,.3);color:var(--violet);}
.teal-btn{background:rgba(40,196,144,.15);border:1px solid rgba(40,196,144,.3);color:var(--teal);}

/* MISSION */
.mission-display{background:linear-gradient(135deg,#12121a,#1a1a2e);border:1px solid rgba(255,192,32,.25);border-radius:15px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden;}
.mission-display::before{content:'"';font-family:'Bebas Neue',sans-serif;font-size:80px;color:rgba(255,192,32,.06);position:absolute;top:-8px;left:8px;line-height:1;pointer-events:none;}
.mission-text{font-size:15px;font-weight:500;color:var(--text);line-height:1.7;word-break:keep-all;}

/* VALUE / ROLE ITEMS */
.item-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.vitem{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:12px 13px;display:flex;align-items:flex-start;gap:10px;}
.vnum{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);opacity:.38;line-height:1;flex-shrink:0;padding-top:1px;}
.vcontent{flex:1;}
.vtitle{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:3px;}
.vdesc{font-size:13px;color:var(--text2);line-height:1.5;}
.vdel{background:none;border:none;color:var(--text3);font-size:17px;cursor:pointer;opacity:.25;touch-action:manipulation;padding:2px;}
.vdel:active{opacity:1;color:var(--rose);}
.ritem{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:12px 13px;}
.rname{font-size:14px;font-weight:700;color:var(--violet);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
.rgoal{font-size:13px;color:var(--text2);line-height:1.5;}

/* WEEKLY */
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.warr{background:var(--s2);border:1px solid var(--border2);color:var(--text2);width:40px;height:40px;border-radius:11px;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation;}
.warr:active{transform:scale(.92);}
.wlabel{flex:1;text-align:center;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--text);background:var(--s2);border:1px solid var(--border);border-radius:11px;padding:9px 4px;}
.compass-item{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:12px 13px;margin-bottom:8px;}
.compass-role{font-size:11px;font-weight:700;color:var(--violet);letter-spacing:.5px;margin-bottom:6px;text-transform:uppercase;}
.compass-ta{width:100%;background:transparent;border:none;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;resize:none;min-height:36px;line-height:1.5;}
.compass-ta::placeholder{color:var(--text3);}

/* DAILY */
.date-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.darr{background:var(--s2);border:1px solid var(--border2);color:var(--text2);width:40px;height:40px;border-radius:11px;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation;}
.darr:active{transform:scale(.92);}
.darr.dim{opacity:.3;pointer-events:none;}
.dctr{flex:1;text-align:center;background:var(--s2);border:1px solid var(--border);border-radius:11px;padding:7px 4px;cursor:pointer;}
.dstr{font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:#ffffff;}
.ddow{font-size:13px;color:rgba(255,255,255,0.8);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;font-weight:600;}
.today-tag{font-size:11px;color:#ffffff;font-weight:700;background:var(--blue);padding:1px 8px;border-radius:10px;margin-top:3px;display:inline-block;}

/* ABC tasks */
.abc-sec{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:13px;margin-bottom:10px;}
.abc-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.abc-badge{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;font-weight:700;flex-shrink:0;}
.abc-A .abc-badge{background:rgba(255,80,96,.2);color:#ff5060;border:1px solid rgba(255,80,96,.35);}
.abc-B .abc-badge{background:rgba(255,136,48,.2);color:#ff8830;border:1px solid rgba(255,136,48,.35);}
.abc-C .abc-badge{background:rgba(74,143,255,.2);color:#4a8fff;border:1px solid rgba(74,143,255,.35);}
.abc-info{flex:1;}
.abc-title{font-size:14px;font-weight:700;color:#ffffff;}
.abc-sub{font-size:12px;color:rgba(255,255,255,0.6);margin-top:2px;}
.task-list{display:flex;flex-direction:column;gap:5px;margin-bottom:8px;}
.task-item{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 11px;display:flex;align-items:center;gap:9px;}
.task-item.editing{background:var(--s3);border-color:rgba(74,143,255,.4);}
.t-edit-inp{flex:1;background:transparent;border:none;color:var(--text);font-size:13px;font-weight:500;font-family:'Noto Sans KR',sans-serif;outline:none;padding:0;}
.t-edit-btn{background:none;border:none;color:var(--blue);font-size:13px;cursor:pointer;padding:2px 5px;touch-action:manipulation;flex-shrink:0;}
.t-edit-btn:active{opacity:.6;}
.task-item.done-t{opacity:.4;}
.task-item.done-t .t-lbl{text-decoration:line-through;color:var(--text3);}
.tchk{width:22px;height:22px;border-radius:6px;border:2px solid var(--s4);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .18s;font-size:11px;color:transparent;background:var(--s3);touch-action:manipulation;}
.abc-A .task-item.done-t .tchk{background:#ff5060;border-color:#ff5060;color:#fff;}
.abc-B .task-item.done-t .tchk{background:#ff8830;border-color:#ff8830;color:#0a0a0f;}
.abc-C .task-item.done-t .tchk{background:#4a8fff;border-color:#4a8fff;color:#fff;}
.t-lbl{flex:1;font-size:13px;font-weight:500;color:var(--text);}
.t-del{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;opacity:.28;touch-action:manipulation;flex-shrink:0;}
.t-del:active{opacity:1;color:var(--rose);}
.abc-add{display:flex;gap:6px;}
.abc-inp{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;}
.abc-inp::placeholder{color:var(--text3);font-size:12px;}
.abc-A .abc-inp:focus{border-color:#ff5060;}
.abc-B .abc-inp:focus{border-color:#ff8830;}
.abc-C .abc-inp:focus{border-color:#4a8fff;}
.abc-btn{border:none;color:#fff;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:18px;font-weight:700;line-height:1;touch-action:manipulation;}
.abc-btn:active{transform:scale(.9);}

/* GOALS */
.gcat{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:13px;margin-bottom:10px;}
.gcat-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.gcat-icon{font-size:18px;}
.gcat-title{font-size:14px;font-weight:700;}
.goal-items{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
.goal-item{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:11px 12px;display:flex;align-items:flex-start;gap:9px;}
.goal-item.done-g{opacity:.4;}
.goal-item.done-g .g-lbl{text-decoration:line-through;color:var(--text3);}
.g-chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--s4);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .18s;font-size:11px;color:transparent;background:var(--s3);touch-action:manipulation;margin-top:1px;}
.goal-item.done-g .g-chk{background:var(--teal);border-color:var(--teal);color:#0a0a0f;}
.g-lbl-w{flex:1;}
.g-lbl{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;}
.g-dead{font-size:10px;color:var(--text3);margin-top:2px;font-family:'DM Mono',monospace;}
.g-del{background:none;border:none;color:var(--text3);font-size:15px;cursor:pointer;opacity:.2;touch-action:manipulation;}
.g-del:active{opacity:1;color:var(--rose);}
.goal-add{display:flex;flex-direction:column;gap:6px;}
.goal-add-row{display:flex;gap:6px;}
.g-inp{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;}
.g-inp:focus{border-color:var(--teal);}
.g-inp::placeholder{color:var(--text3);font-size:12px;}
.g-dead-inp{background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:9px 10px;color:var(--text);font-size:11px;font-family:'DM Mono',monospace;outline:none;width:100px;flex-shrink:0;}
.g-dead-inp:focus{border-color:var(--teal);}
.g-dead-inp::placeholder{color:var(--text3);}
.g-add-btn{border:none;color:#0a0a0f;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:18px;font-weight:700;line-height:1;background:var(--teal);touch-action:manipulation;}
.g-add-btn:active{transform:scale(.9);}

.empty-v{text-align:center;padding:20px 0;color:var(--text3);font-size:13px;}
.empty-v .ei{font-size:28px;margin-bottom:6px;}
/* 미션·가치 카드 */
.mission-card,.values-card{background:linear-gradient(135deg,#12121a,#1a1a2e);border:1px solid rgba(255,192,32,.3);border-radius:14px;padding:15px;margin-bottom:12px;position:relative;}
.mission-text-show{font-size:17px;font-weight:700;color:#ffffff;line-height:1.8;word-break:keep-all;font-family:'Nanum Myeongjo','Georgia',serif;white-space:pre-wrap;text-shadow:0 0 20px rgba(255,255,255,0.15);}
.val-display{font-size:17px;font-weight:700;color:#ffffff;line-height:1.8;word-break:keep-all;white-space:pre-wrap;}
.mission-toggle-btn{margin-top:10px;background:rgba(255,192,32,.1);border:1px solid rgba(255,192,32,.25);color:var(--gold);padding:6px 14px;border-radius:9px;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:500;touch-action:manipulation;}
.mission-toggle-btn:active{background:rgba(255,192,32,.22);}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--safe-b)+16px);left:50%;transform:translateX(-50%) translateY(50px);opacity:0;background:var(--text);color:var(--bg);padding:9px 18px;border-radius:22px;font-size:13px;font-weight:700;transition:all .28s;z-index:300;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* ── BOTTOM HOME NAV ── */
.bnav{
  flex-shrink:0;
  background:rgba(10,10,15,0.97);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.16);
  display:flex;
  padding-bottom:var(--safe-b);
}
.nb{
  flex:1;background:none;border:none;color:#606080;
  padding:9px 2px 7px;
  cursor:pointer;font-size:9.5px;
  font-family:'Noto Sans KR',sans-serif;font-weight:500;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:color .18s;touch-action:manipulation;
}
.nb .ni{font-size:21px;transition:transform .18s;}
.nb:active .ni{transform:scale(1.2);}
.nb.nb-home{color:#4a8fff;}
.nb.nb-home .ni{filter:drop-shadow(0 0 5px #4a8fff);}

</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <div class="hdr-top">
      <a class="back" href="index.html">←</a>
      <div class="hdr-c">
        <div class="hdr-title">📖 Franklin Planner</div>
        <div class="hdr-sub">소중한 것을 먼저 하라</div>
      </div>
      <div style="width:36px;"></div>
    </div>
    <div class="tabs">
      <button class="tab on" onclick="ptab('daily',this)">📋 To-Do</button>
      <button class="tab" onclick="ptab('goals',this)">🎯 목표</button>
    </div>
  </div>

  <div class="scroll" id="fp-scroll">
    <div class="body">





      <!-- ══ ToDo ══ -->
      <div class="pview on" id="pview-daily">
        <div class="date-nav">
          <button class="darr" onclick="chDay(-1)">‹</button>
          <div class="dctr" onclick="goDayToday()">
            <div class="dstr" id="fp-dstr">—</div>
            <div class="ddow" id="fp-ddow">—</div>
            <div class="today-tag" id="fp-today-tag"></div>
          </div>
          <button class="darr" id="fp-next" onclick="chDay(1)">›</button>
        </div>

        <!-- 미션선언문 표시 -->
        <div class="sec">🌟 미션 선언문</div>
        <div class="mission-card" id="mission-card">
          <div class="mission-text-show" id="mission-show">—</div>
          <textarea class="inp ta mission-edit" id="mission-inp" placeholder="나의 미션 선언문을 입력하세요...&#10;예) 나는 지속적인 성장과 감사함으로 충만한 삶을 살아간다." style="min-height:70px;display:none;"></textarea>
          <div class="mission-edit-btns" id="mission-edit-btns" style="display:none;margin-top:8px;">
            <button class="savebtn gold-btn" style="padding:10px;" onclick="saveMission()">💾 저장</button>
          </div>
          <button class="mission-toggle-btn" id="mission-toggle" onclick="toggleMissionEdit()">✏️ 편집</button>
        </div>

        <!-- 핵심가치 표시 -->
        <div class="sec">💎 핵심 가치</div>
        <div class="values-card" id="values-card">
          <div class="val-display" id="val-display">—</div>
          <textarea class="inp ta" id="val-inp" placeholder="나의 핵심 가치를 입력하세요...&#10;예) 성장 · 건강 · 감사 · 책임감 · 가족" style="min-height:60px;display:none;"></textarea>
          <div id="val-edit-btns" style="display:none;margin-top:8px;">
            <button class="savebtn" style="background:rgba(255,192,32,.15);border:1px solid rgba(255,192,32,.3);color:var(--gold);padding:10px;" onclick="saveValues()">💾 저장</button>
          </div>
          <button class="mission-toggle-btn" id="val-toggle" onclick="toggleValEdit()">✏️ 편집</button>
        </div>

        <div class="sec">📋 우선순위 업무 (ABC)</div>
        <div class="abc-sec abc-A">
          <div class="abc-hdr"><div class="abc-badge">A</div><div class="abc-info"><div class="abc-title">A — 반드시 해야 할 일</div><div class="abc-sub">오늘 안 하면 심각한 결과 초래</div></div></div>
          <div class="task-list" id="tasks-A"></div>
          <div class="abc-add"><input class="abc-inp" id="inp-A" placeholder="A 업무 추가..." maxlength="50" onkeydown="if(event.key==='Enter'){addDTask('A');this.blur();}"><button class="abc-btn" style="background:#ff5060;" onclick="addDTask('A')">+</button></div>
        </div>
        <div class="abc-sec abc-B">
          <div class="abc-hdr"><div class="abc-badge">B</div><div class="abc-info"><div class="abc-title">B — 해야 할 일</div><div class="abc-sub">중요하지만 여유가 있음</div></div></div>
          <div class="task-list" id="tasks-B"></div>
          <div class="abc-add"><input class="abc-inp" id="inp-B" placeholder="B 업무 추가..." maxlength="50" onkeydown="if(event.key==='Enter'){addDTask('B');this.blur();}"><button class="abc-btn" style="background:#ff8830;" onclick="addDTask('B')">+</button></div>
        </div>
        <div class="abc-sec abc-C">
          <div class="abc-hdr"><div class="abc-badge">C</div><div class="abc-info"><div class="abc-title">C — 하면 좋은 일</div><div class="abc-sub">여유 있을 때 처리</div></div></div>
          <div class="task-list" id="tasks-C"></div>
          <div class="abc-add"><input class="abc-inp" id="inp-C" placeholder="C 업무 추가..." maxlength="50" onkeydown="if(event.key==='Enter'){addDTask('C');this.blur();}"><button class="abc-btn" style="background:#4a8fff;" onclick="addDTask('C')">+</button></div>
        </div>

        <div class="sec">📔 일일 저널</div>
        <div class="card">
          <textarea class="inp ta" style="min-height:120px;" id="daily-journal" placeholder="오늘 있었던 일, 깨달음, 느낀 점을 자유롭게 기록하세요..." style="min-height:120px;font-size:16px;color:#ffffff;font-weight:500;line-height:1.75;"></textarea>
        </div>
        <button class="savebtn gold-btn" onclick="saveDaily()">💾 오늘 저장</button>
      </div>

      <!-- ══ 목표 ══ -->
      <div class="pview" id="pview-goals">
        <div style="font-size:12px;color:var(--text3);margin-bottom:14px;line-height:1.6;">4가지 삶의 영역별로 목표를 관리합니다.</div>
        <div class="gcat" id="gcat-body">
          <div class="gcat-hdr"><span class="gcat-icon">💪</span><div class="gcat-title" style="color:var(--orange);">신체 / 건강</div></div>
          <div class="goal-items" id="goals-body"></div>
          <div class="goal-add"><div class="goal-add-row"><input class="g-inp" id="ginp-body" placeholder="건강 목표..." maxlength="50" onkeydown="if(event.key==='Enter'){addGoal('body');this.blur();}"><input class="g-dead-inp" id="gdead-body" placeholder="기한"><button class="g-add-btn" onclick="addGoal('body')">+</button></div></div>
        </div>
        <div class="gcat" id="gcat-mind">
          <div class="gcat-hdr"><span class="gcat-icon">🧠</span><div class="gcat-title" style="color:var(--violet);">정신 / 지성</div></div>
          <div class="goal-items" id="goals-mind"></div>
          <div class="goal-add"><div class="goal-add-row"><input class="g-inp" id="ginp-mind" placeholder="독서, 학습 목표..." maxlength="50" onkeydown="if(event.key==='Enter'){addGoal('mind');this.blur();}"><input class="g-dead-inp" id="gdead-mind" placeholder="기한"><button class="g-add-btn" onclick="addGoal('mind')">+</button></div></div>
        </div>
        <div class="gcat" id="gcat-finance">
          <div class="gcat-hdr"><span class="gcat-icon">💰</span><div class="gcat-title" style="color:var(--gold);">재정 / 투자</div></div>
          <div class="goal-items" id="goals-finance"></div>
          <div class="goal-add"><div class="goal-add-row"><input class="g-inp" id="ginp-finance" placeholder="재정 목표..." maxlength="50" onkeydown="if(event.key==='Enter'){addGoal('finance');this.blur();}"><input class="g-dead-inp" id="gdead-finance" placeholder="기한"><button class="g-add-btn" onclick="addGoal('finance')">+</button></div></div>
        </div>
        <div class="gcat" id="gcat-social">
          <div class="gcat-hdr"><span class="gcat-icon">🤝</span><div class="gcat-title" style="color:var(--teal);">사회 / 관계</div></div>
          <div class="goal-items" id="goals-social"></div>
          <div class="goal-add"><div class="goal-add-row"><input class="g-inp" id="ginp-social" placeholder="관계 목표..." maxlength="50" onkeydown="if(event.key==='Enter'){addGoal('social');this.blur();}"><input class="g-dead-inp" id="gdead-social" placeholder="기한"><button class="g-add-btn" onclick="addGoal('social')">+</button></div></div>
        </div>
      </div>

    </div>
    <!-- BOTTOM NAV -->
  <nav class="bnav">
    <button class="nb" style="color:var(--blue);" onclick="window.location.href='index.html'">
      <span class="ni">🏠</span>홈
    </button>
    <button class="nb" onclick="window.location.href='habits.html'">
      <span class="ni">✅</span>습관
    </button>
    <button class="nb" onclick="window.location.href='gratitude.html'">
      <span class="ni">🙏</span>감사
    </button>
    <button class="nb" onclick="window.location.href='brain.html'">
      <span class="ni">🧠</span>Brain
    </button>
    <button class="nb on" onclick="window.location.href='franklin.html'">
      <span class="ni">📖</span>플래너
    </button>
    <button class="nb" onclick="window.location.href='gcal.html'">
      <span class="ni">📅</span>캘린더
    </button>
  </nav>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
const KEY='henry_franklin_v1';
function ld(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}return{mission:'',values:[],roles:[],weekly:{},goals:{body:[],mind:[],finance:[],social:[]},daily:{}};}
function sv(){try{localStorage.setItem(KEY,JSON.stringify(FP));}catch(e){}}
let FP=ld();
function p2(n){return String(n).padStart(2,'0');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function todayStr(){const n=new Date();return n.getFullYear()+'-'+p2(n.getMonth()+1)+'-'+p2(n.getDate());}
function addDays(s,n){const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);dt.setDate(dt.getDate()+n);return dt.getFullYear()+'-'+p2(dt.getMonth()+1)+'-'+p2(dt.getDate());}
function fmtDisp(s){const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);const dw=['일','월','화','수','목','금','토'];return{str:y+'.'+p2(m)+'.'+p2(d),dow:dw[dt.getDay()]+'요일'};}
function weekKey(s){const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);const day=dt.getDay();const mon=new Date(dt);mon.setDate(d-(day===0?6:day-1));return mon.getFullYear()+'-'+p2(mon.getMonth()+1)+'-'+p2(mon.getDate());}
function weekLabel(wk){const[y,m,d]=wk.split('-').map(Number);const dt=new Date(y,m-1,d);const sun=new Date(dt);sun.setDate(d+6);return `${y}.${p2(m)}.${p2(d)} ~ ${p2(sun.getMonth()+1)}.${p2(sun.getDate())}`;}
let toastT=null;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1700);}

/* TABS */
let curTab='daily';
function ptab(name,btn){
  document.querySelectorAll('.pview').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('pview-'+name).classList.add('on');
  btn.classList.add('on');
  curTab=name;
  document.getElementById('fp-scroll').scrollTop=0;
  if(name==='daily')renderDaily();
  else if(name==='goals')renderGoals();
}

/* MISSION */
/* ── 미션 선언문 & 핵심가치 (ToDo 화면 상단) ── */
function renderMissionBlock(){
  const m=FP.mission||'';
  const ms=document.getElementById('mission-show');
  const mi=document.getElementById('mission-inp');
  if(ms) ms.textContent=m||'(미션 선언문을 입력해주세요)';
  if(mi) mi.value=m;
  const vs=document.getElementById('val-display');
  const vi=document.getElementById('val-inp');
  const valText=(FP.values||[]).map(v=>v.title||v).filter(Boolean).join(' · ');
  if(vs) vs.textContent=valText||'(핵심 가치를 입력해주세요)';
  if(vi) vi.value=FP.valText||valText;
}
function toggleMissionEdit(){
  const inp=document.getElementById('mission-inp');
  const btns=document.getElementById('mission-edit-btns');
  const btn=document.getElementById('mission-toggle');
  const show=document.getElementById('mission-show');
  const editing=inp.style.display==='none'||!inp.style.display;
  inp.style.display=editing?'block':'none';
  btns.style.display=editing?'block':'none';
  show.style.display=editing?'none':'block';
  btn.textContent=editing?'✕ 닫기':'✏️ 편집';
  if(editing){inp.value=FP.mission||'';inp.focus();}
}
function saveMission(){
  const v=document.getElementById('mission-inp').value.trim();
  FP.mission=v;sv();
  toggleMissionEdit();
  renderMissionBlock();
  toast('🌟 미션 저장됨');
}
function toggleValEdit(){
  const inp=document.getElementById('val-inp');
  const btns=document.getElementById('val-edit-btns');
  const btn=document.getElementById('val-toggle');
  const show=document.getElementById('val-display');
  const editing=inp.style.display==='none'||!inp.style.display;
  inp.style.display=editing?'block':'none';
  btns.style.display=editing?'block':'none';
  show.style.display=editing?'none':'block';
  btn.textContent=editing?'✕ 닫기':'✏️ 편집';
  if(editing){
    // 기존 값 불러오기
    const valText=(FP.values||[]).map(v=>v.title||v).filter(Boolean).join('
');
    inp.value=FP.valRaw||valText;
    inp.focus();
  }
}
function saveValues(){
  const raw=document.getElementById('val-inp').value.trim();
  FP.valRaw=raw;
  // 줄바꿈 또는 · 로 구분해서 values 배열에 저장
  const items=raw.split(/
|·|,/).map(s=>s.trim()).filter(Boolean);
  FP.values=items.map(s=>({title:s,desc:''}));
  sv();toggleValEdit();renderMissionBlock();
  toast('💎 핵심 가치 저장됨');
}

/* 위클리 삭제됨 */

/* DAILY */
let curDay=todayStr();
function chDay(d){const nxt=addDays(curDay,d);if(nxt>addDays(todayStr(),1))return;curDay=nxt;renderDaily();}
function goDayToday(){curDay=todayStr();renderDaily();}
function ensureDay(){if(!FP.daily[curDay])FP.daily[curDay]={intent:'',tasks:{A:[],B:[],C:[]},journal:''};}
function renderDaily(){
  renderMissionBlock();
  const f=fmtDisp(curDay),tod=todayStr(),tom=addDays(tod,1),yes=addDays(tod,-1);
  document.getElementById('fp-dstr').textContent=f.str;document.getElementById('fp-ddow').textContent=f.dow;
  document.getElementById('fp-today-tag').textContent=curDay===tod?'오늘':curDay===tom?'내일':curDay===yes?'어제':'';
  document.getElementById('fp-next').classList.toggle('dim',curDay>=tom);
  const dd=FP.daily[curDay]||{intent:'',tasks:{A:[],B:[],C:[]},journal:''};
  document.getElementById('daily-intent').value=dd.intent||'';
  ['A','B','C'].forEach(t=>{
    const tl=document.getElementById('tasks-'+t);tl.innerHTML='';
    (dd.tasks&&dd.tasks[t]||[]).forEach((task,i)=>{tl.appendChild(mkDTaskEl(t,i,task));});
    if(!(dd.tasks&&dd.tasks[t]||[]).length)tl.innerHTML='<div style="padding:6px 0;font-size:12px;color:var(--text3);text-align:center;">항목 없음</div>';
  });
  document.getElementById('daily-journal').value=dd.journal||'';
}
function mkDTaskEl(type,i,task){
  const el=document.createElement('div');
  el.className='task-item'+(task.done?' done-t':'');
  el.dataset.type=type;el.dataset.idx=i;
  el.innerHTML=`
    <div class="tchk" onclick="togDTask('${type}',${i})">${task.done?'✓':''}</div>
    <div class="t-lbl">${esc(task.text)}</div>
    <button class="t-edit-btn" onclick="startEdit(this,'${type}',${i})" title="수정">✏️</button>
    <button class="t-del" onclick="delDTask('${type}',${i})">×</button>`;
  return el;
}
function startEdit(btn,type,i){
  const item=btn.closest('.task-item');
  const lbl=item.querySelector('.t-lbl');
  const curText=lbl.textContent;
  item.classList.add('editing');
  // 인라인 input으로 교체
  const inp=document.createElement('input');
  inp.className='t-edit-inp';
  inp.value=curText;
  inp.maxLength=50;
  lbl.replaceWith(inp);
  inp.focus();
  inp.select();
  // 수정 버튼 → 완료 버튼으로
  btn.textContent='✅';
  btn.onclick=()=>finishEdit(inp,btn,type,i);
  inp.onkeydown=e=>{if(e.key==='Enter'){finishEdit(inp,btn,type,i);}if(e.key==='Escape'){renderDaily();}};
  inp.onblur=()=>setTimeout(()=>finishEdit(inp,btn,type,i),150);
}
function finishEdit(inp,btn,type,i){
  const v=inp.value.trim();
  if(v){ensureDay();FP.daily[curDay].tasks[type][i].text=v;sv();}
  renderDaily();
}
function addDTask(type){const inp=document.getElementById('inp-'+type);const v=inp.value.trim();if(!v)return;ensureDay();if(!FP.daily[curDay].tasks[type])FP.daily[curDay].tasks[type]=[];FP.daily[curDay].tasks[type].push({text:v,done:false});inp.value='';sv();renderDaily();}
function togDTask(type,i){ensureDay();const t=FP.daily[curDay].tasks[type][i];if(!t)return;t.done=!t.done;sv();renderDaily();}
function delDTask(type,i){ensureDay();FP.daily[curDay].tasks[type].splice(i,1);sv();renderDaily();}
function saveDaily(){ensureDay();FP.daily[curDay].intent=document.getElementById('daily-intent').value.trim();FP.daily[curDay].journal=document.getElementById('daily-journal').value.trim();sv();toast('📔 오늘 저장됨');}

/* GOALS */
const GCATS=['body','mind','finance','social'];
function renderGoals(){GCATS.forEach(cat=>{const gl=document.getElementById('goals-'+cat);gl.innerHTML='';(FP.goals&&FP.goals[cat]||[]).forEach((g,i)=>{const el=document.createElement('div');el.className='goal-item'+(g.done?' done-g':'');el.innerHTML=`<div class="g-chk" onclick="togGoal('${cat}',${i})">${g.done?'✓':''}</div><div class="g-lbl-w"><div class="g-lbl">${esc(g.text)}</div>${g.deadline?`<div class="g-dead">기한: ${esc(g.deadline)}</div>`:''}</div><button class="g-del" onclick="delGoal('${cat}',${i})">×</button>`;gl.appendChild(el);});if(!(FP.goals&&FP.goals[cat]||[]).length)gl.innerHTML='<div style="padding:6px 0;font-size:12px;color:var(--text3);text-align:center;">목표 없음</div>';});}
function addGoal(cat){const v=document.getElementById('ginp-'+cat).value.trim();if(!v)return;const d=document.getElementById('gdead-'+cat).value.trim();if(!FP.goals)FP.goals={};if(!FP.goals[cat])FP.goals[cat]=[];FP.goals[cat].push({text:v,deadline:d,done:false});document.getElementById('ginp-'+cat).value='';document.getElementById('gdead-'+cat).value='';sv();renderGoals();toast('🎯 목표 추가됨');}
function togGoal(cat,i){FP.goals[cat][i].done=!FP.goals[cat][i].done;sv();renderGoals();}
function delGoal(cat,i){FP.goals[cat].splice(i,1);sv();renderGoals();}

/* INIT */
renderDaily();
</script>
</body>
</html>
