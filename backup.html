<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>백업 & 복원</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--s1:#12121a;--s2:#1a1a26;
  --text:#f0f0f8;--text2:#b0b0c8;--text3:#606080;
  --teal:#28c490;--blue:#4a8fff;--gold:#ffc020;--rose:#ff5060;--green:#34A853;
  --border:rgba(255,255,255,0.08);
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;}
.shell{display:flex;flex-direction:column;width:100%;max-width:480px;margin:0 auto;height:100dvh;height:100vh;overflow:hidden;}
.hdr{flex-shrink:0;padding:calc(var(--safe-t)+8px) 16px 8px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.back{background:var(--s2);border:none;color:#fff;width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;text-decoration:none;flex-shrink:0;}
.back:active{opacity:.7;}
.hdr-c{flex:1;text-align:center;}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--teal);line-height:1;}
.hdr-sub{font-size:8px;letter-spacing:2px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;margin-top:2px;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.body{padding:14px 14px 20px;}
.sec{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}

/* 데이터 현황 */
.data-card{background:var(--s1);border:1.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:16px;}
.data-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
.data-row:last-child{border:none;padding-bottom:0;}
.dr-key{font-size:13px;color:var(--text2);}
.dr-val{font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:var(--teal);}

/* 큰 버튼 */
.big-btn{display:flex;align-items:center;gap:14px;width:100%;padding:18px 16px;margin-bottom:12px;border:2px solid;border-radius:16px;cursor:pointer;touch-action:manipulation;background:var(--s1);text-align:left;-webkit-appearance:none;font-family:'Noto Sans KR',sans-serif;}
.big-btn:active{transform:scale(.97);}
.btn-icon{font-size:32px;flex-shrink:0;}
.btn-body{flex:1;}
.btn-title{font-size:16px;font-weight:700;margin-bottom:4px;}
.btn-sub{font-size:12px;color:var(--text3);line-height:1.5;}

.btn-save{border-color:rgba(40,196,144,.5);background:linear-gradient(135deg,var(--s1),#0a1e14);}
.btn-save .btn-title{color:var(--teal);}
.btn-load{border-color:rgba(74,143,255,.5);background:linear-gradient(135deg,var(--s1),#0a0a24);}
.btn-load .btn-title{color:var(--blue);}

/* 안내 박스 */
.guide-box{border-radius:14px;padding:14px 16px;margin-bottom:14px;border:1.5px solid;}
.guide-box.green{background:rgba(40,196,144,.08);border-color:rgba(40,196,144,.3);}
.guide-box.blue{background:rgba(74,143,255,.08);border-color:rgba(74,143,255,.3);}
.guide-box.gold{background:rgba(255,192,32,.08);border-color:rgba(255,192,32,.3);}
.guide-title{font-size:13px;font-weight:700;margin-bottom:8px;}
.guide-step{display:flex;gap:10px;margin-bottom:7px;align-items:flex-start;}
.guide-step:last-child{margin:0;}
.step-num{background:var(--teal);color:#0a0a0f;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;}
.step-num.blue{background:var(--blue);}
.step-txt{font-size:13px;color:var(--text2);line-height:1.6;}
.step-txt b{color:var(--text);}

/* 마지막 백업 */
.last-backup{background:var(--s1);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.lb-icon{font-size:22px;flex-shrink:0;}
.lb-info{flex:1;}
.lb-title{font-size:12px;font-weight:700;color:var(--text);}
.lb-time{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px;}

/* 토스트 */
.toast{position:fixed;bottom:calc(var(--safe-b)+80px);left:50%;transform:translateX(-50%) translateY(60px);opacity:0;background:#fff;color:#0a0a0f;padding:11px 22px;border-radius:22px;font-size:14px;font-weight:700;transition:all .28s;z-index:400;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* 성공 오버레이 */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.ov-box{background:var(--s1);border:1.5px solid rgba(40,196,144,.4);border-radius:20px;padding:32px 28px;text-align:center;max-width:300px;width:90%;}

/* 네비 */
.bnav{flex-shrink:0;background:rgba(10,10,15,.97);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.1);display:flex;padding-bottom:var(--safe-b);}
.nb{flex:1;background:none;border:none;color:var(--text3);padding:9px 2px 7px;cursor:pointer;font-size:9.5px;font-family:'Noto Sans KR',sans-serif;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;touch-action:manipulation;}
.nb .ni{font-size:21px;}
.nb.on{color:var(--teal);}
input[type=file]{display:none;}
</style>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/habits/sw.js', {scope:'/habits/'})
    .then(function(r){ console.log('SW registered:', r.scope); })
    .catch(function(e){ console.log('SW error:', e); });
}
</script>
</head>
<body>
<div class="shell">
  <!-- 상단 탭바 -->
  <nav style="flex-shrink:0;background:rgba(10,10,15,.98);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.15);display:flex;padding-top:calc(var(--safe-t)+6px);padding-bottom:6px;">
    <button onclick="location.href='index.html'" style="flex:1;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.4);padding:10px 2px 8px;cursor:pointer;font-size:10px;font-family:'Noto Sans KR',sans-serif;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;touch-action:manipulation;">
      <span style="font-size:22px;line-height:1;">🏠</span>
      홈
    </button>
    <button onclick="location.href='habits.html'" style="flex:1;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.4);padding:10px 2px 8px;cursor:pointer;font-size:10px;font-family:'Noto Sans KR',sans-serif;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;touch-action:manipulation;">
      <span style="font-size:22px;line-height:1;">✅</span>
      습관
    </button>
    <button onclick="location.href='gratitude.html'" style="flex:1;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.4);padding:10px 2px 8px;cursor:pointer;font-size:10px;font-family:'Noto Sans KR',sans-serif;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;touch-action:manipulation;">
      <span style="font-size:22px;line-height:1;">🙏</span>
      감사
    </button>
    <button onclick="location.href='brain.html'" style="flex:1;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.4);padding:10px 2px 8px;cursor:pointer;font-size:10px;font-family:'Noto Sans KR',sans-serif;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;touch-action:manipulation;">
      <span style="font-size:22px;line-height:1;">🧠</span>
      Brain
    </button>
    <button onclick="location.href='gtask.html'" style="flex:1;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.4);padding:10px 2px 8px;cursor:pointer;font-size:10px;font-family:'Noto Sans KR',sans-serif;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;touch-action:manipulation;">
      <span style="font-size:22px;line-height:1;">☑️</span>
      Tasks
    </button>
    <button onclick="location.href='backup.html'" style="flex:1;background:rgba(255,255,255,.15);border:none;border-bottom:2px solid #fff;color:#fff;padding:10px 2px 8px;cursor:pointer;font-size:10px;font-family:'Noto Sans KR',sans-serif;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;touch-action:manipulation;">
      <span style="font-size:22px;line-height:1;">💾</span>
      백업
    </button>
  </nav>

</div>

<!-- 성공 오버레이 -->
<div class="overlay" id="overlay">
  <div class="ov-box">
    <div style="font-size:56px;margin-bottom:14px;" id="ov-icon">✅</div>
    <div style="font-size:20px;font-weight:700;color:#fff;margin-bottom:8px;" id="ov-title">완료!</div>
    <div style="font-size:13px;color:var(--text2);line-height:1.7;" id="ov-msg">—</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var KEY_MAIN  = 'henry_v9';
var KEY_BRAIN = 'henry_brain_v1';
var KEY_LAST  = 'henry_last_backup';

/* ── 유틸 ── */
function p2(n){ return String(n).padStart(2,'0'); }
function fmtBytes(b){
  if(!b||b===0) return '0 B';
  if(b<1024) return b+' B';
  if(b<1048576) return (b/1024).toFixed(1)+' KB';
  return (b/1048576).toFixed(2)+' MB';
}
var _toastT;
function toast(msg, dur){
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_toastT);
  _toastT=setTimeout(function(){ el.classList.remove('show'); }, dur||2500);
}
function showOv(icon, title, msg){
  document.getElementById('ov-icon').textContent=icon;
  document.getElementById('ov-title').textContent=title;
  document.getElementById('ov-msg').textContent=msg;
  document.getElementById('overlay').classList.add('show');
}
function hideOv(){ document.getElementById('overlay').classList.remove('show'); }

/* ── 데이터 수집 ── */
function collectData(){
  var main={}, brain={};
  try{ main=JSON.parse(localStorage.getItem(KEY_MAIN)||'{}'); }catch(e){}
  try{ brain=JSON.parse(localStorage.getItem(KEY_BRAIN)||'{}'); }catch(e){}
  return {
    ver:'henry-v3',
    savedAt: new Date().toISOString(),
    savedAtKR: new Date().toLocaleString('ko-KR'),
    main: main,
    brain: brain
  };
}

/* ── 데이터 적용 ── */
function applyData(data){
  if(!data || typeof data !== 'object'){
    toast('❌ 올바른 백업 파일이 아닙니다'); return false;
  }
  try{
    if(data.main  !== undefined){ localStorage.setItem(KEY_MAIN,  JSON.stringify(data.main));  }
    if(data.brain !== undefined){ localStorage.setItem(KEY_BRAIN, JSON.stringify(data.brain)); }
    return true;
  }catch(e){
    toast('❌ 복원 실패: '+e.message); return false;
  }
}

/* ── 현황 업데이트 ── */
function updateUI(){
  try{
    var main={}, brain={};
    try{ main=JSON.parse(localStorage.getItem(KEY_MAIN)||'{}'); }catch(e){}
    try{ brain=JSON.parse(localStorage.getItem(KEY_BRAIN)||'{}'); }catch(e){}

    /* 습관 */
    var rec=main.records||{};
    var recDays=Object.keys(rec).filter(function(d){
      return rec[d]&&Object.values(rec[d]).some(function(v){return v;});
    });
    document.getElementById('d-habits').textContent=recDays.length+'일';

    /* 감사일기 */
    var grat=main.grat||{};
    var gratDays=Object.keys(grat).filter(function(k){
      if(k.indexOf('_photos')>-1) return false;
      var arr=grat[k];
      return Array.isArray(arr)&&arr.some(function(x){return x&&String(x).trim()&&!String(x).startsWith('data:');});
    });
    document.getElementById('d-grat').textContent=gratDays.length+'일';

    /* 사진 */
    var photoN=0;
    Object.keys(grat).forEach(function(k){
      if(k.indexOf('_photos')>-1) photoN+=(grat[k]||[]).length;
    });
    document.getElementById('d-photos').textContent=photoN+'장';

    /* Brain */
    document.getElementById('d-brain').textContent=((brain.items||[]).length)+'개';

    /* 크기 */
    var sz=(localStorage.getItem(KEY_MAIN)||'').length+(localStorage.getItem(KEY_BRAIN)||'').length;
    document.getElementById('d-size').textContent=fmtBytes(sz);

    /* 마지막 백업 */
    var lastT=localStorage.getItem(KEY_LAST);
    var lbTitle=document.getElementById('lb-title');
    var lbTime=document.getElementById('lb-time');
    var lbWrap=document.getElementById('last-backup');
    if(lastT){
      var d=new Date(parseInt(lastT));
      lbTitle.textContent='마지막 백업: 성공 ✅';
      lbTitle.style.color='var(--teal)';
      lbTime.textContent=d.getFullYear()+'.'+p2(d.getMonth()+1)+'.'+p2(d.getDate())+' '+p2(d.getHours())+':'+p2(d.getMinutes());
      lbWrap.style.borderColor='rgba(40,196,144,.3)';
    } else {
      lbTitle.textContent='⚠️ 아직 백업이 없습니다';
      lbTitle.style.color='var(--rose)';
      lbTime.textContent='지금 바로 저장하세요!';
      lbWrap.style.borderColor='rgba(255,80,96,.3)';
    }
  }catch(e){ console.error(e); }
}

/* ── 저장 (백업) ── */
function doSave(){
  var data=collectData();
  var json=JSON.stringify(data, null, 2);

  /* 파일명: HenryDiary_20260507_1430.json */
  var now=new Date();
  var fname='HenryDiary_'+now.getFullYear()+p2(now.getMonth()+1)+p2(now.getDate())+'_'+p2(now.getHours())+p2(now.getMinutes())+'.json';

  try{
    var blob=new Blob([json],{type:'application/json;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download=fname;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    /* 성공 기록 */
    localStorage.setItem(KEY_LAST, Date.now().toString());
    updateUI();

    showOv('📤','저장 완료!','파일명: '+fname+'\n\n파일 앱 → 다운로드 폴더에서 확인하세요.\n카카오톡으로 보내두면 더 안전합니다!');
    setTimeout(hideOv, 5000);

  }catch(e){
    toast('❌ 저장 실패: '+e.message);
  }
}

/* ── 복원 ── */
function doLoad(e){
  var file=e.target.files[0];
  if(!file){ return; }

  /* 파일명 검증 */
  if(!file.name.endsWith('.json')){
    toast('❌ .json 파일만 가능합니다'); e.target.value=''; return;
  }

  if(!confirm('📁 '+file.name+'\n\n이 파일로 복원할까요?\n현재 데이터는 덮어씌워집니다.')){
    e.target.value=''; return;
  }

  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);

      /* 기본 구조 검증 */
      if(!data.main && !data.brain){
        toast('❌ 유효하지 않은 백업 파일입니다'); return;
      }

      var ok=applyData(data);
      if(ok){
        showOv('✅','복원 완료!','저장일: '+(data.savedAtKR||data.savedAt||'알 수 없음')+'\n\n홈 화면으로 이동합니다...');
        setTimeout(function(){ location.href='index.html'; }, 3000);
      }
    }catch(err){
      toast('❌ 파일 읽기 실패: '+err.message);
      console.error(err);
    }
  };
  reader.onerror=function(){ toast('❌ 파일을 읽을 수 없습니다'); };
  reader.readAsText(file, 'UTF-8');
  e.target.value='';
}

/* 초기화 */
updateUI();
</script>
</body>
</html>
