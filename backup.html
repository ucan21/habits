<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>백업 & 복원 — Henry</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--s1:#12121a;--s2:#1a1a26;--s3:#222232;
  --text:#f0f0f8;--text2:#b0b0c8;--text3:#606080;
  --blue:#4a8fff;--teal:#28c490;--rose:#ff5060;--gold:#ffc020;--green:#34A853;
  --border:rgba(255,255,255,0.08);--wborder:rgba(255,255,255,0.65);
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;}
.shell{display:flex;flex-direction:column;width:100%;max-width:480px;margin:0 auto;height:100dvh;height:100vh;overflow:hidden;}
.hdr{flex-shrink:0;padding:calc(var(--safe-t)+8px) 16px 8px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.back{background:var(--s2);border:none;color:#fff;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;text-decoration:none;flex-shrink:0;-webkit-appearance:none;}
.back:active{opacity:.7;}
.hdr-c{flex:1;text-align:center;}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--teal);line-height:1;}
.hdr-sub{font-size:9px;letter-spacing:2px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;margin-top:2px;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.body{padding:14px 14px 90px;}
.sec{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#fff;font-family:'DM Mono',monospace;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}

/* 데이터 현황 */
.data-card{background:var(--s1);border:1.5px solid var(--wborder);border-radius:14px;padding:14px;margin-bottom:14px;}
.data-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.data-row:last-child{border:none;}
.dr-key{font-size:13px;color:var(--text2);}
.dr-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--teal);}

/* 버튼 */
.big-btn{display:flex;align-items:center;gap:14px;width:100%;padding:18px 16px;margin-bottom:10px;border:1.5px solid var(--wborder);border-radius:16px;cursor:pointer;touch-action:manipulation;transition:all .15s;background:var(--s1);text-align:left;}
.big-btn:active{transform:scale(.97);}
.btn-icon{font-size:30px;flex-shrink:0;}
.btn-body{flex:1;}
.btn-title{font-size:16px;font-weight:700;margin-bottom:3px;}
.btn-sub{font-size:12px;color:var(--text3);}
.btn-arr{font-size:20px;color:var(--text3);}

.btn-backup{border-color:rgba(52,168,83,.5);background:linear-gradient(135deg,var(--bg),#0a180a);}
.btn-backup .btn-title{color:#34A853;}
.btn-restore{border-color:rgba(74,143,255,.5);background:linear-gradient(135deg,var(--bg),#0a0a28);}
.btn-restore .btn-title{color:var(--blue);}
.btn-export{border-color:rgba(255,192,32,.4);background:linear-gradient(135deg,var(--bg),#1a1200);}
.btn-export .btn-title{color:var(--gold);}
.btn-import{border-color:rgba(255,136,48,.4);background:linear-gradient(135deg,var(--bg),#1a0a00);}
.btn-import .btn-title{color:#ff8830;}

/* 로그인 */
.google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:16px;background:#fff;border:none;border-radius:14px;cursor:pointer;touch-action:manipulation;font-size:15px;font-weight:700;color:#3c4043;font-family:'Noto Sans KR',sans-serif;margin-bottom:14px;}
.google-btn:active{transform:scale(.97);background:#f5f5f5;}
.g-logo{width:22px;height:22px;flex-shrink:0;}

/* 계정 */
.account-bar{background:var(--s1);border:1.5px solid var(--wborder);border-radius:14px;padding:13px 15px;margin-bottom:14px;display:flex;align-items:center;gap:11px;}
.acct-av{width:36px;height:36px;border-radius:50%;background:#4285F4;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;}
.acct-info{flex:1;}
.acct-name{font-size:14px;font-weight:700;color:#fff;}
.acct-email{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px;}
.logout-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text3);font-size:12px;padding:5px 10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.logout-btn:active{color:var(--rose);}

/* 백업 목록 */
.bk-item{background:var(--s1);border:1.5px solid var(--wborder);border-radius:13px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:11px;}
.bk-icon{font-size:22px;flex-shrink:0;}
.bk-info{flex:1;}
.bk-name{font-size:13px;font-weight:600;color:#fff;}
.bk-time{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px;}
.bk-restore-btn{background:rgba(52,168,83,.15);border:1px solid rgba(52,168,83,.4);border-radius:9px;color:#34A853;font-size:12px;font-weight:700;padding:7px 14px;cursor:pointer;touch-action:manipulation;font-family:'Noto Sans KR',sans-serif;}
.bk-restore-btn:active{background:rgba(52,168,83,.3);}

/* 진행 오버레이 */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.overlay.show{display:flex;}
.overlay-box{background:var(--s1);border:1.5px solid var(--wborder);border-radius:18px;padding:28px 32px;text-align:center;}
.overlay-icon{font-size:40px;margin-bottom:10px;}
.overlay-msg{font-size:15px;font-weight:700;color:#fff;}
.overlay-sub{font-size:12px;color:var(--text3);margin-top:6px;}

/* 토스트 */
.toast{position:fixed;bottom:calc(var(--safe-b)+70px);left:50%;transform:translateX(-50%) translateY(50px);opacity:0;background:#fff;color:#0a0a0f;padding:10px 20px;border-radius:22px;font-size:13px;font-weight:700;transition:all .28s;z-index:301;white-space:nowrap;max-width:300px;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

.bnav{flex-shrink:0;background:rgba(10,10,15,.97);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.1);display:flex;padding-bottom:var(--safe-b);}
.nb{flex:1;background:none;border:none;color:var(--text3);padding:9px 2px 7px;cursor:pointer;font-size:9.5px;font-family:'Noto Sans KR',sans-serif;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;touch-action:manipulation;}
.nb .ni{font-size:21px;}
.nb.on{color:var(--teal);}
input[type=file]{display:none;}
</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <a class="back" href="index.html">←</a>
    <div class="hdr-c"><div class="hdr-title">☁️ 백업 & 복원</div><div class="hdr-sub">Google Drive 연동</div></div>
    <div style="width:44px;"></div>
  </div>

  <div class="scroll">
    <div class="body">

      <!-- 데이터 현황 -->
      <div class="sec">📊 현재 데이터</div>
      <div class="data-card" id="data-card">
        <div class="data-row"><span class="dr-key">✅ 습관 기록일</span><span class="dr-val" id="d-records">—</span></div>
        <div class="data-row"><span class="dr-key">🙏 감사일기 기록일</span><span class="dr-val" id="d-grat">—</span></div>
        <div class="data-row"><span class="dr-key">🧠 Brain Dump</span><span class="dr-val" id="d-brain">—</span></div>
        <div class="data-row"><span class="dr-key">💾 데이터 크기</span><span class="dr-val" id="d-size">—</span></div>
      </div>

      <!-- 로그인 전 -->
      <div id="view-login">
        <div class="sec">☁️ Google Drive 로그인</div>
        <button class="google-btn" onclick="googleLogin()">
          <svg class="g-logo" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Google 계정으로 로그인
        </button>
      </div>

      <!-- 로그인 후 -->
      <div id="view-main" style="display:none;">
        <div class="account-bar">
          <div class="acct-av" id="acct-av">H</div>
          <div class="acct-info">
            <div class="acct-name" id="acct-name">—</div>
            <div class="acct-email" id="acct-email">—</div>
          </div>
          <button class="logout-btn" onclick="logout()">로그아웃</button>
        </div>

        <div class="sec">백업 / 복원</div>

        <button class="big-btn btn-backup" onclick="doBackup()">
          <span class="btn-icon">☁️</span>
          <div class="btn-body"><div class="btn-title">지금 백업하기</div><div class="btn-sub">모든 데이터를 Google Drive에 저장</div></div>
          <span class="btn-arr">›</span>
        </button>

        <button class="big-btn btn-export" onclick="exportJSON()">
          <span class="btn-icon">📤</span>
          <div class="btn-body"><div class="btn-title">JSON 파일 내보내기</div><div class="btn-sub">파일로 직접 저장 (오프라인 백업)</div></div>
          <span class="btn-arr">↓</span>
        </button>

        <button class="big-btn btn-import" onclick="document.getElementById('file-inp').click()">
          <span class="btn-icon">📥</span>
          <div class="btn-body"><div class="btn-title">JSON 파일 가져오기</div><div class="btn-sub">저장된 파일로 복원</div></div>
          <span class="btn-arr">↑</span>
        </button>
        <input type="file" id="file-inp" accept=".json" onchange="importJSON(event)">

        <div class="sec" style="margin-top:8px;">Drive 백업 목록</div>
        <div id="backup-list"><div style="text-align:center;padding:20px;color:var(--text3);font-size:13px;">목록 불러오는 중...</div></div>
      </div>

    </div>
  </div>

  <nav class="bnav">
    <button class="nb" onclick="location.href='index.html'"><span class="ni">🏠</span>홈</button>
    <button class="nb" onclick="location.href='habits.html'"><span class="ni">✅</span>습관</button>
    <button class="nb" onclick="location.href='gratitude.html'"><span class="ni">🙏</span>감사</button>
    <button class="nb" onclick="location.href='brain.html'"><span class="ni">🧠</span>Brain</button>
    <button class="nb on"><span class="ni">☁️</span>백업</button>
    <button class="nb" onclick="location.href='gcal.html'"><span class="ni">📅</span>캘린더</button>
  </nav>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="overlay-icon" id="ov-icon">☁️</div>
    <div class="overlay-msg" id="ov-msg">처리 중...</div>
    <div class="overlay-sub" id="ov-sub">잠시만 기다려주세요</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script>
/* ══ 설정 ══ */
const CLIENT_ID = '666312420187-34kaf8l0r0kspe5b0s8ebhospparlbbd.apps.googleusercontent.com';
const SCOPE = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile';
const KEYS = { main:'henry_v9', brain:'henry_brain_v1' };
const AUTH_KEY = 'henry_gauth_v2';
const FOLDER_NAME = 'HenryDiaryBackup';

let accessToken = null;
let tokenClient = null;
let folderId = null;

/* ── 유틸 ── */
function p2(n){return String(n).padStart(2,'0');}
function nowStr(){const n=new Date();return`${n.getFullYear()}.${p2(n.getMonth()+1)}.${p2(n.getDate())} ${p2(n.getHours())}:${p2(n.getMinutes())}`;}
function fmtBytes(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(2)+'MB';}
let toastT;
function toast(msg,dur=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),dur);}
function showOv(icon,msg,sub='잠시만 기다려주세요'){document.getElementById('ov-icon').textContent=icon;document.getElementById('ov-msg').textContent=msg;document.getElementById('ov-sub').textContent=sub;document.getElementById('overlay').classList.add('show');}
function hideOv(){document.getElementById('overlay').classList.remove('show');}

/* ── 데이터 수집/적용 ── */
function collectData(){
  const main=JSON.parse(localStorage.getItem(KEYS.main)||'{}');
  const brain=JSON.parse(localStorage.getItem(KEYS.brain)||'{}');
  return {ver:'henry-diary-v2', savedAt:new Date().toISOString(), main, brain};
}
function applyData(data){
  if(!data){toast('❌ 데이터가 없습니다');return false;}
  try{
    // main 데이터 적용
    if(data.main && Object.keys(data.main).length>0){
      localStorage.setItem(KEYS.main, JSON.stringify(data.main));
    }
    // brain 데이터 적용
    if(data.brain && Object.keys(data.brain).length>0){
      localStorage.setItem(KEYS.brain, JSON.stringify(data.brain));
    }
    updateUI();
    return true;
  }catch(e){toast('❌ 복원 실패: '+e.message);return false;}
}

/* ── 현황 업데이트 ── */
function updateUI(){
  try{
    const main=JSON.parse(localStorage.getItem(KEYS.main)||'{}');
    const brain=JSON.parse(localStorage.getItem(KEYS.brain)||'{}');
    const recs=Object.keys(main.records||{}).filter(d=>Object.values(main.records[d]||{}).some(v=>v));
    document.getElementById('d-records').textContent=recs.length+'일';
    const grats=Object.keys(main.grat||{}).filter(d=>!d.endsWith('_photos')&&(main.grat[d]||[]).some(x=>x&&x.trim()));
    document.getElementById('d-grat').textContent=grats.length+'일';
    document.getElementById('d-brain').textContent=(brain.items||[]).length+'개';
    const sz=(localStorage.getItem(KEYS.main)||'').length+(localStorage.getItem(KEYS.brain)||'').length;
    document.getElementById('d-size').textContent=fmtBytes(sz);
  }catch(e){}
}

/* ── Google 로그인 ── */
window.onload=function(){
  updateUI();
  const saved=JSON.parse(localStorage.getItem(AUTH_KEY)||'{}');
  if(saved.token && saved.user && Date.now()-saved.loginAt < 3500000){
    accessToken=saved.token;
    showMain(saved.user);
    loadList();
    // 마지막 자동백업이 1시간 이상 됐으면 자동 백업
    const lastAuto=parseInt(localStorage.getItem('henry_last_auto_backup')||'0');
    if(Date.now()-lastAuto > 60*60*1000){
      setTimeout(autoBackup, 2000); // 2초 후 자동 백업
    }
  }
  if(typeof google!=='undefined') initGIS();
  else document.querySelector('script[src*="gsi"]').addEventListener('load',initGIS);
};

/* ── 자동 백업 (조용히) ── */
async function autoBackup(){
  if(!accessToken) return;
  try{
    const folder=await getOrCreateFolder();
    const data=collectData();
    // 데이터가 비어있으면 백업 안 함
    const hasData=Object.keys(data.main).length>0||Object.keys(data.brain.items||[]).length>0;
    if(!hasData) return;
    const json=JSON.stringify(data,null,2);
    const name='henry-diary-AUTO-'+new Date().toISOString().slice(0,10)+'.json';
    const boundary='----AutoBoundary'+Date.now();
    const meta=JSON.stringify({name,parents:[folder]});
    const body=[
      `--${boundary}`,
      'Content-Type: application/json; charset=UTF-8',
      '',meta,'',
      `--${boundary}`,
      'Content-Type: application/json; charset=UTF-8',
      '',json,'',
      `--${boundary}--`
    ].join('\r\n');
    const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
      method:'POST',
      headers:{Authorization:'Bearer '+accessToken,'Content-Type':`multipart/related; boundary=${boundary}`},
      body
    });
    if(r.ok){
      localStorage.setItem('henry_last_auto_backup', Date.now().toString());
      toast('☁️ 자동 백업 완료', 2000);
    }
  }catch(e){ console.log('자동백업 실패:', e.message); }
}

function initGIS(){
  try{
    tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:CLIENT_ID, scope:SCOPE,
      callback:async(resp)=>{
        if(resp.error){toast('❌ 로그인 실패: '+resp.error);return;}
        accessToken=resp.access_token;
        const user=await fetchUser();
        localStorage.setItem(AUTH_KEY,JSON.stringify({token:accessToken,user,loginAt:Date.now()}));
        showMain(user);
        loadList();
      }
    });
  }catch(e){console.error('GIS init:',e);}
}

function googleLogin(){
  if(!tokenClient){toast('⏳ 초기화 중... 잠시 후 다시 시도');return;}
  tokenClient.requestAccessToken({prompt:'select_account'});
}

function logout(){
  if(accessToken) try{google.accounts.oauth2.revoke(accessToken,()=>{});}catch(e){}
  accessToken=null; folderId=null;
  localStorage.removeItem(AUTH_KEY);
  document.getElementById('view-login').style.display='block';
  document.getElementById('view-main').style.display='none';
  toast('👋 로그아웃됨');
}

function showMain(user){
  document.getElementById('view-login').style.display='none';
  document.getElementById('view-main').style.display='block';
  if(user){
    document.getElementById('acct-av').textContent=(user.name||user.email||'H')[0].toUpperCase();
    document.getElementById('acct-name').textContent=user.name||'—';
    document.getElementById('acct-email').textContent=user.email||'—';
  }
}

async function fetchUser(){
  const r=await fetch('https://www.googleapis.com/oauth2/v2/userinfo',{headers:{Authorization:'Bearer '+accessToken}});
  return r.json();
}

/* ── Drive API ── */
async function api(url,method='GET',body=null,ct='application/json'){
  const headers={Authorization:'Bearer '+accessToken};
  if(body && ct) headers['Content-Type']=ct;
  const opts={method,headers};
  if(body) opts.body=typeof body==='string'?body:JSON.stringify(body);
  const r=await fetch(url,opts);
  if(r.status===401){toast('🔑 세션 만료 — 다시 로그인');logout();throw new Error('401');}
  if(r.status===204||!r.headers.get('content-type')) return null;
  const text=await r.text();
  try{return JSON.parse(text);}catch(e){return text;}
}

/* ── 폴더 확인/생성 ── */
async function getOrCreateFolder(){
  if(folderId) return folderId;
  // 폴더 검색
  const q=encodeURIComponent(`name='${FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  const res=await api(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)&spaces=drive`);
  if(res&&res.files&&res.files.length>0){
    folderId=res.files[0].id;
    return folderId;
  }
  // 폴더 생성
  const created=await api('https://www.googleapis.com/drive/v3/files','POST',{
    name:FOLDER_NAME,
    mimeType:'application/vnd.google-apps.folder'
  });
  folderId=created.id;
  return folderId;
}

/* ── 백업 ── */
async function doBackup(){
  if(!accessToken){toast('❌ 먼저 로그인하세요');return;}
  showOv('☁️','Google Drive에 백업 중...','데이터를 업로드하고 있습니다');
  try{
    const folder=await getOrCreateFolder();
    const data=collectData();
    const json=JSON.stringify(data,null,2);
    const name=`henry-diary-${new Date().toISOString().slice(0,10)}-${Date.now()}.json`;

    // 단순 multipart 업로드
    const boundary='----HenryBoundary'+Date.now();
    const meta=JSON.stringify({name,parents:[folder]});
    const body=[
      `--${boundary}`,
      'Content-Type: application/json; charset=UTF-8',
      '',meta,'',
      `--${boundary}`,
      'Content-Type: application/json; charset=UTF-8',
      '',json,'',
      `--${boundary}--`
    ].join('\r\n');

    const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
      method:'POST',
      headers:{
        Authorization:'Bearer '+accessToken,
        'Content-Type':`multipart/related; boundary=${boundary}`
      },
      body
    });
    if(!r.ok) throw new Error(`업로드 실패: ${r.status}`);
    const result=await r.json();
    console.log('백업 파일 ID:', result.id);
    hideOv();
    toast('✅ 백업 완료! 파일: '+name, 3000);
    loadList();
  }catch(e){
    hideOv();
    toast('❌ 백업 실패: '+e.message);
    console.error(e);
  }
}

/* ── 파일 목록 ── */
async function loadList(){
  const container=document.getElementById('backup-list');
  try{
    const folder=await getOrCreateFolder();
    const q=encodeURIComponent(`'${folder}' in parents and trashed=false`);
    const res=await api(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,size,modifiedTime)&orderBy=modifiedTime+desc&pageSize=20`);
    const files=(res&&res.files)||[];
    if(!files.length){
      container.innerHTML='<div style="text-align:center;padding:24px;color:var(--text3);font-size:13px;">☁️ 백업 파일이 없습니다<br>위 버튼으로 첫 백업을 만들어보세요</div>';
      return;
    }
    container.innerHTML='';
    files.forEach(f=>{
      const mod=new Date(f.modifiedTime);
      const modStr=`${mod.getFullYear()}.${p2(mod.getMonth()+1)}.${p2(mod.getDate())} ${p2(mod.getHours())}:${p2(mod.getMinutes())}`;
      const sz=f.size?fmtBytes(parseInt(f.size)):'—';
      const item=document.createElement('div');
      item.className='bk-item';
      item.innerHTML=`<span class="bk-icon">📁</span>
        <div class="bk-info">
          <div class="bk-name">${f.name}</div>
          <div class="bk-time">📅 ${modStr} · 💾 ${sz}</div>
        </div>
        <button class="bk-restore-btn" onclick="restoreFile('${f.id}','${f.name}')">복원</button>`;
      container.appendChild(item);
    });
  }catch(e){
    container.innerHTML='<div style="text-align:center;padding:20px;color:var(--rose);font-size:13px;">⚠️ 목록 불러오기 실패<br>'+e.message+'</div>';
  }
}

/* ── 복원 ── */
async function restoreFile(fileId, fileName){
  if(!confirm(`📁 ${fileName}\n\n이 백업으로 복원할까요?\n현재 데이터가 덮어씌워집니다.`)) return;
  showOv('🔄','복원 중...','Drive에서 데이터를 가져오고 있습니다');
  try{
    // 파일 내용 다운로드
    const r=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{
      headers:{Authorization:'Bearer '+accessToken}
    });
    if(!r.ok) throw new Error(`다운로드 실패: ${r.status}`);
    const text=await r.text();
    const data=JSON.parse(text);
    console.log('복원 데이터:', Object.keys(data));

    const ok=applyData(data);
    hideOv();
    if(ok){
      hideOv();
      // 복원 성공 — 화면에 크게 표시
      document.getElementById('view-main').innerHTML=`
        <div style="text-align:center;padding:40px 20px;">
          <div style="font-size:60px;margin-bottom:16px;">✅</div>
          <div style="font-size:20px;font-weight:700;color:#fff;margin-bottom:8px;">복원 완료!</div>
          <div style="font-size:14px;color:#b0b0c8;margin-bottom:24px;">데이터가 성공적으로 복원됐습니다<br>홈으로 이동합니다...</div>
        </div>`;
      setTimeout(()=>{location.href='index.html';}, 2500);
    }
  }catch(e){
    hideOv();
    toast('❌ 복원 실패: '+e.message);
    console.error(e);
  }
}

/* ── JSON 내보내기/가져오기 ── */
function exportJSON(){
  const data=collectData();
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`henry-diary-${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(url);
  toast('📤 파일 저장됨');
}

function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!confirm(`📁 ${file.name}\n\n이 파일로 복원할까요?`))return;
      const ok=applyData(data);
      if(ok){
        toast('✅ 복원 완료! 홈으로 이동합니다...', 2000);
        setTimeout(()=>{location.href='index.html';},2000);
      }
    }catch(err){toast('❌ 파일 형식 오류');}
  };
  reader.readAsText(file);
  e.target.value='';
}
