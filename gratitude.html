<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Gratitude Journal — Henry</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--s1:#12121a;--s2:#1a1a26;--s3:#222232;--s4:#2a2a3e;
  --text:#f0f0f8;--text2:#b0b0c8;--text3:#606080;
  --gold:#ffc020;--gold-d:#3a2800;--rose:#ff5060;--blue:#4a8fff;--teal:#28c490;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;}
.shell{display:flex;flex-direction:column;width:100%;max-width:480px;margin:0 auto;height:100dvh;height:100vh;overflow:hidden;}
.hdr{flex-shrink:0;padding:calc(var(--safe-t)+8px) 16px 8px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.back{background:var(--s2);border:1px solid var(--wborder);color:#fff;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;text-decoration:none;flex-shrink:0;touch-action:manipulation;cursor:pointer;-webkit-appearance:none;}
.back:active{transform:scale(.92);}
.hdr-c{flex:1;text-align:center;}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--gold);line-height:1;}
.hdr-sub{font-size:9px;letter-spacing:2px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;margin-top:2px;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.scroll::-webkit-scrollbar{width:2px;}
.scroll::-webkit-scrollbar-thumb{background:var(--s3);}
.body{padding:14px 14px 90px;}
.sec{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-weight:500;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}
/* DATE NAV */
.dnav{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.darr{background:var(--s2);border:1px solid var(--border2);color:var(--text2);width:40px;height:40px;border-radius:11px;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation;}
.darr:active{transform:scale(.92);}
.darr.dim{opacity:.3;pointer-events:none;}
.dctr{flex:1;text-align:center;background:var(--s2);border:1px solid var(--border);border-radius:11px;padding:7px 4px;cursor:pointer;}
.dstr{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;}
.ddow{font-size:11px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;}
.today-tag{font-size:9px;color:var(--blue);font-weight:700;}
/* STREAK */
.streak-row{display:flex;gap:8px;margin-bottom:14px;}
.streak-card{flex:1;background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;}
.streak-num{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--gold);line-height:1;}
.streak-lbl{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px;}
/* GRAT ITEMS */
.grat-box{background:linear-gradient(135deg,#12121a,#1e1800);border:1px solid rgba(255,192,32,.25);border-radius:16px;padding:16px;margin-bottom:14px;}
.grat-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.grat-title{font-size:16px;font-weight:700;color:var(--gold);}
.grat-cnt{background:var(--gold-d);border:1px solid rgba(255,192,32,.35);border-radius:20px;padding:3px 12px;font-family:'DM Mono',monospace;font-size:12px;color:var(--gold);font-weight:700;}
.grat-items{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.grat-row{display:flex;align-items:flex-start;gap:9px;}
.gnum{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);opacity:.35;line-height:1;padding-top:9px;min-width:18px;}
.ginp{flex:1;background:var(--s2);border:1px solid rgba(255,192,32,.15);border-radius:11px;padding:11px 13px;color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;resize:none;min-height:80px;line-height:1.7;overflow-y:hidden;word-break:break-all;box-sizing:border-box;}
.ginp:focus{border-color:rgba(255,192,32,.5);background:var(--s3);}
.ginp::placeholder{color:var(--text3);font-size:12px;}
.ginp.fil{border-color:rgba(255,192,32,.3);}
/* 사진 기능 */
.photo-section{margin-bottom:12px;}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;}
.photo-item{position:relative;aspect-ratio:1;border-radius:11px;overflow:hidden;background:var(--s2);border:1px solid rgba(255,192,32,.2);}
.photo-item img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);border:none;color:#fff;width:22px;height:22px;border-radius:50%;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.photo-viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:999;align-items:center;justify-content:center;flex-direction:column;}
.photo-viewer.open{display:flex;}
.photo-viewer img{max-width:100%;max-height:85vh;object-fit:contain;border-radius:8px;}
.photo-viewer-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.2);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.photo-viewer-close:active{background:rgba(255,255,255,.4);}
.photo-viewer-nav{display:flex;gap:20px;margin-top:16px;}
.pv-nav-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:44px;height:44px;border-radius:50%;font-size:22px;cursor:pointer;touch-action:manipulation;}
.pv-nav-btn:active{background:rgba(255,255,255,.3);}
.photo-add-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;width:100%;padding:13px;background:rgba(255,192,32,.07);border:1.5px dashed rgba(255,192,32,.35);border-radius:11px;cursor:pointer;color:rgba(255,192,32,.8);font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;touch-action:manipulation;transition:all .18s;}
.photo-add-btn:active{background:rgba(255,192,32,.15);}
.photo-add-icon{font-size:24px;}
.photo-add-btns{display:flex;gap:7px;}
.photo-add-btns .photo-add-btn{flex:1;}
.grow-del{background:none;border:none;color:rgba(255,255,255,.22);font-size:20px;cursor:pointer;padding:2px 6px;touch-action:manipulation;flex-shrink:0;margin-top:6px;line-height:1;transition:all .15s;}
.grow-del:active{color:var(--rose);transform:scale(.9);}
.grat-add-btn{width:100%;margin:10px 0 0;background:rgba(255,192,32,.08);border:1.5px dashed rgba(255,192,32,.35);color:rgba(255,192,32,.75);padding:12px;border-radius:12px;cursor:pointer;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;touch-action:manipulation;transition:all .18s;}
.grat-add-btn:active{background:rgba(255,192,32,.18);}
.grow-del{background:none;border:none;color:rgba(255,255,255,.25);font-size:18px;cursor:pointer;padding:4px 4px 0;touch-action:manipulation;flex-shrink:0;margin-top:8px;transition:all .18s;}
.grow-del:active{color:var(--rose);transform:scale(.9);}
.grat-add-btn{width:100%;margin-top:10px;background:rgba(255,192,32,.1);border:1.5px dashed rgba(255,192,32,.35);color:rgba(255,192,32,.8);padding:11px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;touch-action:manipulation;transition:all .18s;}
.grat-add-btn:active{background:rgba(255,192,32,.2);}
.save-btn{width:100%;background:var(--gold);border:none;color:#0a0a0f;padding:15px;border-radius:13px;cursor:pointer;font-size:16px;font-weight:900;font-family:'Noto Sans KR',sans-serif;touch-action:manipulation;transition:all .2s;box-shadow:0 0 20px rgba(255,192,32,.3);position:sticky;bottom:0;z-index:5;}
.save-btn:active{transform:scale(.98);background:#e0a800;}
/* ARCHIVE */
.arc-card{background:var(--s1);border:1px solid rgba(255,192,32,.15);border-radius:14px;padding:13px;margin-bottom:9px;}
.arc-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.arc-item{display:flex;gap:7px;padding:4px 0;border-bottom:1px solid var(--border);}
.arc-item:last-child{border:none;}
.arc-n{color:var(--gold);opacity:.45;font-size:11px;font-family:'Bebas Neue',sans-serif;min-width:14px;}
.arc-text{font-size:13px;color:var(--text2);line-height:1.5;}
.empty-v{text-align:center;padding:30px 0;color:var(--text3);font-size:13px;}
.empty-v .ei{font-size:36px;margin-bottom:8px;}
/* TOAST */
.toast{position:fixed;bottom:calc(var(--safe-b)+16px);left:50%;transform:translateX(-50%) translateY(50px);opacity:0;background:var(--text);color:var(--bg);padding:9px 18px;border-radius:22px;font-size:13px;font-weight:700;transition:all .28s;z-index:300;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
#coinCanvas{position:fixed;inset:0;pointer-events:none;z-index:500;width:100%;height:100%;}

/* ── BOTTOM HOME NAV ── */
.bnav{
  flex-shrink:0;
  background:rgba(10,10,15,0.97);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.16);
  display:flex;
  padding-bottom:var(--safe-b);
}
.nb{
  flex:1;background:none;border:none;color:#606080;
  padding:9px 2px 7px;
  cursor:pointer;font-size:9.5px;
  font-family:'Noto Sans KR',sans-serif;font-weight:500;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:color .18s;touch-action:manipulation;
}
.nb .ni{font-size:21px;transition:transform .18s;}
.nb:active .ni{transform:scale(1.2);}
.nb.nb-home{color:#4a8fff;}
.nb.nb-home .ni{filter:drop-shadow(0 0 5px #4a8fff);}

</style>
</head>
<body>
<canvas id="coinCanvas"></canvas>
<div class="shell">
  <div class="hdr">
    <button class="back" onclick="location.href='index.html'">←</button>
    <div class="hdr-c">
      <div class="hdr-title">🙏 Today's Gratitude Journal</div>
      <div class="hdr-sub">오늘의 다섯 가지 감사</div>
    </div>
    <div style="width:36px;"></div>
  </div>
  <div class="scroll">
    <div class="body">
      <div class="dnav">
        <button class="darr" id="btn-prev" onclick="chDate(-1)">‹</button>
        <div class="dctr" onclick="goToday()">
          <div class="dstr" id="dstr">—</div>
          <div class="ddow" id="ddow">—</div>
          <div class="today-tag" id="today-tag"></div>
        </div>
        <button class="darr" id="btn-next" onclick="chDate(1)">›</button>
      </div>

      <div class="streak-row">
        <div class="streak-card"><div class="streak-num" id="streak-num">0</div><div class="streak-lbl">연속 일수 🔥</div></div>
        <div class="streak-card"><div class="streak-num" id="total-days">0</div><div class="streak-lbl">총 기록일</div></div>
        <div class="streak-card"><div class="streak-num" id="today-filled">0</div><div class="streak-lbl">오늘 작성</div></div>
      </div>

      <div class="grat-box">
        <div class="grat-hdr">
          <div class="grat-title">오늘의 감사 🙏</div>
          <div class="grat-cnt" id="gcnt">0 / 5</div>
        </div>

        <!-- 사진 섹션 -->
        <div class="photo-section">
          <div class="photo-grid" id="photo-grid"></div>
          <div class="photo-add-btns">
            <button class="photo-add-btn" onclick="takePhoto()">
              <span class="photo-add-icon">📷</span>카메라 촬영
            </button>
            <button class="photo-add-btn" onclick="pickPhoto()">
              <span class="photo-add-icon">🖼️</span>앨범에서 선택
            </button>
          </div>
          <input type="file" id="cam-inp" accept="image/*" capture="environment" style="display:none" onchange="onPhotoSelected(event)">
          <input type="file" id="gallery-inp" accept="image/*" style="display:none" onchange="onPhotoSelected(event)">
        </div>
        <div class="grat-items" id="grat-items"></div>
        <button class="grat-add-btn" onclick="addGratItem()">+ 감사 항목 추가</button>
        <button class="save-btn" onclick="saveGrat()">✨ 감사 일기 저장하기</button>
      </div>

      <div class="sec">감사 일기 아카이브</div>
      <div id="archive"></div>
    </div>
    <!-- BOTTOM NAV -->
  <nav class="bnav">
    <button class="nb" style="color:var(--blue);" onclick="window.location.href='index.html'">
      <span class="ni">🏠</span>홈
    </button>
    <button class="nb" onclick="window.location.href='habits.html'">
      <span class="ni">✅</span>습관
    </button>
    <button class="nb on" onclick="window.location.href='gratitude.html'">
      <span class="ni">🙏</span>감사
    </button>
    <button class="nb" onclick="window.location.href='brain.html'">
      <span class="ni">🧠</span>Brain
    </button>
    <button class="nb" onclick="window.location.href='gtask.html'">
      <span class="ni">☑️</span>Tasks
    </button>
    <button class="nb" onclick="window.location.href='gcal.html'">
      <span class="ni">📅</span>캘린더
    </button>
    <button class="nb" onclick="window.location.href=\'backup.html\'"><span class="ni">☁️</span>백업
    </button>
  </nav>
</div>
</div>
<div class="photo-viewer" id="photo-viewer">
  <button class="photo-viewer-close" onclick="closeViewer()">×</button>
  <img id="viewer-img" src="" alt="감사 사진">
  <div class="photo-viewer-nav">
    <button class="pv-nav-btn" onclick="viewerNav(-1)">‹</button>
    <button class="pv-nav-btn" onclick="viewerNav(1)">›</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const KEY='henry_v9';
function ld(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}return{habits:[],records:{},grat:{},tasks:[],todos:[],braindump:'',info:{}};}
function sv(){try{localStorage.setItem(KEY,JSON.stringify(D));}catch(e){}}
let D=ld();
function p2(n){return String(n).padStart(2,'0');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function todayStr(){const n=new Date();return n.getFullYear()+'-'+p2(n.getMonth()+1)+'-'+p2(n.getDate());}
function addDays(s,n){const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);dt.setDate(dt.getDate()+n);return dt.getFullYear()+'-'+p2(dt.getMonth()+1)+'-'+p2(dt.getDate());}
function fmtDisp(s){const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);const dw=['일','월','화','수','목','금','토'];return{str:y+'.'+p2(m)+'.'+p2(d),dow:dw[dt.getDay()]+'요일'};}
let curD=todayStr();
function chDate(d){const nxt=addDays(curD,d);if(nxt>addDays(todayStr(),1))return;curD=nxt;render();}
function goToday(){curD=todayStr();render();}
let toastT=null;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1700);}

/* Coin burst */
const cv=document.getElementById('coinCanvas'),cx=cv.getContext('2d');let coins=[];
function rsz(){cv.width=window.innerWidth;cv.height=window.innerHeight;}rsz();window.addEventListener('resize',rsz);
function burst(x,y,n=50){
  for(let i=0;i<n;i++){const ang=Math.random()*Math.PI*2,spd=3+Math.random()*11;coins.push({x,y,vx:Math.cos(ang)*spd*(0.5+Math.random()*.9),vy:Math.sin(ang)*spd*(0.5+Math.random()*.9)-5,r:6+Math.random()*10,life:1,decay:.013+Math.random()*.01,color:['#FFD700','#FFC200','#FFE44d','#FFAA00','#FF8C00'][Math.floor(Math.random()*5)],rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*.28,gravity:.25+Math.random()*.15});}
  if(!animR)animC();
}
let animR=false;
function animC(){animR=true;cx.clearRect(0,0,cv.width,cv.height);coins=coins.filter(c=>c.life>0.02);coins.forEach(c=>{c.x+=c.vx;c.vy+=c.gravity;c.y+=c.vy;c.vx*=.986;c.life-=c.decay;c.rot+=c.rotV;cx.save();cx.globalAlpha=Math.min(c.life,1);cx.translate(c.x,c.y);cx.rotate(c.rot);cx.beginPath();cx.ellipse(0,0,c.r,c.r*.58,0,0,Math.PI*2);cx.fillStyle=c.color;cx.fill();cx.strokeStyle='rgba(0,0,0,.22)';cx.lineWidth=1;cx.stroke();cx.beginPath();cx.ellipse(-c.r*.18,-c.r*.1,c.r*.22,c.r*.12,-.4,0,Math.PI*2);cx.fillStyle='rgba(255,255,255,.55)';cx.fill();cx.fillStyle='rgba(0,0,0,.35)';cx.font=`bold ${c.r*.85}px serif`;cx.textAlign='center';cx.textBaseline='middle';cx.fillText('₩',0,0);cx.restore();});if(coins.length>0)requestAnimationFrame(animC);else{animR=false;cx.clearRect(0,0,cv.width,cv.height);}}

function calcStreak(){
  let streak=0;const today=new Date();
  for(let i=0;i<365;i++){const d=new Date(today);d.setDate(d.getDate()-i);const k=d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());const g=(D.grat||{})[k]||[];if(g.some(x=>x&&x.trim()))streak++;else break;}
  return streak;
}

/* ─── 카운트 업데이트 ─── */
function updateCnt(){
  const inputs=[...document.querySelectorAll('.ginp')];
  const filled=inputs.filter(x=>x.value.trim()).length;
  const total=inputs.length;
  document.getElementById('gcnt').textContent=`${filled} / ${total}`;
  document.getElementById('today-filled').textContent=filled;
}

/* ─── 번호 재정렬 ─── */
function reIndex(){
  document.querySelectorAll('.grat-row').forEach((row,i)=>{
    const n=row.querySelector('.gnum');
    if(n) n.textContent=i+1;
    const ta=row.querySelector('.ginp');
    if(ta) ta.placeholder=`감사한 일 ${i+1}번째...`;
  });
  updateCnt();
}

/* ─── 행 생성 ─── */
function makeRow(idx, val){
  const row=document.createElement('div');
  row.className='grat-row';

  const num=document.createElement('div');
  num.className='gnum';
  num.textContent=idx+1;

  const ta=document.createElement('textarea');
  ta.className='ginp'+(val&&val.trim()?' fil':'');
  ta.placeholder=`감사한 일 ${idx+1}번째...`;
  ta.value=val||'';
  ta.addEventListener('input',function(){
    this.style.height='0px';
    this.style.height=Math.max(this.scrollHeight+2,80)+'px';
    updateCnt();
    if(this.value.trim()) this.classList.add('fil');
    else this.classList.remove('fil');
  });

  const del=document.createElement('button');
  del.className='grow-del';
  del.textContent='×';
  del.title='삭제';
  del.onclick=()=>{
    const rows=document.querySelectorAll('.grat-row');
    if(rows.length<=1){toast('최소 1개는 있어야 해요');return;}
    row.remove();
    reIndex();
  };

  row.appendChild(num);
  row.appendChild(ta);
  row.appendChild(del);
  return row;
}

/* ─── 항목 추가 ─── */
function addGratItem(){
  const cont=document.getElementById('grat-items');
  const i=cont.querySelectorAll('.grat-row').length;
  const row=makeRow(i,'');
  cont.appendChild(row);
  reIndex();
  row.querySelector('.ginp').focus();
  row.scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ─── 메인 렌더 ─── */
function render(){
  const f=fmtDisp(curD),tod=todayStr(),tom=addDays(tod,1),yes=addDays(tod,-1);
  document.getElementById('dstr').textContent=f.str;
  document.getElementById('ddow').textContent=f.dow;
  document.getElementById('today-tag').textContent=curD===tod?'오늘':curD===tom?'내일':curD===yes?'어제':'';
  document.getElementById('btn-next').classList.toggle('dim',curD>=tom);

  document.getElementById('streak-num').textContent=calcStreak();
  const allDates=Object.keys(D.grat||{}).filter(d=>(D.grat[d]||[]).some(x=>x&&x.trim()));
  document.getElementById('total-days').textContent=allDates.length;

  // 저장된 값 — 최소 5칸 보장
  const saved=(D.grat||{})[curD]||[];
  const g=saved.length>=5?[...saved]:[...saved,...Array(5-saved.length).fill('')];

  const cont=document.getElementById('grat-items');
  cont.innerHTML='';
  g.forEach((val,i)=>{
    const row=makeRow(i,val);
    cont.appendChild(row);
    // DOM 삽입 후 높이 계산
    if(val&&val.trim()){
      const ta=row.querySelector('.ginp');
      ta.style.height='0px';
      ta.style.height=Math.max(ta.scrollHeight+2,80)+'px';
    }
  });
  updateCnt();
  renderPhotos();

  // 아카이브
  const arc=document.getElementById('archive');arc.innerHTML='';
  const dates=Object.keys(D.grat||{})
    .filter(d=>(D.grat[d]||[]).some(x=>x&&x.trim())&&d!==curD)
    .sort((a,b)=>b.localeCompare(a));
  if(!dates.length){
    arc.innerHTML='<div class="empty-v"><div class="ei">📔</div>아직 다른 날의 기록이 없어요</div>';
    return;
  }
  dates.slice(0,20).forEach(d=>{
    const f2=fmtDisp(d);
    const entries=(D.grat[d]||[]).filter(x=>x&&x.trim());
    const card=document.createElement('div');card.className='arc-card';
    card.innerHTML=`<div class="arc-date">📅 ${f2.str} (${f2.dow})
      <span style="background:rgba(255,192,32,.15);color:var(--gold);border:1px solid rgba(255,192,32,.3);border-radius:12px;padding:1px 8px;font-size:10px;font-family:'DM Mono',monospace;">${entries.length}개 작성</span>
    </div>
    <div>${entries.map((e,i)=>`<div class="arc-item"><span class="arc-n">${i+1}</span><span class="arc-text">${esc(e)}</span></div>`).join('')}</div>`;
    arc.appendChild(card);
  });
}

/* ── 사진 기능 ── */
function takePhoto(){ document.getElementById('cam-inp').click(); }
function pickPhoto(){ document.getElementById('gallery-inp').click(); }

function onPhotoSelected(e){
  const file=e.target.files[0]; if(!file)return;
  if(!D.grat) D.grat={};
  if(!D.grat[curD+'_photos']) D.grat[curD+'_photos']=[];
  if(D.grat[curD+'_photos'].length>=6){toast('📷 최대 6장까지 가능합니다');return;}

  // Canvas로 이미지 압축 후 저장
  const img=new Image();
  const reader=new FileReader();
  reader.onload=ev=>{
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const MAX=800; // 최대 800px
      let w=img.width, h=img.height;
      if(w>h){ if(w>MAX){h=Math.round(h*MAX/w);w=MAX;} }
      else { if(h>MAX){w=Math.round(w*MAX/h);h=MAX;} }
      canvas.width=w; canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      // JPEG 품질 0.7로 압축
      const compressed=canvas.toDataURL('image/jpeg',0.7);
      D.grat[curD+'_photos'].push(compressed);
      try{
        sv();
        renderPhotos();
        toast('📷 사진 저장됨');
      }catch(err){
        // localStorage 용량 초과 시 품질 낮춰서 재시도
        D.grat[curD+'_photos'].pop();
        const smaller=canvas.toDataURL('image/jpeg',0.4);
        D.grat[curD+'_photos'].push(smaller);
        try{sv();renderPhotos();toast('📷 사진 저장됨 (압축)');}
        catch(e2){D.grat[curD+'_photos'].pop();toast('❌ 저장 공간 부족 — 이전 사진을 삭제해주세요');}
      }
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

let viewerPhotos=[];let viewerIdx=0;
function renderPhotos(){
  const grid=document.getElementById('photo-grid');grid.innerHTML='';
  const photos=(D.grat&&D.grat[curD+'_photos'])||[];
  viewerPhotos=photos;
  photos.forEach((src,i)=>{
    const item=document.createElement('div');item.className='photo-item';
    item.innerHTML=`<img src="${src}" alt="감사 사진 ${i+1}" style="cursor:pointer;" onclick="openViewer(${i})">
      <button class="photo-del" onclick="event.stopPropagation();delPhoto(${i})">×</button>`;
    grid.appendChild(item);
  });
}
function openViewer(i){
  viewerIdx=i;
  document.getElementById('viewer-img').src=viewerPhotos[i];
  document.getElementById('photo-viewer').classList.add('open');
}
function closeViewer(){
  document.getElementById('photo-viewer').classList.remove('open');
}
function viewerNav(dir){
  viewerIdx=(viewerIdx+dir+viewerPhotos.length)%viewerPhotos.length;
  document.getElementById('viewer-img').src=viewerPhotos[viewerIdx];
}
// ESC 키로 닫기
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeViewer();});

function delPhoto(i){
  if(!confirm('이 사진을 삭제할까요?'))return;
  D.grat[curD+'_photos'].splice(i,1);sv();renderPhotos();toast('🗑️ 삭제됨');
}

function saveGrat(){
  const vals=[...document.querySelectorAll('.ginp')].map(x=>x.value.trim());
  if(!D.grat) D.grat={};
  D.grat[curD]=vals;
  sv();
  render();
  toast('🙏 감사 일기 저장됨');
  burst(window.innerWidth/2,window.innerHeight*.45,55);
}

render();
</script>
<script>
/* ══ SWIPE NAVIGATION ══ */
(function(){
  const path=location.pathname.split('/').pop()||'index.html';
  const PAGES=['index.html','habits.html','gratitude.html','brain.html','gcal.html'];
  const NAMES=['🏠 홈','✅ 습관','🙏 감사','🧠 Brain','📅 캘린더'];
  const curIdx=PAGES.indexOf(path);
  let sx=0,sy=0,st=0;
  const MIN_DIST=55,MAX_VERT=90,MAX_TIME=500;

  /* 스와이프 힌트 */
  const hint=document.createElement('div');
  hint.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.72);color:#fff;padding:11px 22px;border-radius:26px;font-family:\'Noto Sans KR\',sans-serif;font-size:14px;font-weight:700;pointer-events:none;opacity:0;transition:opacity .18s;z-index:9999;white-space:nowrap;';
  document.body.appendChild(hint);
  let ht;
  function showHint(msg){hint.textContent=msg;hint.style.opacity='1';clearTimeout(ht);ht=setTimeout(()=>hint.style.opacity='0',700);}

  /* 페이지 이동 */
  function go(dir){
    if(curIdx<0)return;
    const ni=curIdx-dir; /* 왼쪽=+1인덱스, 오른쪽=-1인덱스 */
    if(ni<0||ni>=PAGES.length)return;
    const shell=document.querySelector('.shell');
    if(shell){
      shell.style.transition='transform .2s ease,opacity .2s ease';
      shell.style.transform='translateX('+(dir>0?'-':'')+'80px)';
      shell.style.opacity='0';
    }
    setTimeout(()=>{window.location.href=PAGES[ni];},180);
  }

  document.addEventListener('touchstart',e=>{
    const sa=document.querySelector('.scroll,.scroll-area');
    if(sa&&sa.scrollTop>4&&sa.contains(e.target))return;
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();
  },{passive:true});

  document.addEventListener('touchend',e=>{
    if(!sx)return;
    const dx=e.changedTouches[0].clientX-sx;
    const dy=Math.abs(e.changedTouches[0].clientY-sy);
    const dt=Date.now()-st;sx=0;
    if(dt>MAX_TIME||Math.abs(dx)<MIN_DIST||dy>MAX_VERT)return;
    if(dx<0){
      /* 왼쪽 → 다음 */
      const ni=curIdx+1;
      if(ni>=PAGES.length){showHint('📅 마지막 페이지');return;}
      showHint(NAMES[ni]+' →');setTimeout(()=>go(-1),160);
    } else {
      /* 오른쪽 → 이전 */
      const ni=curIdx-1;
      if(ni<0){showHint('← 첫 페이지');return;}
      showHint('← '+NAMES[ni]);setTimeout(()=>go(1),160);
    }
  },{passive:true});

  /* 진입 애니메이션 */
  const shell=document.querySelector('.shell');
  if(shell){
    shell.style.opacity='0';shell.style.transform='translateY(5px)';shell.style.transition='none';
    requestAnimationFrame(()=>{
      shell.style.transition='transform .2s ease,opacity .2s ease';
      shell.style.transform='translateY(0)';shell.style.opacity='1';
    });
  }
})();
</script>
