<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Google Calendar — Henry</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--s1:#12121a;--s2:#1a1a26;--s3:#222232;
  --text:#f0f0f8;--text2:#b0b0c8;--text3:#606080;
  --blue:#4a8fff;--teal:#28c490;--gold:#ffc020;--rose:#ff5060;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.16);
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;}
.shell{display:flex;flex-direction:column;width:100%;max-width:480px;margin:0 auto;height:100dvh;height:100vh;overflow:hidden;}

/* HEADER */
.hdr{flex-shrink:0;padding:calc(var(--safe-t)+8px) 16px 8px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.back{background:var(--s2);border:none;outline:none;color:#fff;width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;text-decoration:none;flex-shrink:0;-webkit-appearance:none;appearance:none;cursor:pointer;touch-action:manipulation;font-family:inherit;line-height:1;}
.back:active{transform:scale(.92);}
.hdr-c{flex:1;text-align:center;}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--blue);line-height:1;}
.hdr-sub{font-size:8px;letter-spacing:2px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;margin-top:2px;}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.scroll::-webkit-scrollbar{width:2px;}
.scroll::-webkit-scrollbar-thumb{background:var(--s3);}
.body{padding:16px 14px 90px;}

/* SECTION */
.sec{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-weight:500;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}

/* 메인 오픈 버튼 */
.main-btn{
  display:flex;align-items:center;gap:14px;
  width:100%;padding:20px 18px;margin-bottom:14px;
  background:linear-gradient(135deg,#1a2a4a,#0d1a36);
  border:1px solid rgba(74,143,255,.4);border-radius:18px;
  color:#fff;text-decoration:none;touch-action:manipulation;
  transition:all .15s;cursor:pointer;
}
.main-btn:active{transform:scale(.97);}
.main-btn-icon{font-size:38px;flex-shrink:0;}
.main-btn-body{flex:1;}
.main-btn-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--blue);line-height:1;margin-bottom:4px;}
.main-btn-sub{font-size:12px;color:var(--text3);}
.main-btn-arr{font-size:24px;color:var(--blue);}

/* 뷰 선택 버튼들 */
.view-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
.view-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;
  background:var(--s1);border:1px solid var(--border);border-radius:14px;
  padding:16px 10px;text-decoration:none;touch-action:manipulation;transition:all .15s;cursor:pointer;
}
.view-btn:active{transform:scale(.96);background:var(--s2);}
.view-btn-icon{font-size:28px;}
.view-btn-label{font-size:13px;font-weight:700;color:var(--text2);text-align:center;}
.view-btn-sub{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;}

/* 오늘 일정 카드 */
.today-card{background:var(--s1);border:1px solid rgba(74,143,255,.22);border-radius:16px;padding:16px;margin-bottom:14px;}
.today-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.today-title{font-size:15px;font-weight:700;color:var(--blue);}
.today-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);}
.today-open{background:rgba(74,143,255,.15);border:1px solid rgba(74,143,255,.3);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:700;color:var(--blue);cursor:pointer;text-decoration:none;touch-action:manipulation;}
.today-open:active{background:rgba(74,143,255,.25);}

/* 이벤트 추가 버튼 */
.add-event-btn{
  width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
  padding:15px;margin-bottom:14px;
  background:var(--teal);border:none;border-radius:14px;
  color:#0a0a0f;font-size:15px;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;
  text-decoration:none;touch-action:manipulation;transition:all .15s;
  box-shadow:0 0 16px rgba(40,196,144,.25);
}
.add-event-btn:active{transform:scale(.97);}

/* INFO */
.info-box{background:rgba(74,143,255,.07);border:1px solid rgba(74,143,255,.18);border-radius:14px;padding:14px 16px;margin-bottom:14px;}
.info-title{font-size:12px;font-weight:700;color:var(--blue);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.info-row{display:flex;gap:10px;margin-bottom:7px;align-items:flex-start;font-size:13px;color:var(--text2);line-height:1.55;}
.info-row:last-child{margin:0;}
.sn{background:var(--blue);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;}

/* BOTTOM NAV */
.bnav{flex-shrink:0;background:rgba(10,10,15,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border2);display:flex;padding-bottom:var(--safe-b);}
.nb{flex:1;background:none;border:none;color:var(--text3);padding:9px 2px 7px;cursor:pointer;font-size:9.5px;font-family:'Noto Sans KR',sans-serif;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .18s;touch-action:manipulation;}
.nb .ni{font-size:21px;transition:transform .18s;}
.nb:active .ni{transform:scale(1.2);}
.nb.nb-home{color:var(--blue);}
.nb.nb-home .ni{filter:drop-shadow(0 0 5px var(--blue));}
</style>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/habits/sw.js', {scope:'/habits/'})
    .then(function(r){ console.log('SW registered:', r.scope); })
    .catch(function(e){ console.log('SW error:', e); });
}
</script>
</head>
<body>
<div class="shell">
  <!-- 상단 탭바 -->
  <nav style="flex-shrink:0;background:rgba(10,10,15,.98);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.15);display:flex;padding-top:calc(var(--safe-t)+6px);padding-bottom:6px;">
    <button onclick="location.href='index.html'" style="flex:1;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.4);padding:10px 2px 8px;cursor:pointer;font-size:10px;font-family:'Noto Sans KR',sans-serif;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;touch-action:manipulation;">
      <span style="font-size:22px;line-height:1;">🏠</span>
      홈
    </button>
    <button onclick="location.href='habits.html'" style="flex:1;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.4);padding:10px 2px 8px;cursor:pointer;font-size:10px;font-family:'Noto Sans KR',sans-serif;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;touch-action:manipulation;">
      <span style="font-size:22px;line-height:1;">✅</span>
      습관
    </button>
    <button onclick="location.href='gratitude.html'" style="flex:1;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.4);padding:10px 2px 8px;cursor:pointer;font-size:10px;font-family:'Noto Sans KR',sans-serif;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;touch-action:manipulation;">
      <span style="font-size:22px;line-height:1;">🙏</span>
      감사
    </button>
    <button onclick="location.href='brain.html'" style="flex:1;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.4);padding:10px 2px 8px;cursor:pointer;font-size:10px;font-family:'Noto Sans KR',sans-serif;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;touch-action:manipulation;">
      <span style="font-size:22px;line-height:1;">🧠</span>
      Brain
    </button>
    <button onclick="location.href='gtask.html'" style="flex:1;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.4);padding:10px 2px 8px;cursor:pointer;font-size:10px;font-family:'Noto Sans KR',sans-serif;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;touch-action:manipulation;">
      <span style="font-size:22px;line-height:1;">☑️</span>
      Tasks
    </button>
    <button onclick="location.href='backup.html'" style="flex:1;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.4);padding:10px 2px 8px;cursor:pointer;font-size:10px;font-family:'Noto Sans KR',sans-serif;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px;touch-action:manipulation;">
      <span style="font-size:22px;line-height:1;">💾</span>
      백업
    </button>
  </nav>

  <!-- BOTTOM NAV -->
</div>

<script>
// 오늘 날짜 표시
(function(){
  const n=new Date();
  const dows=['일','월','화','수','목','금','토'];
  const p=v=>String(v).padStart(2,'0');
  document.getElementById('today-str').textContent=
    `${n.getFullYear()}년 ${n.getMonth()+1}월 ${n.getDate()}일 (${dows[n.getDay()]})`;
})();
</script>
<script>
/* ══ SWIPE NAVIGATION ══ */
(function(){
  const path=location.pathname.split('/').pop()||'index.html';
  const PAGES=['index.html','habits.html','gratitude.html','brain.html','gcal.html'];
  const NAMES=['🏠 홈','✅ 습관','🙏 감사','🧠 Brain','📅 캘린더'];
  const curIdx=PAGES.indexOf(path);
  let sx=0,sy=0,st=0;
  const MIN_DIST=55,MAX_VERT=90,MAX_TIME=500;

  /* 스와이프 힌트 */
  const hint=document.createElement('div');
  hint.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.72);color:#fff;padding:11px 22px;border-radius:26px;font-family:\'Noto Sans KR\',sans-serif;font-size:14px;font-weight:700;pointer-events:none;opacity:0;transition:opacity .18s;z-index:9999;white-space:nowrap;';
  document.body.appendChild(hint);
  let ht;
  function showHint(msg){hint.textContent=msg;hint.style.opacity='1';clearTimeout(ht);ht=setTimeout(()=>hint.style.opacity='0',700);}

  /* 페이지 이동 */
  function go(dir){
    if(curIdx<0)return;
    const ni=curIdx-dir; /* 왼쪽=+1인덱스, 오른쪽=-1인덱스 */
    if(ni<0||ni>=PAGES.length)return;
    const shell=document.querySelector('.shell');
    if(shell){
      shell.style.transition='transform .2s ease,opacity .2s ease';
      shell.style.transform='translateX('+(dir>0?'-':'')+'80px)';
      shell.style.opacity='0';
    }
    setTimeout(()=>{window.location.href=PAGES[ni];},180);
  }

  document.addEventListener('touchstart',e=>{
    const sa=document.querySelector('.scroll,.scroll-area');
    if(sa&&sa.scrollTop>4&&sa.contains(e.target))return;
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();
  },{passive:true});

  document.addEventListener('touchend',e=>{
    if(!sx)return;
    const dx=e.changedTouches[0].clientX-sx;
    const dy=Math.abs(e.changedTouches[0].clientY-sy);
    const dt=Date.now()-st;sx=0;
    if(dt>MAX_TIME||Math.abs(dx)<MIN_DIST||dy>MAX_VERT)return;
    if(dx<0){
      /* 왼쪽 → 다음 */
      const ni=curIdx+1;
      if(ni>=PAGES.length){showHint('📅 마지막 페이지');return;}
      showHint(NAMES[ni]+' →');setTimeout(()=>go(-1),160);
    } else {
      /* 오른쪽 → 이전 */
      const ni=curIdx-1;
      if(ni<0){showHint('← 첫 페이지');return;}
      showHint('← '+NAMES[ni]);setTimeout(()=>go(1),160);
    }
  },{passive:true});

  /* 진입 애니메이션 */
  const shell=document.querySelector('.shell');
  if(shell){
    shell.style.opacity='0';shell.style.transform='translateY(5px)';shell.style.transition='none';
    requestAnimationFrame(()=>{
      shell.style.transition='transform .2s ease,opacity .2s ease';
      shell.style.transform='translateY(0)';shell.style.opacity='1';
    });
  }
})();
</script>
</body>
</html>
