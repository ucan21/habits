<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Henry Diary">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Henry Diary</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f; --s1:#12121a; --s2:#1a1a26; --s3:#222232;
  --text:#f0f0f8; --text2:#b0b0c8; --text3:#606080;
  --blue:#4a8fff; --teal:#28c490; --gold:#ffc020;
  --violet:#9060ff; --orange:#ff8830; --green:#30c060;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.16);
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  -webkit-font-smoothing:antialiased;
}

/* ── SHELL ── */
.shell{
  display:flex;flex-direction:column;
  width:100%;max-width:480px;margin:0 auto;
  height:100dvh;height:100vh;overflow:hidden;
}

/* ── HEADER ── */
.hdr{
  flex-shrink:0;
  /* 상태바 아래 충분한 여백으로 잘림 방지 */
  padding-top:calc(var(--safe-t) + 18px);
  padding-bottom:14px;
  padding-left:16px;
  padding-right:16px;
  text-align:center;
  background:var(--bg);
  border-bottom:1px solid var(--border);
}
.hdr-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:44px;
  letter-spacing:6px;
  line-height:1;
  color:#ffffff;
  text-shadow:0 0 30px rgba(255,255,255,0.18);
}
.hdr-sub{
  font-size:11px;letter-spacing:3px;color:#ffffff;
  font-family:'DM Mono',monospace;text-transform:uppercase;margin-top:6px;
  font-weight:700;opacity:1;
}
/* 날짜 표시 */
.hdr-date{
  font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);
  margin-top:6px;letter-spacing:1px;
}

/* ── SCROLL ── */
.scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain;
}
.scroll::-webkit-scrollbar{width:2px;}
.scroll::-webkit-scrollbar-thumb{background:var(--s3);}

/* ── CONTENT ── */
.content{padding:14px 14px 16px;}

/* ── QUOTE ── */
.quote-card{
  background:linear-gradient(135deg,#12121a,#1a1a2e);
  border:2px solid rgba(255,255,255,0.75);
  border-radius:14px;padding:10px 13px;margin-bottom:12px;
  position:relative;overflow:hidden;
  cursor:pointer;touch-action:manipulation;
  transition:transform .12s,border-color .2s;
  -webkit-appearance:none;appearance:none;
  display:block;width:100%;text-align:left;
  font-family:inherit;
}
.quote-card:active{transform:scale(.98);border-color:rgba(255,208,96,.8);}
.quote-card::before{
  content:'"';font-family:'Bebas Neue',sans-serif;font-size:50px;
  color:rgba(74,143,255,0.06);position:absolute;top:-5px;left:6px;
  line-height:1;pointer-events:none;
}
.q-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#ffffff;font-family:'DM Mono',monospace;font-weight:700;margin-bottom:6px;opacity:.85;}
.q-text{font-size:14px;font-weight:400;color:#ffffff;line-height:1.65;word-break:keep-all;font-family:'Nanum Myeongjo','Batang','Georgia',serif;letter-spacing:.3px;}
.q-en{font-size:15px;font-weight:500;color:#ffd060!important;line-height:1.7;margin-top:8px;font-family:'Georgia','Times New Roman',serif;font-style:italic;word-break:break-word;}
.q-author{font-size:10px;color:rgba(255,255,255,0.55);margin-top:5px;font-family:'DM Mono',monospace;text-align:right;}

/* ── CARD BUTTONS (메인 콘텐츠 카드) ── */
.nav-btn{
  display:flex;align-items:center;gap:14px;
  width:100%;padding:17px 16px;margin-bottom:10px;
  border-radius:16px;cursor:pointer;text-decoration:none;
  transition:all .15s;touch-action:manipulation;
  position:relative;overflow:hidden;
  border:1px solid var(--border);
  /* JS 클릭으로 이동 */
}
.nav-btn:active{transform:scale(.97);}
.nav-icon{font-size:28px;flex-shrink:0;}
.nav-body{flex:1;text-align:left;}
.nav-title{
  font-family:'Bebas Neue',sans-serif;font-size:22px;
  letter-spacing:2px;line-height:1;margin-bottom:3px;
}
.nav-sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
.nav-arr{font-size:20px;color:var(--text3);flex-shrink:0;}
.score-pill{
  position:absolute;top:50%;right:46px;transform:translateY(-50%);
  background:rgba(40,196,144,.15);border:1px solid rgba(40,196,144,.3);
  border-radius:20px;padding:3px 10px;
  font-family:'DM Mono',monospace;font-size:11px;color:var(--teal);font-weight:700;
}

.btn-habit  {border-color:rgba(255,255,255,0.75); background:linear-gradient(135deg,#12121a,#0d2018);}
.btn-habit  .nav-title{color:var(--teal);}
.btn-brain  {border-color:rgba(255,255,255,0.75);  background:linear-gradient(135deg,#12121a,#0d1e12);}
.btn-brain  .nav-title{color:var(--green);}
.btn-gtask2{border-color:rgba(255,255,255,0.75);background:linear-gradient(135deg,#12121a,#0d1a36);}
.btn-gtask2 .nav-title{color:#4a8fff;}
.btn-gratitude{border-color:rgba(255,255,255,0.75);background:linear-gradient(135deg,#12121a,#1e1000);}
.btn-gratitude .nav-title{color:var(--orange);}
.btn-gcal   {border-color:rgba(255,255,255,0.75); background:linear-gradient(135deg,#12121a,#0a1428);}
.btn-gcal   .nav-title{color:var(--blue);}
.btn-backup2{border-color:rgba(255,255,255,0.75); background:linear-gradient(135deg,#12121a,#0a2818);}
.btn-backup2 .nav-title{color:var(--teal);}

/* ── BOTTOM NAV ── */
.bnav{
  flex-shrink:0;
  background:rgba(10,10,15,0.97);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border2);
  display:flex;
  padding-bottom:var(--safe-b);
}
.nb{
  flex:1;background:none;border:none;color:var(--text3);
  padding:9px 2px 7px;
  cursor:pointer;font-size:9.5px;
  font-family:'Noto Sans KR',sans-serif;font-weight:500;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:color .18s;touch-action:manipulation;
  text-decoration:none;
}
.nb .ni{font-size:22px;transition:transform .18s,filter .18s;}
.nb:active .ni{transform:scale(1.2);}
/* active page highlight */
.nb.current{color:var(--blue);}
.nb.current .ni{filter:drop-shadow(0 0 6px var(--blue));}

/* color per button */
.nb-habit   {--nc:var(--teal);}
.nb-brain   {--nc:var(--green);}
.nb-gtask2{--nc:#4a8fff;}
.nb-grat    {--nc:var(--orange);}
.nb-gcal    {--nc:var(--blue);}
.nb:active{color:var(--nc, var(--blue));}
</style>
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-logo">Henry's Diary</div>
    <div class="hdr-sub">매일의 기록이 삶을 만든다</div>
    <div class="hdr-date" id="hdr-date">—</div>
  </div>

  <!-- SCROLL CONTENT -->
  <div class="scroll">
    <div class="content">

      <!-- 명언 -->
      <button class="quote-card" onclick="nextQuote()" style="width:100%;text-align:left;background:linear-gradient(135deg,#12121a,#1a1a2e);cursor:pointer;">
        <div class="q-label" id="q-label">✦ 오늘의 명언 &nbsp;·&nbsp; 탭하면 다음 ›</div>
        <div class="q-text" id="q-text">—</div>
        <div class="q-en" id="q-en" style="color:#ffd060!important;font-size:15px;font-weight:500;font-style:italic;margin-top:8px;line-height:1.7;word-break:break-word;">—</div>
        <div class="q-author" id="q-author">—</div>
      </button>

      <!-- 카드 버튼들 — onclick으로 이동 (← 화살표 불필요) -->
      <div class="nav-btn btn-habit" onclick="go('habits.html')">
        <span class="nav-icon">✅</span>
        <div class="nav-body">
          <div class="nav-title">HENRY'S HABITS</div>
          <div class="nav-sub">오늘의 습관 체크 · 점수 확인</div>
        </div>
        <span class="score-pill" id="score-badge">0점</span>
        <span class="nav-arr">›</span>
      </div>

      <div class="nav-btn btn-gratitude" onclick="go('gratitude.html')">
        <span class="nav-icon">🙏</span>
        <div class="nav-body">
          <div class="nav-title">GRATITUDE JOURNAL</div>
          <div class="nav-sub">오늘의 다섯 가지 감사 일기</div>
        </div>
        <span class="nav-arr">›</span>
      </div>

      <div class="nav-btn btn-brain" onclick="go('brain.html')">
        <span class="nav-icon">🧠</span>
        <div class="nav-body">
          <div class="nav-title">BRAIN DUMP</div>
          <div class="nav-sub">아이디어 · 생각 · 메모 자유 기록</div>
        </div>
        <span class="nav-arr">›</span>
      </div>

      <div class="nav-btn btn-gtask2" onclick="window.open('https://tasks.google.com','_blank')">
        <span class="nav-icon">☑️</span>
        <div class="nav-body">
          <div class="nav-title">GOOGLE TASKS</div>
          <div class="nav-sub">탭하면 Google Tasks 바로 열림</div>
        </div>
        <span class="nav-arr">↗</span>
      </div>

      <div class="nav-btn btn-gcal" onclick="go('gcal.html')">
        <span class="nav-icon">📅</span>
        <div class="nav-body">
          <div class="nav-title">GOOGLE CALENDAR</div>
          <div class="nav-sub">Google 캘린더 일정 연동</div>
        </div>
        <span class="nav-arr">›</span>
      </div>

      <div class="nav-btn btn-backup2" onclick="go('backup.html')">
        <span class="nav-icon">☁️</span>
        <div class="nav-body">
          <div class="nav-title">BACKUP & RESTORE</div>
          <div class="nav-sub">Google Drive 백업 · 복원</div>
        </div>
        <span class="nav-arr">›</span>
      </div>


    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bnav">
    <button class="nb nb-habit current" onclick="go('habits.html')">
      <span class="ni">✅</span>습관
    </button>
    <button class="nb nb-grat" onclick="go('gratitude.html')">
      <span class="ni">🙏</span>감사
    </button>
    <button class="nb nb-brain" onclick="go('brain.html')">
      <span class="ni">🧠</span>Brain
    </button>
    <button class="nb nb-gtask2" onclick="window.open('https://tasks.google.com','_blank')">
      <span class="ni">☑️</span>Tasks
    </button>
    <button class="nb nb-gcal" onclick="go('gcal.html')">
      <span class="ni">📅</span>캘린더
    </button>
    <button class="nb" onclick="go('backup.html')">
      <span class="ni">☁️</span>백업
    </button>
  </nav>

</div>

<script>
/* 페이지 이동 — window.location으로 확실하게 */
function go(url){ window.location.href = url; }

/* 날짜 표시 */
(function(){
  const n = new Date();
  const dows = ['일','월','화','수','목','금','토'];
  const p = v => String(v).padStart(2,'0');
  document.getElementById('hdr-date').textContent =
    `${n.getFullYear()}.${p(n.getMonth()+1)}.${p(n.getDate())} (${dows[n.getDay()]})`;
})();

/* 명언 */
const QQ=[
  {t:"완벽하게 하는 것보다 지금 당장 하는 것이 낫다.",e:"Done is better than perfect.",a:"셰릴 샌드버그"},
  {t:"단순하게 살아라. 복잡한 것들이 스스로 풀릴 것이다.",e:"Simplify your life. The complex things will sort themselves out.",a:"스티브 잡스"},
  {t:"인생은 가까이서 보면 비극이지만, 멀리서 보면 희극이다.",e:"Life is a tragedy when seen in close-up, but a comedy in long-shot.",a:"찰리 채플린"},
  {t:"우리는 우리가 반복적으로 하는 것이다. 탁월함은 행동이 아니라 습관이다.",e:"We are what we repeatedly do. Excellence is not an act but a habit.",a:"아리스토텔레스"},
  {t:"남과 비교를 멈출 때 진정한 자신이 시작된다.",e:"Stop comparing yourself to others — that is where your real self begins.",a:"키르케고르"},
  {t:"배는 항구에 있을 때 가장 안전하다. 그러나 그것이 배의 목적은 아니다.",e:"A ship in harbor is safe, but that is not what ships are for.",a:"존 A. 세드"},
  {t:"넘어지는 것이 실패가 아니다. 넘어진 채로 있는 것이 실패다.",e:"Falling is not failure. Failure is staying where you fell.",a:"소크라테스"},
  {t:"나무를 심기 가장 좋은 날은 20년 전이었고, 두 번째로 좋은 날은 오늘이다.",e:"The best time to plant a tree was 20 years ago. The second best time is now.",a:"중국 속담"},
  {t:"어제의 나보다 나은 오늘의 나로 살아라.",e:"Be a better version of yourself than you were yesterday.",a:"공자"},
  {t:"오늘 만나는 모든 사람은 당신이 모르는 싸움을 하고 있다. 친절하라, 항상.",e:"Everyone you meet is fighting a battle you know nothing about. Be kind, always.",a:"로빈 윌리엄스"},
  {t:"남에게 대접받고자 하는 대로 남을 대접하라.",e:"Do unto others as you would have them do unto you.",a:"황금률"},
  {t:"사랑은 상대방이 있는 그대로 존재할 수 있도록 하는 것이다.",e:"Love is giving someone the freedom to be themselves.",a:"짐 모리슨"},
  {t:"변화는 처음엔 두렵고, 중간엔 혼란스럽고, 끝에는 아름답다.",e:"Change is hard at first, messy in the middle, and gorgeous at the end.",a:"로빈 샤르마"},
  {t:"원하는 것을 얻으려면 먼저 지금 가진 것에 감사해야 한다.",e:"Gratitude turns what we have into enough.",a:"멜로디 비티"},
  {t:"나는 내 운명의 주인이요, 내 영혼의 선장이다.",e:"I am the master of my fate, I am the captain of my soul.",a:"윌리엄 어니스트 헨리"},
  {t:"우리는 별의 먼지로 이루어져 있고, 우주는 우리를 통해 스스로를 이해하려 한다.",e:"We are a way for the universe to know itself.",a:"칼 세이건"},
  {t:"자아를 비우면 그 빈자리에 우주의 거대한 에너지가 채워진다.",e:"Empty yourself, and let the vast energy of the universe fill that space.",a:"선(禪) 지혜"},
  {t:"삶은 더 잘 사는 법을 배우는 것이 아니라 덜 흔들리는 기준을 세우는 일이다.",e:"Life is not about learning to live better, but about building a standard that keeps you steady.",a:"헨리"},
  {t:"나 자신이 나의 가장 좋은 친구가 되어야 한다.",e:"You yourself must be your own best friend.",a:"헨리"},
  {t:"자신의 인생을 타인의 시선으로부터 독립시키는 것, 그것이 진정한 자유다.",e:"Freeing your life from the gaze of others — that is true freedom.",a:"헨리"},
  {t:"당신이 저지를 수 있는 최악의 행동은 목표를 빗맞히는 게 아니라 목표를 쏘지 않는 것이다.",e:"The worst thing you can do is not to miss the target, but to never take the shot.",a:"헨리"},
  {t:"그들은 때가 되기를 기다리지 않는다. 지금 바로 일어나서 행동한다.",e:"They don't wait for the right moment. They rise and act right now.",a:"헨리"},
  {t:"당신이 할 거라고 말하는 일 말고, 지금 당신이 하는 일이 당신이다.",e:"You are not what you say you will do — you are what you do right now.",a:"융(Jung)"},
  {t:"운명은 의지를 가진 자는 앞에서 인도하고, 주저하는 자는 질질 끌고 간다.",e:"Fate leads the willing and drags the reluctant.",a:"세네카"},
  {t:"자신에게 명령하지 못하는 사람은 언제까지나 남에게 명령받는 종과 마찬가지다.",e:"He who cannot command himself will forever remain a servant to others.",a:"괴테"},
  {t:"남의 시선보다 나의 시선을 의식하세요.",e:"Be more aware of your own eyes than the eyes of others.",a:"헨리"},
  {t:"주식시장은 조급한 사람에게서 인내심 있는 사람에게로 돈을 이전시키는 장치다.",e:"The stock market is a device for transferring money from the impatient to the patient.",a:"Warren Buffett"},
  {t:"투자의 제1원칙은 돈을 잃지 않는 것이다. 제2원칙은 제1원칙을 잊지 않는 것이다.",e:"Rule No.1: Never lose money. Rule No.2: Never forget Rule No.1.",a:"Warren Buffett"},
  {t:"시장을 예측하는 것보다 시장에 얼마나 오래 머무느냐가 더 중요하다.",e:"Time in the market beats timing the market.",a:"Peter Lynch"},
  {t:"주식시장을 예측하려 하지 마라. 주식시장은 신도 예측할 수 없다.",e:"Do not try to predict the stock market. Even God cannot predict it.",a:"Benjamin Graham"},
  {t:"시장이 공포에 떨 때 탐욕스럽게, 시장이 탐욕스러울 때 두려워하라.",e:"Be fearful when others are greedy, and greedy when others are fearful.",a:"Warren Buffett"},
  {t:"10년을 보유할 자신이 없다면 단 10분도 그 주식을 가지고 있지 마라.",e:"If you aren't willing to own a stock for 10 years, don't even think about owning it for 10 minutes.",a:"Warren Buffett"},
  {t:"강세장은 비관론 속에서 태어나고, 회의론 속에서 성장하며, 낙관론 속에서 성숙하고, 행복감 속에서 죽는다.",e:"Bull markets are born on pessimism, grow on skepticism, mature on optimism, and die on euphoria.",a:"John Templeton"},
  {t:"부자가 되는 방법은 간단하다. 좋은 주식을 사서 앉아 있으면 된다.",e:"The way to get rich is simple. Buy good stocks and sit on them.",a:"찰리 멍거"},
  {t:"모든 아이디어를 역방향으로 뒤집어 보라. 실패하는 방법을 먼저 생각하면 성공이 보인다.",e:"Invert, always invert. Think about how to fail first, and success will reveal itself.",a:"찰리 멍거"},
  {t:"자신의 능력 범위 안에서만 투자하라. 범위의 크기는 중요하지 않다. 경계를 아는 것이 중요하다.",e:"Invest within your circle of competence. The size doesn't matter as much as knowing where the edge is.",a:"찰리 멍거"},
  {t:"복리는 세상에서 가장 위대한 수학적 발견이다. 이해하는 자만이 그것을 번다.",e:"Compound interest is the greatest mathematical discovery in the world. Only those who understand it earn from it.",a:"찰리 멍거"},

/* ══ 1시간마다 명언 업데이트 ══ */
/* ── 명언 인덱스 ── */
/* 마지막 탭한 명언 인덱스 — localStorage 유지 */
let curQIdx=(()=>{
  const saved=localStorage.getItem('henry_qidx');
  if(saved!==null) return parseInt(saved)||0;
  const n=new Date();
  return (n.getFullYear()*8760+n.getMonth()*730+n.getDate()*24+n.getHours())%QQ.length;
})();

function displayQuote(idx){
  const q=QQ[idx];
  const ql=document.getElementById('q-label');
  const qt=document.getElementById('q-text');
  const qe=document.getElementById('q-en');
  const qa=document.getElementById('q-author');
  if(qt) qt.textContent=q.t;
  if(qe) qe.textContent=q.e;
  if(qa) qa.textContent='— '+q.a;
  if(ql) ql.innerHTML='✦ 오늘의 명언 &nbsp;·&nbsp; 탭하면 다음 ›';
}

function nextQuote(){
  curQIdx=(curQIdx+1)%QQ.length;
  // localStorage에 저장
  try{localStorage.setItem('henry_qidx',curQIdx);}catch(e){}
  // 진동 — Android
  if(navigator.vibrate) navigator.vibrate(40);
  // iOS 햅틱 — AudioContext 짧은 클릭음 (무음에 가까운 틱)
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ac.createOscillator();
    const gain=ac.createGain();
    osc.connect(gain);gain.connect(ac.destination);
    osc.type='sine';osc.frequency.value=880;
    gain.gain.setValueAtTime(0.15,ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.06);
    osc.start(ac.currentTime);osc.stop(ac.currentTime+0.06);
  }catch(e){}
  // 카드 흔들림 애니메이션
  const card=document.querySelector('.quote-card');
  if(card){
    card.style.transform='scale(0.97)';
    card.style.transition='transform 0.08s';
    setTimeout(()=>{card.style.transform='scale(1)';card.style.transition='transform 0.15s';},80);
  }
  displayQuote(curQIdx);
}

function showQuote(){
  const n=new Date();
  const h=n.getHours();
  // 오후 11시~새벽 6시 → 취침 메시지
  if(h>=23||h<6){
    const ql=document.getElementById('q-label');
    const qt=document.getElementById('q-text');
    const qe=document.getElementById('q-en');
    const qa=document.getElementById('q-author');
    if(ql) ql.textContent='🌙 취침 시간';
    if(qt) qt.textContent='충분한 수면이 내일의 에너지를 만듭니다. 편안한 밤 되세요.';
    if(qe) qe.textContent="A good night's sleep is the foundation of tomorrow's success.";
    if(qa) qa.textContent="— Henry's Diary";
    setTimeout(showQuote, 30*60*1000);
    return;
  }
  displayQuote(curQIdx);
}
showQuote();

/* 오늘 습관 점수 뱃지 */
(function(){
  try{
    const d=JSON.parse(localStorage.getItem('henry_v9')||'{}');
    const n=new Date();
    const tk=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
    const habits=d.habits||[];
    const rec=(d.records||{})[tk]||{};
    const grat=((d.grat||{})[tk]||[]);
    if(habits.length){
      const anyChk=habits.some(h=>rec[h.id]);
      if(!anyChk){document.getElementById('score-badge').textContent='0점';}
      else{
        const allChk=habits.every(h=>rec[h.id]);
        if(allChk){document.getElementById('score-badge').textContent='100점';}
        else{
          const w=100/habits.length;
          let sc=0;
          habits.forEach(h=>{if(rec[h.id])sc+=w;});
          document.getElementById('score-badge').textContent=Math.round(sc)+'점';
        }
      }
    }
  }catch(e){}
})();
</script>
<script>
/* ══ SWIPE NAVIGATION ══ */
(function(){
  const path=location.pathname.split('/').pop()||'index.html';
  const PAGES=['index.html','habits.html','gratitude.html','brain.html','gcal.html'];
  const NAMES=['🏠 홈','✅ 습관','🙏 감사','🧠 Brain','📅 캘린더'];
  const curIdx=PAGES.indexOf(path);
  let sx=0,sy=0,st=0;
  const MIN_DIST=55,MAX_VERT=90,MAX_TIME=500;

  /* 스와이프 힌트 */
  const hint=document.createElement('div');
  hint.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.72);color:#fff;padding:11px 22px;border-radius:26px;font-family:\'Noto Sans KR\',sans-serif;font-size:14px;font-weight:700;pointer-events:none;opacity:0;transition:opacity .18s;z-index:9999;white-space:nowrap;';
  document.body.appendChild(hint);
  let ht;
  function showHint(msg){hint.textContent=msg;hint.style.opacity='1';clearTimeout(ht);ht=setTimeout(()=>hint.style.opacity='0',700);}

  /* 페이지 이동 */
  function go(dir){
    if(curIdx<0)return;
    const ni=curIdx-dir; /* 왼쪽=+1인덱스, 오른쪽=-1인덱스 */
    if(ni<0||ni>=PAGES.length)return;
    const shell=document.querySelector('.shell');
    if(shell){
      shell.style.transition='transform .2s ease,opacity .2s ease';
      shell.style.transform='translateX('+(dir>0?'-':'')+'80px)';
      shell.style.opacity='0';
    }
    setTimeout(()=>{window.location.href=PAGES[ni];},180);
  }

  document.addEventListener('touchstart',e=>{
    const sa=document.querySelector('.scroll,.scroll-area');
    if(sa&&sa.scrollTop>4&&sa.contains(e.target))return;
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();
  },{passive:true});

  document.addEventListener('touchend',e=>{
    if(!sx)return;
    const dx=e.changedTouches[0].clientX-sx;
    const dy=Math.abs(e.changedTouches[0].clientY-sy);
    const dt=Date.now()-st;sx=0;
    if(dt>MAX_TIME||Math.abs(dx)<MIN_DIST||dy>MAX_VERT)return;
    if(dx<0){
      /* 왼쪽 → 다음 */
      const ni=curIdx+1;
      if(ni>=PAGES.length){showHint('📅 마지막 페이지');return;}
      showHint(NAMES[ni]+' →');setTimeout(()=>go(-1),160);
    } else {
      /* 오른쪽 → 이전 */
      const ni=curIdx-1;
      if(ni<0){showHint('← 첫 페이지');return;}
      showHint('← '+NAMES[ni]);setTimeout(()=>go(1),160);
    }
  },{passive:true});

  /* 진입 애니메이션 */
  const shell=document.querySelector('.shell');
  if(shell){
    shell.style.opacity='0';shell.style.transform='translateY(5px)';shell.style.transition='none';
    requestAnimationFrame(()=>{
      shell.style.transition='transform .2s ease,opacity .2s ease';
      shell.style.transform='translateY(0)';shell.style.opacity='1';
    });
  }
})();
</script>
