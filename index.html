<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="투자연구소">
<meta name="theme-color" content="#070b14">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>헨리의 투자 연구소</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070b14;--s1:#0d1425;--s2:#111d35;--s3:#162040;
  --text:#e8f0fe;--text2:#a8b8d8;--text3:#506080;
  --blue:#4a8fff;--teal:#00d4aa;--gold:#ffd060;--rose:#ff5060;
  --green:#00c080;--violet:#9060ff;--orange:#ff8830;
  --border:rgba(255,255,255,0.07);--wborder:rgba(255,255,255,0.65);
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;}
.shell{display:flex;flex-direction:column;width:100%;max-width:480px;margin:0 auto;height:100dvh;height:100vh;overflow:hidden;}
.hdr{flex-shrink:0;padding:calc(var(--safe-t)+12px) 16px 12px;text-align:center;background:var(--bg);border-bottom:1px solid var(--border);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;color:var(--text);line-height:1;}
.logo em{color:var(--gold);font-style:normal;}
.logo-sub{font-size:9px;letter-spacing:3px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;margin-top:3px;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.scroll::-webkit-scrollbar{width:2px;}
.scroll::-webkit-scrollbar-thumb{background:var(--s3);}
.body{padding:14px 14px calc(var(--safe-b)+20px);}

/* 총 자산 요약 카드 */
.summary-card{background:linear-gradient(135deg,#0d1e3a,#0a1828);border:1.5px solid rgba(255,208,96,0.3);border-radius:18px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden;}
.summary-card::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(255,208,96,0.08),transparent);border-radius:50%;}
.sum-label{font-size:10px;letter-spacing:2px;color:var(--gold);font-family:'DM Mono',monospace;font-weight:700;text-transform:uppercase;margin-bottom:6px;}
.sum-total{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--text);line-height:1;margin-bottom:4px;}
.sum-total span{font-size:18px;color:var(--text3);}
.sum-row{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap;}
.sum-item{flex:1;min-width:80px;}
.sum-item-label{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:2px;}
.sum-item-val{font-size:14px;font-weight:700;color:var(--text);}
.sum-item-val.pos{color:var(--teal);}
.sum-item-val.neg{color:var(--rose);}

/* 계좌 탭 */
.acct-tabs{display:flex;gap:7px;margin-bottom:14px;}
.acct-tab{flex:1;background:var(--s1);border:1.5px solid var(--border);border-radius:12px;padding:10px 6px;text-align:center;cursor:pointer;touch-action:manipulation;transition:all .15s;}
.acct-tab.on{border-color:var(--gold);background:rgba(255,208,96,0.08);}
.acct-tab-name{font-size:11px;font-weight:700;color:var(--text2);}
.acct-tab.on .acct-tab-name{color:var(--gold);}
.acct-tab-val{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);margin-top:2px;}
.acct-tab.on .acct-tab-val{color:var(--text);}

/* 섹션 */
.sec{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:9px;display:flex;align-items:center;gap:8px;font-weight:700;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}

/* 네비 버튼 */
.nav-btn{display:flex;align-items:center;gap:14px;width:100%;padding:16px 16px;margin-bottom:10px;border:1.5px solid var(--wborder);border-radius:16px;cursor:pointer;text-decoration:none;transition:all .15s;touch-action:manipulation;position:relative;overflow:hidden;}
.nav-btn:active{transform:scale(.97);}
.nav-icon{font-size:26px;flex-shrink:0;}
.nav-body{flex:1;text-align:left;}
.nav-title{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:2px;line-height:1;margin-bottom:3px;}
.nav-sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
.nav-arr{font-size:20px;color:var(--text3);flex-shrink:0;}
.nav-badge{position:absolute;top:50%;right:48px;transform:translateY(-50%);border-radius:20px;padding:3px 10px;font-family:'DM Mono',monospace;font-size:11px;font-weight:700;}

.btn-portfolio{background:linear-gradient(135deg,var(--bg),#0a1e10);border-color:rgba(0,212,170,.5);}
.btn-portfolio .nav-title{color:var(--teal);}
.btn-dividend{background:linear-gradient(135deg,var(--bg),#1a1200);border-color:rgba(255,208,96,.5);}
.btn-dividend .nav-title{color:var(--gold);}
.btn-journal{background:linear-gradient(135deg,var(--bg),#0a0a28);border-color:rgba(74,143,255,.5);}
.btn-journal .nav-title{color:var(--blue);}
.btn-checklist{background:linear-gradient(135deg,var(--bg),#1a0a0a);border-color:rgba(255,80,96,.5);}
.btn-checklist .nav-title{color:var(--rose);}
.btn-sheets{background:linear-gradient(135deg,var(--bg),#0a1a0a);border-color:rgba(0,192,128,.5);}
.btn-sheets .nav-title{color:var(--green);}

/* 오늘의 한마디 */
.quote-mini{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:11px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start;}
.q-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.q-text-mini{font-size:12px;color:var(--text2);line-height:1.6;font-style:italic;}
.q-auth-mini{font-size:10px;color:var(--text3);margin-top:3px;font-family:'DM Mono',monospace;}
</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <div class="logo">헨리의 <em>투자</em> 연구소</div>
    <div class="logo-sub">Henry's Investment Lab</div>
  </div>
  <div class="scroll">
    <div class="body">

      <!-- 총 자산 요약 -->
      <div class="summary-card">
        <div class="sum-label">💼 총 투자 자산</div>
        <div class="sum-total" id="sum-total">0<span> 원</span></div>
        <div class="sum-row">
          <div class="sum-item">
            <div class="sum-item-label">퇴직연금 IRP</div>
            <div class="sum-item-val" id="sum-irp">0 원</div>
          </div>
          <div class="sum-item">
            <div class="sum-item-label">연금저축</div>
            <div class="sum-item-val" id="sum-pension">0 원</div>
          </div>
          <div class="sum-item">
            <div class="sum-item-label">일반 계좌</div>
            <div class="sum-item-val" id="sum-general">0 원</div>
          </div>
        </div>
        <div class="sum-row">
          <div class="sum-item">
            <div class="sum-item-label">이번 달 분배금</div>
            <div class="sum-item-val pos" id="sum-div-month">0 원</div>
          </div>
          <div class="sum-item">
            <div class="sum-item-label">올해 누적 분배금</div>
            <div class="sum-item-val pos" id="sum-div-year">0 원</div>
          </div>
        </div>
      </div>

      <!-- 투자 명언 -->
      <div class="quote-mini">
        <span class="q-icon">💡</span>
        <div>
          <div class="q-text-mini" id="q-invest">—</div>
          <div class="q-auth-mini" id="q-invest-auth">—</div>
        </div>
      </div>

      <!-- 메뉴 버튼 -->
      <div class="sec">메뉴</div>

      <a class="nav-btn btn-portfolio" href="portfolio.html">
        <span class="nav-icon">📊</span>
        <div class="nav-body"><div class="nav-title">ETF 포트폴리오</div><div class="nav-sub">보유 현황 · 계좌별 관리</div></div>
        <span class="nav-badge" id="badge-etf" style="background:rgba(0,212,170,.15);color:var(--teal);">0 종목</span>
        <span class="nav-arr">›</span>
      </a>

      <a class="nav-btn btn-dividend" href="dividend.html">
        <span class="nav-icon">💰</span>
        <div class="nav-body"><div class="nav-title">분배금 달력</div><div class="nav-sub">월별 분배금 · 누적 그래프</div></div>
        <span class="nav-arr">›</span>
      </a>

      <a class="nav-btn btn-journal" href="journal.html">
        <span class="nav-icon">📝</span>
        <div class="nav-body"><div class="nav-title">매매 일지</div><div class="nav-sub">매수 이유 · 목표가 · 손절선</div></div>
        <span class="nav-arr">›</span>
      </a>

      <a class="nav-btn btn-checklist" href="checklist.html">
        <span class="nav-icon">🛡️</span>
        <div class="nav-body"><div class="nav-title">투자 원칙 체크</div><div class="nav-sub">감정적 매매 방지 체크리스트</div></div>
        <span class="nav-arr">›</span>
      </a>

      <a class="nav-btn btn-sheets" href="sheets.html">
        <span class="nav-icon">📋</span>
        <div class="nav-body"><div class="nav-title">Google Sheets 백업</div><div class="nav-sub">스프레드시트 연동 · 내보내기</div></div>
        <span class="nav-arr">›</span>
      </a>

    </div>
  </div>
</div>

<script>
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

const KEY='henry_invest_v1';
function ld(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}
  return{accounts:{irp:{name:'퇴직연금 IRP',initial:0,etfs:[]},pension:{name:'연금저축',initial:0,etfs:[]},general:{name:'일반 계좌',initial:0,etfs:[]}},dividends:[],journal:[],checklist:{},settings:{}};}
let D=ld();

function fmt(n){return Math.round(n).toLocaleString('ko-KR');}
function p2(n){return String(n).padStart(2,'0');}

function calcSummary(){
  const now=new Date();
  const thisMonth=`${now.getFullYear()}-${p2(now.getMonth()+1)}`;
  const thisYear=`${now.getFullYear()}`;

  ['irp','pension','general'].forEach(ak=>{
    const acct=D.accounts[ak];
    const total=acct.etfs.reduce((s,e)=>s+(e.currentPrice||e.avgPrice||0)*(e.qty||0),0);
    document.getElementById('sum-'+ak).textContent=fmt(total)+' 원';
  });

  const allTotal=Object.values(D.accounts).reduce((s,acct)=>s+acct.etfs.reduce((ss,e)=>ss+(e.currentPrice||e.avgPrice||0)*(e.qty||0),0),0);
  document.getElementById('sum-total').innerHTML=fmt(allTotal)+'<span> 원</span>';

  const divMonth=D.dividends.filter(d=>d.date&&d.date.startsWith(thisMonth)).reduce((s,d)=>s+(d.amount||0),0);
  const divYear=D.dividends.filter(d=>d.date&&d.date.startsWith(thisYear)).reduce((s,d)=>s+(d.amount||0),0);
  document.getElementById('sum-div-month').textContent=fmt(divMonth)+' 원';
  document.getElementById('sum-div-year').textContent=fmt(divYear)+' 원';

  const totalEtfs=new Set();
  Object.values(D.accounts).forEach(a=>a.etfs.forEach(e=>totalEtfs.add(e.code)));
  document.getElementById('badge-etf').textContent=totalEtfs.size+' 종목';
}

const INVEST_QUOTES=[
  {t:"주식시장은 조급한 사람의 돈을 인내하는 사람에게 이전하는 장치다.",a:"워런 버핏"},
  {t:"분산투자는 무지에 대한 보호책이다. 자신이 무엇을 하는지 아는 사람에게는 거의 의미가 없다.",a:"워런 버핏"},
  {t:"복리는 세계 8대 불가사의다. 이해하는 자는 벌고, 이해 못 하는 자는 낸다.",a:"알버트 아인슈타인"},
  {t:"시장을 예측하려 하지 마라. 시간이 당신 편이다.",a:"존 보글"},
  {t:"최고의 투자는 자기 자신에 대한 투자다.",a:"워런 버핏"},
  {t:"투자에서 가장 위험한 말은 '이번에는 다르다'이다.",a:"존 템플턴"},
  {t:"하락장은 현명한 투자자에게 선물이다.",a:"워런 버핏"},
  {t:"나무를 심기 가장 좋은 때는 20년 전이었다. 두 번째로 좋은 때는 지금이다.",a:"중국 속담"},
  {t:"장기 투자자는 시간을 친구로 삼는다.",a:"찰리 멍거"},
  {t:"감정이 투자를 망친다. 계획을 지켜라.",a:"벤자민 그레이엄"},
];
const n=new Date();
const qi=(n.getFullYear()*500+n.getMonth()*31+n.getDate())%INVEST_QUOTES.length;
document.getElementById('q-invest').textContent=INVEST_QUOTES[qi].t;
document.getElementById('q-invest-auth').textContent='— '+INVEST_QUOTES[qi].a;

calcSummary();
</script>
</body>
</html>
