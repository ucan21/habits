<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Henry">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Henry's Habits</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--s1:#12121a;--s2:#1a1a26;--s3:#222232;
  --text:#f0f0f8;--text2:#b0b0c8;--text3:#606080;
  --blue:#4a8fff;--teal:#28c490;--gold:#ffc020;
  --violet:#9060ff;--orange:#ff8830;--green:#30c060;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;}
.shell{display:flex;flex-direction:column;width:100%;max-width:480px;margin:0 auto;height:100dvh;height:100vh;overflow:hidden;}
.hdr{flex-shrink:0;padding:calc(var(--safe-t)+10px) 16px 10px;text-align:center;background:var(--bg);border-bottom:1px solid var(--border);}
.hdr-logo{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:5px;color:var(--text);line-height:1;text-shadow:0 0 40px rgba(74,143,255,0.35);}
.hdr-logo em{color:var(--blue);font-style:normal;}
.hdr-sub{font-size:10px;letter-spacing:3px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;margin-top:3px;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.scroll::-webkit-scrollbar{width:2px;}
.scroll::-webkit-scrollbar-thumb{background:var(--s3);}
.home-wrap{padding:14px 14px calc(var(--safe-b)+20px);}
.quote-card{background:linear-gradient(135deg,#12121a,#1a1a2e);border:1px solid rgba(74,143,255,0.2);border-radius:14px;padding:13px 15px;margin-bottom:13px;position:relative;overflow:hidden;}
.quote-card::before{content:'"';font-family:'Bebas Neue',sans-serif;font-size:80px;color:rgba(74,143,255,0.06);position:absolute;top:-8px;left:6px;line-height:1;pointer-events:none;}
.q-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--blue);font-family:'DM Mono',monospace;font-weight:500;margin-bottom:7px;}
.q-text{font-size:13px;font-weight:500;color:var(--text);line-height:1.65;word-break:keep-all;}
.q-author{font-size:10px;color:var(--text3);margin-top:7px;font-family:'DM Mono',monospace;text-align:right;}
.nav-btn{display:flex;align-items:center;gap:14px;width:100%;padding:18px 18px;margin-bottom:10px;border:1px solid var(--border);border-radius:16px;cursor:pointer;text-decoration:none;transition:all .15s;touch-action:manipulation;position:relative;overflow:hidden;}
.nav-btn:active{transform:scale(.97);}
.nav-icon{font-size:30px;flex-shrink:0;}
.nav-body{flex:1;text-align:left;}
.nav-title{font-family:'Bebas Neue',sans-serif;font-size:23px;letter-spacing:2px;line-height:1;margin-bottom:3px;}
.nav-sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
.nav-arr{font-size:22px;color:var(--text3);flex-shrink:0;}
.score-pill{position:absolute;top:50%;right:48px;transform:translateY(-50%);background:rgba(40,196,144,.15);border:1px solid rgba(40,196,144,.3);border-radius:20px;padding:3px 10px;font-family:'DM Mono',monospace;font-size:12px;color:var(--teal);font-weight:700;}
.btn-habit{border-color:rgba(40,196,144,.3);background:linear-gradient(135deg,#12121a,#0d2018);}
.btn-habit .nav-title{color:var(--teal);}
.btn-brain{border-color:rgba(48,192,96,.3);background:linear-gradient(135deg,#12121a,#0d1e12);}
.btn-brain .nav-title{color:var(--green);}
.btn-franklin{border-color:rgba(255,192,32,.3);background:linear-gradient(135deg,#12121a,#1e1800);}
.btn-franklin .nav-title{color:var(--gold);}
.btn-gratitude{border-color:rgba(255,136,48,.3);background:linear-gradient(135deg,#12121a,#1e1000);}
.btn-gratitude .nav-title{color:var(--orange);}
.btn-gcal{border-color:rgba(74,143,255,.3);background:linear-gradient(135deg,#12121a,#0a1428);}
.btn-gcal .nav-title{color:var(--blue);}
</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <div class="hdr-logo">HENRY<em>'S</em> HABITS</div>
    <div class="hdr-sub">매일 1% 성장 · 습관이 운명을 만든다</div>
  </div>
  <div class="scroll">
    <div class="home-wrap">
      <div class="quote-card">
        <div class="q-label">✦ 오늘의 명언</div>
        <div class="q-text" id="q-text">—</div>
        <div class="q-author" id="q-author">—</div>
      </div>
      <a class="nav-btn btn-habit" href="habits.html">
        <span class="nav-icon">✅</span>
        <div class="nav-body"><div class="nav-title">헨리의 습관</div><div class="nav-sub">오늘의 습관 체크 · 점수 확인</div></div>
        <span class="score-pill" id="score-badge">0점</span>
        <span class="nav-arr">›</span>
      </a>
      <a class="nav-btn btn-brain" href="brain.html">
        <span class="nav-icon">🧠</span>
        <div class="nav-body"><div class="nav-title">Brain Dump</div><div class="nav-sub">아이디어 · 생각 · 메모 자유 기록</div></div>
        <span class="nav-arr">›</span>
      </a>
      <a class="nav-btn btn-franklin" href="franklin.html">
        <span class="nav-icon">📖</span>
        <div class="nav-body"><div class="nav-title">Franklin Planner</div><div class="nav-sub">미션 · 역할 · 위클리 · 데일리 · 목표</div></div>
        <span class="nav-arr">›</span>
      </a>
      <a class="nav-btn btn-gratitude" href="gratitude.html">
        <span class="nav-icon">🙏</span>
        <div class="nav-body"><div class="nav-title">Today's Gratitude Journal</div><div class="nav-sub">오늘의 다섯 가지 감사 일기</div></div>
        <span class="nav-arr">›</span>
      </a>
      <a class="nav-btn btn-gcal" href="gcal.html">
        <span class="nav-icon">📅</span>
        <div class="nav-body"><div class="nav-title">Google Calendar</div><div class="nav-sub">Google 캘린더 일정 연동</div></div>
        <span class="nav-arr">›</span>
      </a>
    </div>
  </div>
</div>
<script>
const QQ=[
  {t:"작은 습관이 놀라운 결과를 만든다. 매일 1%의 개선이 1년이면 37배 성장이다.",a:"제임스 클리어"},
  {t:"우리는 우리가 반복적으로 하는 것의 산물이다. 탁월함은 행동이 아니라 습관이다.",a:"아리스토텔레스"},
  {t:"당신이 가진 것에 감사하라. 더 많이 가지게 될 것이다.",a:"오프라 윈프리"},
  {t:"성공은 매일의 작은 노력들이 쌓인 결과다.",a:"로버트 콜리어"},
  {t:"변화를 원한다면 당신 자신이 그 변화가 되어야 한다.",a:"마하트마 간디"},
  {t:"오늘 할 수 있는 일을 내일로 미루지 마라.",a:"벤자민 프랭클린"},
  {t:"포기하지 않는 한 실패는 없다.",a:"에이브러햄 링컨"},
  {t:"건강이 최고의 부이다. 만족이 최고의 재물이다.",a:"석가모니"},
  {t:"당신이 할 수 있다고 믿든, 할 수 없다고 믿든, 당신이 옳다.",a:"헨리 포드"},
  {t:"투자에서 가장 중요한 것은 얼마나 오래 시장에 있느냐이다.",a:"워런 버핏"},
  {t:"배움을 멈추는 순간 성장도 멈춘다.",a:"알버트 아인슈타인"},
  {t:"최고의 투자는 자기 자신에 대한 투자다.",a:"워런 버핏"},
  {t:"나무를 심기 가장 좋은 때는 20년 전이었다. 두 번째로 좋은 때는 바로 지금이다.",a:"중국 속담"},
  {t:"삶의 질은 잠의 질에서 시작된다.",a:"아리아나 허핑턴"},
  {t:"복리의 힘은 인류 최고의 발명이다.",a:"알버트 아인슈타인"},
  {t:"성공한 사람들은 어렵고 불편한 것을 습관으로 만든다.",a:"브라이언 트레이시"},
  {t:"글을 쓴다는 것은 생각을 정제하는 최고의 방법이다.",a:"유발 하라리"},
  {t:"두려움은 꿈의 가장 큰 적이다. 용감하게 나아가라.",a:"넬슨 만델라"},
  {t:"오늘의 고통이 내일의 힘이 된다. 포기하지 마라.",a:"무하마드 알리"},
  {t:"당신이 집중하는 곳에 에너지가 흐른다.",a:"토니 로빈스"},
  {t:"행복은 외부에서 오는 것이 아니라 내면에서 만들어지는 것이다.",a:"빅토르 프랭클"},
  {t:"완벽함이 아닌 진보를 추구하라.",a:"존 우든"},
  {t:"부자가 되는 가장 빠른 방법은 지출보다 더 많이 배우는 것이다.",a:"로버트 기요사키"},
  {t:"매일 아침 일어나 감사함으로 하루를 시작하라.",a:"토니 로빈스"},
  {t:"규율이 없는 자유는 진정한 자유가 아니다.",a:"임마누엘 칸트"},
];
const n=new Date();
const idx=(n.getFullYear()*500+n.getMonth()*31+n.getDate())%QQ.length;
document.getElementById('q-text').textContent=QQ[idx].t;
document.getElementById('q-author').textContent='— '+QQ[idx].a;
try{
  const d=JSON.parse(localStorage.getItem('henry_v9')||'{}');
  const tk=n.getFullYear()+'-'+(n.getMonth()+1).toString().padStart(2,'0')+'-'+n.getDate().toString().padStart(2,'0');
  const habits=d.habits||[];const rec=(d.records||{})[tk]||{};const grat=((d.grat||{})[tk]||[]);
  if(habits.length){const pt=100/habits.length;let sc=0;habits.forEach(h=>{if(h.id==='h10')sc+=pt*Math.min(grat.filter(x=>x&&x.trim()).length/5,1);else if(rec[h.id])sc+=pt;});document.getElementById('score-badge').textContent=Math.round(sc)+'점';}
}catch(e){}
</script>
</body>
</html>
