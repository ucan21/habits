<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Henry Diary">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Henry Diary</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f; --s1:#12121a; --s2:#1a1a26; --s3:#222232;
  --text:#f0f0f8; --text2:#b0b0c8; --text3:#606080;
  --blue:#4a8fff; --teal:#28c490; --gold:#ffc020;
  --violet:#9060ff; --orange:#ff8830; --green:#30c060;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.16);
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  -webkit-font-smoothing:antialiased;
}

/* ── SHELL ── */
.shell{
  display:flex;flex-direction:column;
  width:100%;max-width:480px;margin:0 auto;
  height:100dvh;height:100vh;overflow:hidden;
}

/* ── HEADER ── */
.hdr{
  flex-shrink:0;
  /* 상태바 아래 충분한 여백으로 잘림 방지 */
  padding-top:calc(var(--safe-t) + 18px);
  padding-bottom:14px;
  padding-left:16px;
  padding-right:16px;
  text-align:center;
  background:var(--bg);
  border-bottom:1px solid var(--border);
}
.hdr-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:44px;
  letter-spacing:6px;
  line-height:1;
  color:#ffffff;
  text-shadow:0 0 30px rgba(255,255,255,0.18);
}
.hdr-sub{
  font-size:11px;letter-spacing:3px;color:#ffffff;
  font-family:'DM Mono',monospace;text-transform:uppercase;margin-top:6px;
  font-weight:700;opacity:1;
}
/* 날짜 표시 */
.hdr-date{
  font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);
  margin-top:6px;letter-spacing:1px;
}

/* ── SCROLL ── */
.scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain;
}
.scroll::-webkit-scrollbar{width:2px;}
.scroll::-webkit-scrollbar-thumb{background:var(--s3);}

/* ── CONTENT ── */
.content{padding:14px 14px 16px;}

/* ── QUOTE ── */
.quote-card{
  background:linear-gradient(135deg,#12121a,#1a1a2e);
  border:2px solid rgba(255,255,255,0.75);
  border-radius:14px;padding:10px 13px;margin-bottom:12px;
  position:relative;overflow:hidden;
}
.quote-card::before{
  content:'"';font-family:'Bebas Neue',sans-serif;font-size:50px;
  color:rgba(74,143,255,0.06);position:absolute;top:-5px;left:6px;
  line-height:1;pointer-events:none;
}
.q-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#ffffff;font-family:'DM Mono',monospace;font-weight:700;margin-bottom:6px;opacity:.85;}
.q-text{font-size:14px;font-weight:400;color:#ffffff;line-height:1.65;word-break:keep-all;font-family:'Nanum Myeongjo','Batang','Georgia',serif;letter-spacing:.3px;}
.q-en{font-size:12px;font-weight:400;color:#ff8830!important;line-height:1.6;margin-top:7px;font-family:'Georgia','Times New Roman',serif;font-style:italic;word-break:break-word;}
.q-author{font-size:10px;color:rgba(255,255,255,0.55);margin-top:5px;font-family:'DM Mono',monospace;text-align:right;}

/* ── CARD BUTTONS (메인 콘텐츠 카드) ── */
.nav-btn{
  display:flex;align-items:center;gap:14px;
  width:100%;padding:17px 16px;margin-bottom:10px;
  border-radius:16px;cursor:pointer;text-decoration:none;
  transition:all .15s;touch-action:manipulation;
  position:relative;overflow:hidden;
  border:1px solid var(--border);
  /* JS 클릭으로 이동 */
}
.nav-btn:active{transform:scale(.97);}
.nav-icon{font-size:28px;flex-shrink:0;}
.nav-body{flex:1;text-align:left;}
.nav-title{
  font-family:'Bebas Neue',sans-serif;font-size:22px;
  letter-spacing:2px;line-height:1;margin-bottom:3px;
}
.nav-sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
.nav-arr{font-size:20px;color:var(--text3);flex-shrink:0;}
.score-pill{
  position:absolute;top:50%;right:46px;transform:translateY(-50%);
  background:rgba(40,196,144,.15);border:1px solid rgba(40,196,144,.3);
  border-radius:20px;padding:3px 10px;
  font-family:'DM Mono',monospace;font-size:11px;color:var(--teal);font-weight:700;
}

.btn-habit  {border-color:rgba(255,255,255,0.75); background:linear-gradient(135deg,#12121a,#0d2018);}
.btn-habit  .nav-title{color:var(--teal);}
.btn-brain  {border-color:rgba(255,255,255,0.75);  background:linear-gradient(135deg,#12121a,#0d1e12);}
.btn-brain  .nav-title{color:var(--green);}
.btn-gtask2{border-color:rgba(255,255,255,0.75);background:linear-gradient(135deg,#12121a,#0d1a36);}
.btn-gtask2 .nav-title{color:#4a8fff;}
.btn-gratitude{border-color:rgba(255,255,255,0.75);background:linear-gradient(135deg,#12121a,#1e1000);}
.btn-gratitude .nav-title{color:var(--orange);}
.btn-gcal   {border-color:rgba(255,255,255,0.75); background:linear-gradient(135deg,#12121a,#0a1428);}
.btn-gcal   .nav-title{color:var(--blue);}
.btn-backup2{border-color:rgba(255,255,255,0.75); background:linear-gradient(135deg,#12121a,#0a2818);}
.btn-backup2 .nav-title{color:var(--teal);}

/* ── BOTTOM NAV ── */
.bnav{
  flex-shrink:0;
  background:rgba(10,10,15,0.97);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border2);
  display:flex;
  padding-bottom:var(--safe-b);
}
.nb{
  flex:1;background:none;border:none;color:var(--text3);
  padding:9px 2px 7px;
  cursor:pointer;font-size:9.5px;
  font-family:'Noto Sans KR',sans-serif;font-weight:500;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:color .18s;touch-action:manipulation;
  text-decoration:none;
}
.nb .ni{font-size:22px;transition:transform .18s,filter .18s;}
.nb:active .ni{transform:scale(1.2);}
/* active page highlight */
.nb.current{color:var(--blue);}
.nb.current .ni{filter:drop-shadow(0 0 6px var(--blue));}

/* color per button */
.nb-habit   {--nc:var(--teal);}
.nb-brain   {--nc:var(--green);}
.nb-gtask2{--nc:#4a8fff;}
.nb-grat    {--nc:var(--orange);}
.nb-gcal    {--nc:var(--blue);}
.nb:active{color:var(--nc, var(--blue));}
</style>
</head>
<body>

  <!-- BOTTOM NAV -->

    <button class="nb nb-brain" onclick="go('brain.html')">

<script>
/* 페이지 이동 — window.location으로 확실하게 */
function go(url){ window.location.href = url; }

/* 날짜 표시 */
(function(){
  const n = new Date();
  const dows = ['일','월','화','수','목','금','토'];
  const p = v => String(v).padStart(2,'0');
  document.getElementById('hdr-date').textContent =
    `${n.getFullYear()}.${p(n.getMonth()+1)}.${p(n.getDate())} (${dows[n.getDay()]})`;
})();

/* ══ 1시간마다 명언 업데이트 ══ */
function showQuote(){
  const n=new Date();
  const h=n.getHours();
  // 오후 11시(23)~새벽 6시 → 취침 메시지 고정
  if(h>=23||h<6){
    const ql=document.getElementById('q-label');
    const qt=document.getElementById('q-text');
    const qe=document.getElementById('q-en');
    const qa=document.getElementById('q-author');
    if(ql) ql.textContent='🌙 취침 시간';
    if(qt) qt.textContent='충분한 수면이 내일의 에너지를 만듭니다. 편안한 밤 되세요.';
    if(qe) qe.textContent="A good night's sleep is the foundation of tomorrow's success.";
    if(qa) qa.textContent="— Henry's Diary";
    // 다음 체크: 30분 후 (6시가 됐는지 확인)
    setTimeout(showQuote, 30*60*1000);
    return;
  }
  // 활동 시간 — 명언 표시
  const slot=n.getFullYear()*8760+n.getMonth()*730+n.getDate()*24+h;
  const q=QQ[slot%QQ.length];
  const ql=document.getElementById('q-label');
  const qt=document.getElementById('q-text');
  const qe=document.getElementById('q-en');
  const qa=document.getElementById('q-author');
  if(qt) qt.textContent=q.t;
  if(qe) qe.textContent=q.e;
  if(qa) qa.textContent='— '+q.a;
  if(ql) ql.textContent='✦ 오늘의 명언  ·  '+h+'시';
  // 다음 정시까지
  const ms=((60-n.getMinutes())*60-(n.getSeconds()))*1000;
  setTimeout(showQuote, Math.max(ms,1000));
}

<script>
/* ══ SWIPE NAVIGATION ══ */
(function(){
  const path=location.pathname.split('/').pop()||'index.html';
  const PAGES=['index.html','habits.html','gratitude.html','brain.html','gcal.html'];
  const NAMES=['🏠 홈','✅ 습관','🙏 감사','🧠 Brain','📅 캘린더'];
  const curIdx=PAGES.indexOf(path);
  let sx=0,sy=0,st=0;
  const MIN_DIST=55,MAX_VERT=90,MAX_TIME=500;

  /* 스와이프 힌트 */
  const hint=document.createElement('div');
  hint.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.72);color:#fff;padding:11px 22px;border-radius:26px;font-family:\'Noto Sans KR\',sans-serif;font-size:14px;font-weight:700;pointer-events:none;opacity:0;transition:opacity .18s;z-index:9999;white-space:nowrap;';
  document.body.appendChild(hint);
  let ht;
  function showHint(msg){hint.textContent=msg;hint.style.opacity='1';clearTimeout(ht);ht=setTimeout(()=>hint.style.opacity='0',700);}

  /* 페이지 이동 */
  function go(dir){
    if(curIdx<0)return;
    const ni=curIdx-dir; /* 왼쪽=+1인덱스, 오른쪽=-1인덱스 */
    if(ni<0||ni>=PAGES.length)return;
    const shell=document.querySelector('.shell');
    if(shell){
      shell.style.transition='transform .2s ease,opacity .2s ease';
      shell.style.transform='translateX('+(dir>0?'-':'')+'80px)';
      shell.style.opacity='0';
    }
    setTimeout(()=>{window.location.href=PAGES[ni];},180);
  }

  document.addEventListener('touchstart',e=>{
    const sa=document.querySelector('.scroll,.scroll-area');
    if(sa&&sa.scrollTop>4&&sa.contains(e.target))return;
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();
  },{passive:true});

  document.addEventListener('touchend',e=>{
    if(!sx)return;
    const dx=e.changedTouches[0].clientX-sx;
    const dy=Math.abs(e.changedTouches[0].clientY-sy);
    const dt=Date.now()-st;sx=0;
    if(dt>MAX_TIME||Math.abs(dx)<MIN_DIST||dy>MAX_VERT)return;
    if(dx<0){
      /* 왼쪽 → 다음 */
      const ni=curIdx+1;
      if(ni>=PAGES.length){showHint('📅 마지막 페이지');return;}
      showHint(NAMES[ni]+' →');setTimeout(()=>go(-1),160);
    } else {
      /* 오른쪽 → 이전 */
      const ni=curIdx-1;
      if(ni<0){showHint('← 첫 페이지');return;}
      showHint('← '+NAMES[ni]);setTimeout(()=>go(1),160);
    }
  },{passive:true});

  /* 진입 애니메이션 */
  const shell=document.querySelector('.shell');
  if(shell){
    shell.style.opacity='0';shell.style.transform='translateY(5px)';shell.style.transition='none';
    requestAnimationFrame(()=>{
      shell.style.transition='transform .2s ease,opacity .2s ease';
      shell.style.transform='translateY(0)';shell.style.opacity='1';
    });
  }
})();
</script>
