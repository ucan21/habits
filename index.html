<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="콜라주">
<meta name="description" content="사진을 분할하여 콜라주를 만드세요">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>📸 사진 콜라주</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0f0f0;
    --text2: #888;
    --accent: #e8c96d;
    --accent-dim: rgba(232,201,109,0.15);
    --danger: #e05c5c;
    --radius: 12px;
    --gap: 3px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden;
  }

  .app {
    display: flex; flex-direction: column;
    height: 100%; height: 100dvh;
    max-width: 430px; margin: 0 auto;
    position: relative;
  }

  /* Header */
  .header {
    padding: 52px 20px 14px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 20px; font-weight: 700;
    letter-spacing: -0.5px;
  }
  .header h1 span { color: var(--accent); }

  .save-btn {
    background: var(--accent);
    color: #0f0f0f;
    border: none; border-radius: 20px;
    padding: 8px 18px;
    font-size: 13px; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: opacity 0.2s, transform 0.1s;
    -webkit-appearance: none;
  }
  .save-btn:active { opacity: 0.8; transform: scale(0.97); }
  .save-btn svg { width: 14px; height: 14px; }

  /* Mode selector */
  .mode-bar {
    padding: 0 16px 12px;
    display: flex; gap: 8px;
    flex-shrink: 0;
  }
  .mode-chip {
    flex: 1;
    border: 1px solid var(--border2);
    border-radius: 30px;
    background: var(--surface);
    color: var(--text2);
    font-size: 13px; font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 9px 4px;
    cursor: pointer;
    text-align: center;
    transition: all 0.18s;
    -webkit-appearance: none;
  }
  .mode-chip.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 700;
  }
  .mode-chip:active { transform: scale(0.95); }

  /* Canvas area */
  .canvas-wrap {
    flex: 1;
    padding: 0 12px;
    min-height: 0;
    display: flex; align-items: stretch;
  }

  .collage-canvas {
    width: 100%; border-radius: var(--radius);
    overflow: hidden;
    display: grid;
    gap: var(--gap);
    background: #111;
    position: relative;
  }

  /* Cell */
  .cell {
    position: relative;
    background: var(--surface2);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    min-height: 0; min-width: 0;
    -webkit-user-select: none; user-select: none;
  }

  .cell img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    pointer-events: none;
  }

  .cell-placeholder {
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
    color: var(--text2);
    pointer-events: none;
    transition: color 0.2s;
  }
  .cell-placeholder svg { width: 28px; height: 28px; opacity: 0.5; }
  .cell-placeholder span { font-size: 11px; font-weight: 500; }

  .cell:active .cell-placeholder { color: var(--accent); }

  /* Caption overlay */
  .caption-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.72));
    padding: 20px 8px 8px;
    display: none;
    z-index: 2;
  }
  .caption-overlay.visible { display: block; }

  .caption-input {
    width: 100%;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: #fff;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 5px 8px;
    outline: none;
    -webkit-appearance: none;
  }
  .caption-input::placeholder { color: rgba(255,255,255,0.45); }

  /* Remove button */
  .remove-btn {
    position: absolute; top: 6px; right: 6px;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: rgba(0,0,0,0.65);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff; font-size: 14px; line-height: 1;
    cursor: pointer; display: none;
    align-items: center; justify-content: center;
    z-index: 3;
    -webkit-appearance: none;
  }
  .remove-btn.show { display: flex; }

  /* Bottom toolbar */
  .toolbar {
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    display: flex; gap: 10px;
    flex-shrink: 0;
  }

  .tool-btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    color: var(--text2);
    font-size: 12px; font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 10px 6px;
    cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    -webkit-appearance: none;
    transition: all 0.15s;
  }
  .tool-btn svg { width: 20px; height: 20px; }
  .tool-btn:active { background: var(--surface2); transform: scale(0.96); }
  .tool-btn.danger { color: var(--danger); border-color: rgba(224,92,92,0.3); }

  /* Toast */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: rgba(232,201,109,0.95);
    color: #0f0f0f;
    font-size: 13px; font-weight: 700;
    padding: 10px 20px; border-radius: 30px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { opacity: 1; }

  /* Saving overlay */
  .saving-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
    z-index: 200;
  }
  .saving-overlay.show { display: flex; }
  .saving-overlay p { color: var(--accent); font-size: 15px; font-weight: 500; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--accent-dim);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Caption edit mode hint */
  .edit-hint {
    position: absolute; top: 6px; left: 6px;
    background: rgba(232,201,109,0.9);
    color: #0f0f0f; font-size: 9px; font-weight: 700;
    padding: 2px 6px; border-radius: 8px;
    display: none; z-index: 3;
  }
  .edit-hint.show { display: block; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <h1>📸 사진 <span>콜라주</span></h1>
    <button class="save-btn" onclick="saveCollage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      저장
    </button>
  </div>

  <!-- Mode chips -->
  <div class="mode-bar">
    <button class="mode-chip active" data-n="2" onclick="setMode(2)">2장</button>
    <button class="mode-chip" data-n="3" onclick="setMode(3)">3장</button>
    <button class="mode-chip" data-n="4" onclick="setMode(4)">4장</button>
    <button class="mode-chip" data-n="5" onclick="setMode(5)">5장</button>
  </div>

  <!-- Collage canvas -->
  <div class="canvas-wrap">
    <div class="collage-canvas" id="canvas"></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="tool-btn" onclick="toggleCaptions()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      설명 편집
    </button>
    <button class="tool-btn" onclick="setBg()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/>
      </svg>
      배경색
    </button>
    <button class="tool-btn danger" onclick="resetAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
      </svg>
      초기화
    </button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Saving overlay -->
<div class="saving-overlay" id="savingOverlay">
  <div class="spinner"></div>
  <p>이미지 저장 중...</p>
</div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="onFile(event)">

<!-- html2canvas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
let mode = 2;
let pendingIdx = -1;
let captionMode = false;
let bgColors = ['#111111','#ffffff','#1a1a2e','#2d1b1b','#1b2d1b'];
let bgIdx = 0;

const canvas = document.getElementById('canvas');

const gridStyles = {
  2: () => { canvas.style.gridTemplateColumns='1fr 1fr'; canvas.style.gridTemplateRows='1fr'; canvas.style.gridTemplateAreas=''; },
  3: () => { canvas.style.gridTemplateColumns='1fr 1fr 1fr'; canvas.style.gridTemplateRows='1fr'; canvas.style.gridTemplateAreas=''; },
  4: () => { canvas.style.gridTemplateColumns='1fr 1fr'; canvas.style.gridTemplateRows='1fr 1fr'; canvas.style.gridTemplateAreas=''; },
  5: () => {
    canvas.style.gridTemplateColumns='1fr 1fr 1fr';
    canvas.style.gridTemplateRows='1fr 1fr';
    canvas.style.gridTemplateAreas='"a a b" "c d e"';
  }
};

const areaNames = ['a','b','c','d','e'];

function buildGrid() {
  canvas.innerHTML = '';
  gridStyles[mode]();

  for (let i = 0; i < mode; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.idx = i;
    if (mode === 5) cell.style.gridArea = areaNames[i];

    cell.innerHTML = `
      <div class="cell-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <span>탭하여 추가</span>
      </div>
      <button class="remove-btn" onclick="removePhoto(${i},event)">✕</button>
      <div class="edit-hint">편집중</div>
      <div class="caption-overlay">
        <input class="caption-input" type="text" placeholder="설명을 입력하세요..." enterkeyhint="done" onkeydown="if(event.key==='Enter')this.blur()">
      </div>
    `;
    cell.addEventListener('click', () => cellClick(i, cell));
    canvas.appendChild(cell);
  }
}

function cellClick(idx, cell) {
  if (captionMode) {
    const inp = cell.querySelector('.caption-input');
    if (inp) { inp.focus(); return; }
  }
  const img = cell.querySelector('img');
  if (img) {
    // toggle remove button
    const rb = cell.querySelector('.remove-btn');
    const showing = rb.classList.contains('show');
    document.querySelectorAll('.remove-btn').forEach(b => b.classList.remove('show'));
    if (!showing) rb.classList.add('show');
  } else {
    pendingIdx = idx;
    document.getElementById('fileInput').value = '';
    document.getElementById('fileInput').click();
  }
}

function onFile(e) {
  const file = e.target.files[0];
  if (!file || pendingIdx < 0) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const cell = canvas.querySelectorAll('.cell')[pendingIdx];
    const ph = cell.querySelector('.cell-placeholder');
    let img = cell.querySelector('img');
    if (!img) { img = document.createElement('img'); cell.insertBefore(img, ph); }
    img.src = ev.target.result;
    ph.style.display = 'none';
    const cap = cell.querySelector('.caption-overlay');
    if (captionMode) cap.classList.add('visible');
    cell.querySelector('.remove-btn').classList.remove('show');
  };
  reader.readAsDataURL(file);
  pendingIdx = -1;
}

function removePhoto(idx, e) {
  e.stopPropagation();
  const cell = canvas.querySelectorAll('.cell')[idx];
  const img = cell.querySelector('img');
  if (img) img.remove();
  cell.querySelector('.cell-placeholder').style.display = '';
  cell.querySelector('.caption-overlay').classList.remove('visible');
  cell.querySelector('.caption-input').value = '';
  cell.querySelector('.remove-btn').classList.remove('show');
}

function setMode(n) {
  mode = n;
  document.querySelectorAll('.mode-chip').forEach(c => c.classList.toggle('active', parseInt(c.dataset.n) === n));
  buildGrid();
  captionMode = false;
}

function toggleCaptions() {
  captionMode = !captionMode;
  canvas.querySelectorAll('.cell').forEach(cell => {
    const hasImg = !!cell.querySelector('img');
    const cap = cell.querySelector('.caption-overlay');
    const hint = cell.querySelector('.edit-hint');
    if (hasImg) {
      cap.classList.toggle('visible', captionMode);
      hint.classList.toggle('show', captionMode);
    }
  });
  showToast(captionMode ? '✏️ 설명 편집 모드' : '✅ 편집 완료');
}

function setBg() {
  bgIdx = (bgIdx + 1) % bgColors.length;
  canvas.style.background = bgColors[bgIdx];
  const labels = ['검정','흰색','다크블루','다크레드','다크그린'];
  showToast('배경: ' + labels[bgIdx]);
}

function resetAll() {
  if (!confirm('모든 사진을 초기화할까요?')) return;
  captionMode = false;
  buildGrid();
  showToast('🔄 초기화 완료');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2000);
}

async function saveCollage() {
  const hasPic = !!canvas.querySelector('img');
  if (!hasPic) { showToast('⚠️ 먼저 사진을 추가하세요'); return; }

  // Hide remove buttons before capture
  document.querySelectorAll('.remove-btn').forEach(b => b.classList.remove('show'));
  document.querySelectorAll('.edit-hint').forEach(h => h.classList.remove('show'));

  document.getElementById('savingOverlay').classList.add('show');

  await new Promise(r => setTimeout(r, 100));

  try {
    const cvs = await html2canvas(canvas, {
      useCORS: true, scale: 3,
      backgroundColor: canvas.style.background || '#111111',
      logging: false
    });

    const blob = await new Promise(r => cvs.toBlob(r, 'image/jpeg', 0.95));
    const url = URL.createObjectURL(blob);

    // Try native share first (mobile)
    if (navigator.share && navigator.canShare({ files: [new File([blob], 'collage.jpg', {type:'image/jpeg'})] })) {
      await navigator.share({
        files: [new File([blob], 'collage.jpg', {type:'image/jpeg'})],
        title: '사진 콜라주'
      });
    } else {
      const a = document.createElement('a');
      a.href = url; a.download = 'collage.jpg'; a.click();
    }
    showToast('🎉 저장 완료!');
  } catch(err) {
    if (err.name !== 'AbortError') showToast('저장 실패. 다시 시도하세요.');
  } finally {
    document.getElementById('savingOverlay').classList.remove('show');
  }
}

// Hide remove btns on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.cell')) {
    document.querySelectorAll('.remove-btn').forEach(b => b.classList.remove('show'));
  }
});

// Service worker registration
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

buildGrid();
</script>
</body>
</html>
